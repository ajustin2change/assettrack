  function handleDateImport(e){
    var file = e.target.files[0];
    e.target.value = "";
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt){
      try {
        var wb = XLSX.read(evt.target.result, {type:"binary"});
        var ws = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
        var updates = [];
        rows.slice(1).forEach(function(row){
          var ticketNo  = String(row[0]||"").trim();
          var requestor = String(row[1]||"").trim();
          var location  = String(row[2]||"").trim();
          if(!ticketNo) return;
          updates.push({ticketNo:ticketNo, requestor:requestor, location:location});
        });
        if(!updates.length){
          setImportMsg({ok:false, text:"No valid rows found. Ensure column A = ticket #, B = requestor, C = location."});
          setTimeout(function(){ setImportMsg(null); }, 5000);
          return;
        }
        var applied = 0; var notFound = 0;
        setTickets(function(prev){
          var result = prev.map(function(t){
            var match = updates.find(function(u){ return u.ticketNo===t.ticketNo; });
            if(!match) return t;
            applied++;
            return {...t,
              requestor: match.requestor || t.requestor,
              site:      match.location  || t.site,
            };
          });
          updates.forEach(function(u){
            if(!prev.find(function(t){ return t.ticketNo===u.ticketNo; })) notFound++;
          });
          return result;
        });
        setTimeout(function(){
          setImportMsg({ok:true, text:applied+" ticket"+(applied!==1?"s":"")+" updated"+(notFound?" · "+notFound+" not found":"")});
          setTimeout(function(){ setImportMsg(null); }, 6000);
        }, 50);
      } catch(err){
        setImportMsg({ok:false, text:"Import failed: "+err.message});
        setTimeout(function(){ setImportMsg(null); }, 5000);
      }
    };
    reader.readAsBinaryString(file);
  }

  // Full CSV parser — handles quoted fields containing newlines/commas
  function parseCsv(text){
    var rows = [];
    var row = [];
    var cell = '';
    var inQuote = false;
    var i = 0;
    while(i < text.length){
      var ch = text[i];
      var code = text.charCodeAt(i);
      if(inQuote){
        if(ch === '"'){
          if(text[i+1] === '"'){ cell += '"'; i += 2; continue; }
          inQuote = false; i++; continue;
        }
        cell += ch; i++; continue;
      }
      if(ch === '"'){ inQuote = true; i++; continue; }
      if(ch === ','){ row.push(cell); cell = ''; i++; continue; }
      if(code === 13){ i++; continue; }
      if(code === 10){
        row.push(cell); cell = '';
        if(row.some(function(c){ return c.trim(); })) rows.push(row);
        row = []; i++; continue;
      }
      cell += ch; i++;
    }
    if(cell || row.length){ row.push(cell); if(row.some(function(c){ return c.trim(); })) rows.push(row); }
    return rows;
  }

  function importFromDisposalCsv(text, fileName){
    var rows = parseCsv(text);
    if(rows.length < 2) throw new Error("CSV appears empty");

    var headers = rows[0];
    function col(name){ return headers.findIndex(function(h){ return h.trim()===name; }); }

    var iTitle      = col('Title');
    var iName       = col('RequestorName');
    var iEmail      = col('RequestorEmail');
    var iPhone      = col('RequestorPhone');
    var iDept       = col('RequestorDepartment');
    var iLoc        = col('Location');
    var iCampus     = col('Campus');
    var iRoom       = col('RoomNumber');
    var iSerials    = col('SerialNumbers');
    var iMonitors   = col('CountMonitors');
    var iPrinters   = col('CountPrinters');
    var iMisc       = col('CountMiscBoxes');
    var iDrives     = col('CountDriveBoxes');
    var iNotes      = col('AdditionalInfo');

    if(iEmail === -1) throw new Error("This doesn't look like a Disposal Request CSV — missing RequestorEmail column");

    var row = rows[1];
    var get = function(i){ return i>=0 && i<row.length ? row[i].trim() : ''; };

    var expectedAssets = [];
    var serialStr = get(iSerials);
    if(serialStr){
      serialStr.split(';').forEach(function(s){
        var trimmed = s.trim().toUpperCase();
        if(trimmed) expectedAssets.push({
          serial:trimmed, manufacturer:'', machineType:'',
          ouInventory:'', addedAt:new Date().toLocaleString(), duplicate:false
        });
      });
    }

    var site = get(iLoc);
    var room = get(iRoom);
    if(room) site = site + (site?' — ':'') + 'Room ' + room;

    var notes = get(iNotes);
    var title = get(iTitle);
    var refMatch = title.match(/ITAD-[0-9]{8}-[0-9]{4}/);
    if(refMatch) notes += (notes?'\n':'') + 'ITAD Ref: ' + refMatch[0];

    var rawPhone = get(iPhone).replace(/\D/g,"").slice(0,10);
    var fmtPhone = rawPhone;
    if(rawPhone.length >= 7) fmtPhone = "("+rawPhone.slice(0,3)+") "+rawPhone.slice(3,6)+"-"+rawPhone.slice(6);
    else if(rawPhone.length >= 4) fmtPhone = "("+rawPhone.slice(0,3)+") "+rawPhone.slice(3);
    else if(rawPhone.length > 0) fmtPhone = "("+rawPhone;

    // Parse date from filename: ITAD-YYYYMMDD-HHMM.csv
    var dateFromFile = '';
    var fnMatch = fileName.match(/ITAD-([0-9]{4})([0-9]{2})([0-9]{2})-/);
    if(fnMatch) dateFromFile = fnMatch[1] + '-' + fnMatch[2] + '-' + fnMatch[3];

    // Use name if available, fall back to email
    var requestorDisplay = (iName >= 0 && get(iName)) ? get(iName) : get(iEmail);

    return {
      id:             uid(),
      ticketNo:       '',
      date:           dateFromFile || localDateStr(),
      site:           site,
      requestor:      requestorDisplay,
      phone:          fmtPhone,
      notes:          notes,
      expectedAssets: expectedAssets,
      itemCounts: {
        lcdMonitors:    parseInt(get(iMonitors)) || 0,
        printers:       parseInt(get(iPrinters)) || 0,
        miscBoxes:      parseInt(get(iMisc))     || 0,
        hardDriveBoxes: parseInt(get(iDrives))   || 0,
      },
      pickupScanned:  false,
      pickupResult:   null,
      assets:         [],
      _importedFrom:  fileName,
      _campus:        iCampus >= 0 ? get(iCampus) : '',
      _department:    iDept   >= 0 ? get(iDept)   : '',
      _requestorEmail:get(iEmail),
    };
  }

  async function handleImportFile(e){
    var file = e.target.files[0];
    e.target.value = '';
    if(!file) return;
    var isCsv = /\.csv$/i.test(file.name);
    try {
      if(isCsv){
        // Disposal Request CSV
        var reader = new FileReader();
        reader.onload = function(ev){
          try {
            var ticket = importFromDisposalCsv(ev.target.result, file.name);
            ticket.ticketNo = file.name.replace(/\.(csv|xlsx|xls)$/i, "").trim();
            setActive(ticket);
            setView("new");
            var count = ticket.expectedAssets.length;
            setImportMsg({ok:true, text:(count>0 ? count+" serial(s)" : "No serials")+" loaded from "+file.name+" — enter the TDX ticket number and save."});
            setTimeout(function(){ setImportMsg(null); }, 6000);
          } catch(err){
            setImportMsg({ok:false, text:"Import failed: "+err.message});
            setTimeout(function(){ setImportMsg(null); }, 5000);
          }
        };
        reader.readAsText(file);
      } else {
        // Client Excel spreadsheet
        var result = await readXlsxFile(file);
        if(result.warning && (!result.serials || result.serials.length === 0)){
          setImportMsg({ok:false, text:result.warning});
          setTimeout(function(){ setImportMsg(null); }, 5000);
          return;
        }
        var newTicket = {
          id:             uid(),
          ticketNo:       file.name.replace(/\.(xlsx|xls|csv)$/i, "").trim(),
          date:           localDateStr(),
          site:           "",
          requestor:      "",
          phone:          "",
          notes:          result.warning ? ("Note: "+result.warning) : "",
          expectedAssets: result.serials || [],
          itemCounts:     result.itemCounts || {lcdMonitors:0, miscBoxes:0, hardDriveBoxes:0, printers:0},
          pickupScanned:  false,
          pickupResult:   null,
          assets:         [],
          _importedFrom:  file.name,
        };
        setActive(newTicket);
        setView("new");
        setImportMsg({ok:true, text:(result.serials||[]).length+" serial(s) loaded from "+file.name+" — enter the ticket number and save."});
        setTimeout(function(){ setImportMsg(null); }, 6000);
      }
    } catch(err){
      setImportMsg({ok:false, text:"Import failed: "+err.message});
      setTimeout(function(){ setImportMsg(null); }, 5000);
    }
  }

                              return orig ? orig : {serial:a.serial, manufacturer:a.manufacturer||"", machineType:a.machineType||"", ouInventory:a.ouInventory||"", addedAt:a.addedAt||""};
                            });
                            return {
                              ...x,
                              approvalStatus:  "validated",
                              validatedAt:     new Date().toLocaleString(),
                              pickupScanList:  keptScans,
                              pickupResult:    {...prX, missing:fin.missing, partial:fin.partial},
                              assets:          fin.assets,
                              expectedAssets:  syncedExpected,
                              originalAssets:  x.originalAssets || x.expectedAssets, // freeze original on first validation
                            };
                          }); });
                        }} style={{background:"linear-gradient(135deg,#052e16,#166534)",color:"#86efac",border:"1px solid #166534",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500}}>✓ Mark Validated</button>
                      )}
                    </React.Fragment>
                  )}
                  <button onClick={function(){ setHistoryTicket(t); }} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>📋 History</button>
                  <button onClick={function(){ openEdit(t); }} style={{background:"#0f172a",color:"#93c5fd",border:"1px solid #1e3a5f",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{readOnly?"View":"Open / Edit"}</button>
                </div>
              </div>
            );
          })}
        </div>
        );
      })()}
      {historyTicket && (
        <CustodyModal
          title={"Chain of Custody — #"+(historyTicket.ticketNo||"(no number)")}
          subtitle={(historyTicket.requestor?historyTicket.requestor+" · ":"")+(historyTicket.site||"")}
          events={(custodyEvents||[]).filter(function(ev){ return (ev.ticketIds||[]).indexOf(historyTicket.id)!==-1; })}
          onClose={function(){ setHistoryTicket(null); }}/>
      )}
    </div>
  );
}

// ── Ticket Form ───────────────────────────────────────────────────
function TicketForm({ticket, tickets, locations, requestors, onSave, onCancel, onDelete, onRescan, isNew, custodyEvents, readOnly}){
  const defaultCounts = {lcdMonitors:0, miscBoxes:0, hardDriveBoxes:0, printers:0};
  const [form, setForm]           = useState({...ticket, expectedAssets:[...(ticket.expectedAssets||[])], itemCounts:{...defaultCounts,...(ticket.itemCounts||{})}});
  const [xlsxCols, setXlsxCols]   = useState([]);
  const [xlsxRows, setXlsxRows]   = useState([]);
  const [xlsxCol, setXlsxCol]     = useState("");
  const [xlsxFileName, setXlsxFileName] = useState("");
  const [xlsxMsg, setXlsxMsg]     = useState(null);
  const [manualInput, setManualInput] = useState("");
  const [manualFocus, setManualFocus] = useState(false);
  const [inputMode, setInputMode] = useState("manual");
  const [showCustody, setShowCustody] = useState(false); // custody fold-out (BUILD 3)
  const xlsxRef   = useRef();
  const manualRef = useRef();

  function setF(k,v){ setForm(function(f){ return {...f, [k]:v}; }); }

  async function handleXlsxUpload(e){
    const file = e.target.files[0]; if(!file) return;
    setXlsxFileName(file.name); setXlsxMsg(null); setXlsxCols([]); setXlsxRows([]); setXlsxCol("");
    try {
      const result = await readXlsxFile(file);
      if(result.warning){ setXlsxMsg({ok:false, text:result.warning}); return; }
      // Build header array for column picker
      const headers = result.rawHeaders || [];
      setXlsxCols(headers);
      // Store full rows for import — we'll rebuild from result serials later
      setXlsxRows(result.serials);
      // Auto-select: pre-fill item counts
      setForm(function(f){ return {...f, itemCounts:{...defaultCounts, ...result.itemCounts}}; });
      const cf = result.colsFound || {};
      const colInfo = [cf.manufacturer?"✓ Manufacturer":"✗ Manufacturer", cf.machineType?"✓ Type":"✗ Type", cf.ouInventory?"✓ Asset Tag":"✗ Asset Tag"].join("  ");
      setXlsxMsg({ok:true, text:`File loaded — ${result.serials.length} serials found.  Columns: ${colInfo}.  Click "Import All" to add.`});
    } catch(err){
      setXlsxMsg({ok:false, text:"Failed to read file: "+err.message});
    }
    e.target.value = "";
  }

  function importAllSerials(){
    if(!xlsxRows.length) return;
    const now = new Date().toLocaleString();
    let added=0, dupes=0;
    setForm(function(f){
      const existing = new Set(f.expectedAssets.map(function(a){ return a.serial; }));
      const newA = [];
      xlsxRows.forEach(function(a){
        if(!a.serial) return;
        if(existing.has(a.serial)){ dupes++; return; }
        existing.add(a.serial);
        newA.push(a);
        added++;
      });
      return {...f, expectedAssets:[...newA, ...f.expectedAssets]};
    });
    setXlsxMsg({ok:true, text:`✓ Imported ${added} serial${added!==1?"s":""}${dupes>0?` · ${dupes} duplicate${dupes!==1?"s":""} skipped`:""}`});
    setXlsxCols([]); setXlsxRows([]); setXlsxCol(""); setXlsxFileName("");
  }

  function addManual(raw){
    const serial = raw.trim().toUpperCase(); if(!serial) return;
    if(form.expectedAssets.find(function(a){ return a.serial===serial; })){
      setXlsxMsg({ok:false, text:`⚠ ${serial} already in list`});
      setTimeout(function(){ setXlsxMsg(null); }, 1500);
      setManualInput(""); return;
    }
    setForm(function(f){ return {...f, expectedAssets:[{serial, manufacturer:"", machineType:"", ouInventory:"", addedAt:new Date().toLocaleString()}, ...f.expectedAssets]}; });
    setManualInput("");
  }

  function removeExpected(serial){ setForm(function(f){ return {...f, expectedAssets:f.expectedAssets.filter(function(a){ return a.serial!==serial; })}; }); }

  // Derive status for display in form
  var ps = pickupStatus(form);
  var isAwaitingApproval = ps === "awaiting-approval";
  var pr = form.pickupResult || null;

  function regenApprovalPdf(){
    if(!pr) return;
    var sigRec = form.approvalSignature||null;
    var isRecord = !!sigRec || form.approvalStatus==="validated"; // decisions print once validated
    var jspdf = window.jspdf || window.jsPDF;
    if(!jspdf){ alert("PDF library not loaded."); return; }
    // Reconstruct resolved from pickupResult
    var resolved = {
      missing:  (pr.missing||[]).filter(function(m){ return !m.linkedTo; }),
      extra:    (pr.extra||[]).filter(function(e){ return !e.linkedTo; }),
      partial:  pr.partial||[],
    };
    // Re-use existing generateApprovalPdf function can't be called directly here
    // so build it inline
    var doc = new jspdf.jsPDF({orientation:"landscape", unit:"pt", format:"letter"});
    var pageW = doc.internal.pageSize.getWidth();
    var margin = 36;
    doc.setFillColor(15,23,42); doc.rect(0,0,pageW,60,"F");
    doc.setFont("helvetica","bold"); doc.setFontSize(16); doc.setTextColor(241,245,249);
    doc.text(sigRec ? "IT Asset Disposal — Approval Record (Signed)" : isRecord ? "IT Asset Disposal — Approval Record" : "IT Asset Disposal — Approval Required", margin, 24);
    doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(148,163,184);
    doc.text("Ticket: "+form.ticketNo+"   |   Requestor: "+(form.requestor||"—")+"   |   Site: "+(form.site||"—"), margin, 42);
    var legendItems = [
      {label:"Missing — on ticket, not picked up", r:254,g:226,b:226},
      {label:"Extra — picked up, not on ticket",   r:219,g:234,b:254},
      {label:"Proposed Correction",                r:254,g:252,b:202},
    ];
    var lx = margin; var ly = 74;
    legendItems.forEach(function(li){
      doc.setFillColor(li.r,li.g,li.b);
      doc.roundedRect(lx,ly,10,10,2,2,"F");
      doc.setTextColor(71,85,105); doc.setFontSize(8);
      doc.text(li.label, lx+13, ly+8);
      lx += doc.getTextWidth(li.label)+26;
    });
    var bodyRows = []; var rowStyles = {};
    var idx = 0;
    resolved.missing.forEach(function(m){
      bodyRows.push(["Missing", m.serial||"", "", m.manufacturer||"", m.machineType||"", m.ouInventory||"", isRecord?"APPROVED":""]);
      rowStyles[idx++] = {fillColor:[254,226,226]};
    });
    // Extras from pickupResult buckets — same source as the send-time PDF (Build 1a)
    (resolved.extra||[]).forEach(function(e){
      bodyRows.push(["Extra", "", e.serial||"", "", "", "", isRecord?(e.resolution==="remove"?"DENIED":"APPROVED"):""]);
      rowStyles[idx++] = {fillColor:[219,234,254]};
    });
    actionableCorrections(resolved.partial).forEach(function(p){
      bodyRows.push(["Proposed Correction", p.expectedSerial||"", (p.canonical||p.scannedSerial||"")+((p.scannedSerial&&p.canonical&&p.scannedSerial!==p.canonical)?"\n(captured: "+p.scannedSerial+")":""), p.manufacturer||"", p.machineType||"", p.ouInventory||"", isRecord?"APPROVED":""]);
      rowStyles[idx++] = {fillColor:[254,252,202]};
    });
    // Linked pairs
    (pr.missing||[]).filter(function(m){ return m.linkedTo; }).forEach(function(m){
      var ex = (pr.extra||[]).find(function(e){ return e.id===m.linkedTo; });
      bodyRows.push(["Proposed Correction", m.serial||"", ex?ex.serial:"", m.manufacturer||"", m.machineType||"", m.ouInventory||"", isRecord?"APPROVED":""]);
      rowStyles[idx++] = {fillColor:[254,252,202]};
    });
    doc.autoTable({
      startY:96, margin:{left:margin,right:margin},
      head:[[
        {content:"Type",styles:{cellWidth:90}},
        {content:"Serial # on Ticket",styles:{cellWidth:110}},
        {content:"Will Record As",styles:{cellWidth:110}},
        {content:"Manufacturer",styles:{cellWidth:80}},
        {content:"Machine Type",styles:{cellWidth:90}},
        {content:"Asset Tag",styles:{cellWidth:70}},
        {content:"Decision (APPROVED / DENIED)",styles:{cellWidth:140}},
      ]],
      body:bodyRows, theme:"grid",
      headStyles:{fillColor:[30,41,59],textColor:[241,245,249],fontSize:8,fontStyle:"bold",cellPadding:5},
      bodyStyles:{fontSize:8,cellPadding:5,textColor:[15,23,42]},
      didParseCell:function(data){ if(data.section==="body"&&rowStyles[data.row.index]) data.cell.styles.fillColor=rowStyles[data.row.index].fillColor; },
    });
    var footY = doc.lastAutoTable.finalY+20;
    doc.setFontSize(7); doc.setTextColor(148,163,184);
    doc.text("Generated by AssetTrack  |  Ticket: "+form.ticketNo+"  |  "+new Date().toLocaleString(), margin, footY);
    if(sigRec){
      var sh2 = doc.internal.pageSize.getHeight();
      if(footY+78 > sh2-36){ doc.addPage(); footY = 36; }
      try{ doc.addImage(sigRec.dataUrl, "PNG", margin, footY+10, 160, 36); }catch(err){}
      doc.setDrawColor(148,163,184); doc.setLineWidth(0.5);
      doc.line(margin, footY+50, margin+200, footY+50);
      doc.setFontSize(8); doc.setTextColor(100,116,139);
      doc.text("Requestor Signature — "+(sigRec.printedName||"")+"  |  "+(sigRec.signedAt||""), margin, footY+60);
    }

    // ── Page 2: All scanned serials ──────────────────────────────
    var scanList2 = (form.pickupScanList||[]).length ? form.pickupScanList
      : (form.assets||[]).map(function(a){ return a.serial; }).filter(Boolean);
    if(scanList2.length){
      doc.addPage();
      doc.setFillColor(15,23,42); doc.rect(0,0,pageW,44,"F");
      doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.setTextColor(241,245,249);
      doc.text("All Scanned Serials — Ticket #"+form.ticketNo, margin, 20);
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
      doc.text(scanList2.length+" serial"+(scanList2.length!==1?"s":"")+" scanned  |  "+(form.site||"")+"  |  "+new Date().toLocaleDateString(), margin, 34);

      var colW2 = 180; var cols2 = Math.floor((pageW - margin*2) / colW2);
      var rowH2 = 16; var startY2 = 60; var x2 = margin; var y2 = startY2; var col2 = 0;
      scanList2.slice().sort().forEach(function(s){
        if(y2 + rowH2 > doc.internal.pageSize.getHeight() - margin){
          col2++; if(col2 >= cols2){ doc.addPage(); col2=0; y2=startY2; } else { y2=startY2; }
          x2 = margin + col2*colW2;
        }
        doc.setFont("courier","normal"); doc.setFontSize(9); doc.setTextColor(15,23,42);
        doc.text(s, x2, y2);
        y2 += rowH2;
      });

      doc.setFontSize(7); doc.setTextColor(71,85,105);
      doc.text("Page 2 of ApprovalRequest-"+form.ticketNo+".pdf  |  Generated by AssetTrack", margin, doc.internal.pageSize.getHeight()-10);
    }

    doc.save("ApprovalRequest-"+form.ticketNo+".pdf");
  }

  // Build 1b: one decision writer for the awaiting-approval panel. Buttons
  // only name their verb; consequences apply in finalizePickup at validation.
  function setPrRes(bucket, id, val){
    setForm(function(f){
      if(!f.pickupResult) return f;
      var pr2 = {...f.pickupResult};
      pr2[bucket] = (pr2[bucket]||[]).map(function(it){
        if(it.id!==id) return it;
        var next = {...it, resolution:val};
        if(bucket==="missing") next.approvedMissing = (val==="kept");
        return next;
      });
      return {...f, pickupResult:pr2};
    });
  }

  function suggestPickupDate(siteName){
    if(form.scheduledPickupDate) return;
    var loc = (locations||[]).find(function(l){ return l.name===siteName; });
    if(!loc || !loc.campus) return;
    var targetDay = loc.campus==="HC" ? 2 : 4;
    var d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+1);
    var tries = 0;
    while(d.getDay()!==targetDay && tries<14){ d.setDate(d.getDate()+1); tries++; }
    for(var weeks=0; weeks<8; weeks++){
      var dateStr = localDateStr(d);
      var count = (tickets||[]).filter(function(t){ return t.scheduledPickupDate===dateStr && t.id!==form.id; }).length;
      if(count<6){ setF("scheduledPickupDate", dateStr); return; }
      d.setDate(d.getDate()+7);
    }
  }

  function handleSave(){
    if(!form.ticketNo.trim()){ alert("Please enter a Ticket Number."); return; }
    // Block duplicate ticket numbers
    var normTkt = function(s){ var t=(s||"").trim(); if(!t) return ""; return /^\d+$/.test(t)?String(parseInt(t,10)):t.toUpperCase(); };
    var dup = (tickets||[]).find(function(t){ return t.id!==form.id && normTkt(t.ticketNo)===normTkt(form.ticketNo); });
    if(dup){ alert("Ticket number \""+form.ticketNo+"\" is already used by another ticket. Please use a unique number."); return; }
    // Warn if scheduled date is over capacity
    if(form.scheduledPickupDate){
      var spd = form.scheduledPickupDate;
      var loadCount = (tickets||[]).filter(function(t){ return t.scheduledPickupDate===spd && t.id!==form.id; }).length;
      if(loadCount >= 6){
        if(!confirm("This date already has "+loadCount+" tickets scheduled (at capacity of 6). Schedule anyway?")) return;
      }
    }
    // Remove denied extras from assets before saving
    var cleaned = {...form, assets:(form.assets||[]).filter(function(a){ return a.approved !== false; })};
    onSave(isNew ? {...cleaned, pickupScanned:false, pickupResult:null} : {...cleaned});
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <button onClick={onCancel} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,fontFamily:"inherit",padding:0}}>← Back to Tickets</button>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onCancel} style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>{readOnly?"Close":"Cancel"}</button>
          {!readOnly && <button onClick={handleSave} style={{background:"linear-gradient(135deg,#065f46,#0284c7)",color:"#fff",border:"none",borderRadius:8,padding:"8px 22px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>Save Ticket</button>}
        </div>
      </div>
      <div style={{fontFamily:"'Geist',sans-serif", fontWeight:700, fontSize:18, color:"#f1f5f9", marginBottom:16}}>{isNew?"New Pickup Ticket":`Editing Ticket #${form.ticketNo}`}</div>

      {!isNew && (function(){
        var tce = (custodyEvents||[]).filter(function(ev){ return (ev.ticketIds||[]).indexOf(form.id)!==-1; });
        return (
          <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",marginBottom:16}}>
            <div onClick={function(){ setShowCustody(function(v){ return !v; }); }} style={{padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
              <span style={{fontSize:13,fontWeight:600,color:"#93c5fd"}}>📋 Chain of Custody ({tce.length} event{tce.length!==1?"s":""})</span>
              <span style={{color:"#64748b",fontSize:12}}>{showCustody?"▴":"▾"}</span>
            </div>
            {showCustody && <div style={{padding:"0 20px 14px"}}><CustodyTimeline events={tce}/></div>}
          </div>
        );
      })()}

      {/* Metadata */}
      <div style={{background:"#1e293b", borderRadius:12, border:"1px solid #334155", padding:"20px 24px", marginBottom:20}}>
        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:16}}>
          {/* Ticket Number */}
          {(function(){
            function normTkt(s){ var t=(s||"").trim(); if(!t) return ""; return /^\d+$/.test(t)?String(parseInt(t,10)):t.toUpperCase(); }
            var typed = (form.ticketNo||"").trim();
            var dup = typed ? (tickets||[]).find(function(t){ return t.id!==form.id && normTkt(t.ticketNo)===normTkt(typed); }) : null;
            return (
              <div>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Ticket Number *</label>
                <input type="text" value={form.ticketNo} onChange={function(e){ setF("ticketNo",e.target.value); }} placeholder="e.g. TKT-2026-001"
                  style={{width:"100%",background:"#0f172a",border:"1px solid "+(dup?"#7f1d1d":"#334155"),borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit"}}/>
                {dup && (
                  <div style={{marginTop:4,fontSize:11,color:"#fca5a5",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span>⚠ Already used —</span>
                    <button type="button" onClick={function(){ if(confirm("Discard current changes and open ticket #"+dup.ticketNo+"?")) onCancel(); }}
                      style={{background:"none",border:"none",color:"#93c5fd",cursor:"pointer",fontSize:11,fontFamily:"inherit",padding:0,textDecoration:"underline"}}>view existing ticket →</button>
                  </div>
                )}
              </div>
            );
          })()}
          {/* Date Submitted */}
          <div>
            <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Date Submitted</label>
            <input type="date" value={form.date} onChange={function(e){ setF("date",e.target.value); }}
              style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit"}}/>
          </div>
          {/* Scheduled Pickup Date */}
          {(function(){
            var spd = form.scheduledPickupDate||"";
            var loadCount = spd ? (tickets||[]).filter(function(t){ return t.scheduledPickupDate===spd && t.id!==form.id; }).length : 0;
            var overloaded = loadCount >= 6;
            var nearFull   = loadCount === 5;
            return (
              <div>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Scheduled Pickup Date</label>
                <input type="date" value={spd} onChange={function(e){ setF("scheduledPickupDate",e.target.value); }}
                  style={{width:"100%",background:"#0f172a",border:"1px solid "+(overloaded?"#7f1d1d":nearFull?"#a16207":"#334155"),borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit"}}/>
                {overloaded && <div style={{marginTop:4,fontSize:11,color:"#fca5a5"}}>⚠ {loadCount} tickets already scheduled this day — at capacity</div>}
                {nearFull   && <div style={{marginTop:4,fontSize:11,color:"#fde047"}}>⚠ {loadCount}/6 tickets already scheduled this day</div>}
                {spd && !overloaded && !nearFull && loadCount>0 && <div style={{marginTop:4,fontSize:11,color:"#64748b"}}>{loadCount}/6 tickets scheduled this day</div>}
              </div>
            );
          })()}
          {/* Site / Location — with datalist */}
          {(function(){
            var sites = [];
            var seen = new Set();
            // Prefer locations table, fall back to ticket history
            (locations||[]).forEach(function(l){
              var s = (l.name||"").trim();
              if(s && !seen.has(s)){ seen.add(s); sites.push(s); }
            });
            (tickets||[]).forEach(function(t){
              var s = (t.site||"").trim();
              if(s && !seen.has(s)){ seen.add(s); sites.push(s); }
            });
            sites.sort();
            return (
              <div>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Site / Location</label>
                <input type="text" value={form.site} onChange={function(e){
                    setF("site",e.target.value);
                    suggestPickupDate(e.target.value);
                  }}
                  placeholder="e.g. Main Campus Bldg A" list="site-suggestions"
                  style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit"}}/>
                {form.site && (
                  <datalist id="site-suggestions">
                    {sites.map(function(s){ return <option key={s} value={s}/>; })}
                  </datalist>
                )}
              </div>
            );
          })()}
          {/* Requestor — with datalist + phone autofill */}
          {(function(){
            var reqNames = [];
            var seen = new Set();
            // Prefer requestors table, fall back to ticket history
            (requestors||[]).forEach(function(r){
              var n = (r.name||"").trim();
              if(n && !seen.has(n)){ seen.add(n); reqNames.push(n); }
            });
            (tickets||[]).forEach(function(t){
              var n = (t.requestor||"").trim();
              if(n && !seen.has(n)){ seen.add(n); reqNames.push(n); }
            });
            reqNames.sort();
            function handleRequestorChange(val){
              setF("requestor", val);
              if(!val.trim()) return;
              // Check requestors table first, then ticket history
              var fromTable = (requestors||[]).find(function(r){ return (r.name||"").trim()===val.trim(); });
              if(fromTable && fromTable.phone){ setF("phone", fromTable.phone); return; }
              var fromTicket = (tickets||[]).find(function(t){ return (t.requestor||"").trim()===val.trim() && t.phone; });
              if(fromTicket) setF("phone", fromTicket.phone);
            }

            return (
              <div>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Requestor</label>
                <input type="text" value={form.requestor} onChange={function(e){ handleRequestorChange(e.target.value); }}
                  placeholder="requestor@ou.edu" list="requestor-suggestions"
                  style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit"}}/>
                {form.requestor && (
                  <datalist id="requestor-suggestions">
                    {reqNames.map(function(r){ return <option key={r} value={r}/>; })}
                  </datalist>
                )}
              </div>
            );
          })()}
          {/* Phone */}
          <div>
            <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Phone</label>
            <input type="text" value={form.phone||""} placeholder="(555) 555-5555"
              onChange={function(e){
                var digits = e.target.value.replace(/\D/g,"").slice(0,10);
                var fmt = digits;
                if(digits.length >= 7) fmt = "("+digits.slice(0,3)+") "+digits.slice(3,6)+"-"+digits.slice(6);
                else if(digits.length >= 4) fmt = "("+digits.slice(0,3)+") "+digits.slice(3);
                else if(digits.length > 0) fmt = "("+digits;
                setF("phone", fmt);
              }}
              style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",letterSpacing:0.5}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Vendor Pickup #</label>
            <input type="text" value={form.vendorPickupNo||""} placeholder="NN-NNNNNNNN-NN"
              onChange={function(e){
                var raw = e.target.value.replace(/[^0-9]/g,"");
                var fmt = raw;
                if(raw.length > 2)  fmt = raw.slice(0,2)+"-"+raw.slice(2);
                if(raw.length > 10) fmt = raw.slice(0,2)+"-"+raw.slice(2,10)+"-"+raw.slice(10,12);
                setF("vendorPickupNo", fmt);
              }}
              maxLength={14}
              style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:14,fontFamily:"'Geist Mono',monospace",letterSpacing:1}}/>
            {(form.vendorPickupNo||"").length > 0 && (function(){
              var parts = (form.vendorPickupNo||"").split("-");
              var vendor = parts[0]==="01"?"VantagePoint":parts[0]==="02"?"Marrs":parts[0]==="03"?"CDR":null;
              if(!vendor) return null;
              return <div style={{marginTop:4,fontSize:11,color:"#93c5fd"}}>🏢 {vendor}</div>;
            })()}
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Notes</label>
            <textarea value={form.notes} onChange={function(e){ setF("notes",e.target.value); }} placeholder="Optional notes..." rows={2}
              style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",resize:"vertical"}}/>
          </div>
        </div>
      </div>

      {/* Item Counts */}
      <div style={{background:"#1e293b", borderRadius:12, border:"1px solid #334155", padding:"20px 24px", marginBottom:20}}>
        <div style={{fontFamily:"'Geist',sans-serif", fontWeight:700, fontSize:14, color:"#e2e8f0", marginBottom:4}}>Item Counts</div>
        <div style={{fontSize:11, color:"#64748b", marginBottom:14}}>Non-serialized items from the spreadsheet. Not confirmed during pickup — informational only.</div>
        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))", gap:14}}>
          {[
            {label:"LCD / Flat Panel Monitors", key:"lcdMonitors",  icon:"🖥"},
            {label:"Boxes w/ Misc Items",        key:"miscBoxes",    icon:"📦"},
            {label:"Boxes of Hard Drives/Media", key:"hardDriveBoxes",icon:"💿"},
            {label:"Printers",                   key:"printers",     icon:"🖨"},
          ].map(function({label,key,icon}){
            return (
              <div key={key}>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.7,marginBottom:6}}>{icon} {label}</label>
                <input type="number" min="0" value={form.itemCounts[key]||0}
                  onChange={function(e){ setForm(function(f){ return {...f, itemCounts:{...f.itemCounts, [key]:parseInt(e.target.value)||0}}; }); }}
                  style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:14,fontFamily:"inherit",textAlign:"center"}}/>
              </div>
            );
          })}
        </div>
      </div>

      {/* Expected Serials */}
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12, flexWrap:"wrap", gap:10}}>
        <div>
          <div style={{fontFamily:"'Geist',sans-serif", fontWeight:700, fontSize:15, color:"#e2e8f0"}}>Expected Serial Numbers</div>
          <div style={{fontSize:11, color:"#64748b", marginTop:2}}>Serials listed on the client's spreadsheet — what you expect to pick up.</div>
        </div>
        </div>

      {true && (
        <div style={{marginBottom:16}}>
          <div style={{display:"flex", gap:10, marginBottom:10}}>
            <input ref={manualRef} value={manualInput} onChange={function(e){ setManualInput(e.target.value); }}
              onKeyDown={function(e){ if(e.key==="Enter") addManual(manualInput); }}
              onFocus={function(){ setManualFocus(true); }} onBlur={function(){ setManualFocus(false); }}
              placeholder="Serial numbers"
              style={{flex:1,background:"#1e293b",border:`2px solid ${manualFocus?"#3b82f6":"#334155"}`,borderRadius:8,color:"#f1f5f9",padding:"11px 14px",fontSize:14,fontFamily:"inherit",letterSpacing:1,transition:"border-color 0.2s"}}/>
            <button onClick={function(){ addManual(manualInput); }} style={{background:"linear-gradient(135deg,#1d4ed8,#0284c7)",color:"#fff",border:"none",borderRadius:8,padding:"11px 20px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Add</button>
          </div>
          {xlsxMsg && <div style={{padding:"8px 14px",borderRadius:6,marginBottom:10,fontSize:13,background:"#450a0a",color:"#fca5a5",border:"1px solid #7f1d1d"}}>{xlsxMsg.text}</div>}
        </div>
      )}

      {form.expectedAssets.length===0 ? (
        <div style={{textAlign:"center",padding:"36px",border:"1px dashed #334155",borderRadius:10,color:"#475569",fontSize:13,marginBottom:20}}>No expected serials added yet.</div>
      ) : (
        <div style={{overflowX:"auto", marginBottom:20}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:700}}>
            <thead><tr style={{borderBottom:"1px solid #1e3a5f"}}>
              <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500,width:36}}>#</th>
              <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500}}>Serial Number</th>
              <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500}}>Manufacturer</th>
              <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500}}>Machine Type</th>
              <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500}}>Asset Tag (OU)</th>
              <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500,fontSize:10}}>Added</th>
              <th style={{width:36}}></th>
            </tr></thead>
            <tbody>
              {form.expectedAssets.map(function(a,i){
                return (
                  <tr key={a.serial} className={i===0?"row-in":""} style={{borderBottom:"1px solid #1e293b"}}>
                    <td style={{padding:"9px 12px",color:"#475569",fontSize:11}}>{form.expectedAssets.length-i}</td>
                    <td style={{padding:"9px 12px",letterSpacing:1.1,fontWeight:500,whiteSpace:"nowrap"}}>
                      <span style={{color:a.duplicate?"#fde047":"#e2e8f0"}}>{a.serial}</span>
                      {a.duplicate&&<span style={{marginLeft:7,fontSize:10,color:"#a16207",background:"#422006",border:"1px solid #a16207",borderRadius:4,padding:"1px 6px"}}>duplicate</span>}
                    </td>
                    <td style={{padding:"9px 12px",color:"#94a3b8",fontSize:12}}>{a.manufacturer||"—"}</td>
                    <td style={{padding:"9px 12px",color:"#94a3b8",fontSize:12}}>{a.machineType||"—"}</td>
                    <td style={{padding:"6px 8px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <input
                          type="text"
                          value={a.ouInventory||""}
                          onChange={function(e){
                            var val = e.target.value;
                            setForm(function(f){
                              var updated = f.expectedAssets.map(function(x){
                                return x.serial===a.serial ? {...x, ouInventory:val} : x;
                              });
                              return {...f, expectedAssets:updated};
                            });
                          }}
                          placeholder="—"
                          style={{background:"transparent",border:"1px solid "+(isBlankTag(a.ouInventory)?"transparent":"transparent"),borderRadius:5,color:isBlankTag(a.ouInventory)?"#475569":"#7dd3fc",fontSize:12,padding:"3px 7px",flex:1,minWidth:80,fontFamily:"inherit",outline:"none",transition:"border-color 0.15s, background 0.15s"}}
                          onFocus={function(e){ e.target.style.borderColor="#0284c7"; e.target.style.background="#0c1a2e"; }}
                          onBlur={function(e){ e.target.style.borderColor="transparent"; e.target.style.background="transparent"; }}
                        />
                        {(a.ouInventory||"").trim() && (
                          <button onClick={function(){
                            setForm(function(f){
                              return {...f, expectedAssets:f.expectedAssets.map(function(x){
                                return x.serial===a.serial ? {...x, ouInventory:""} : x;
                              })};
                            });
                          }} title="Clear asset tag" style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:13,padding:"2px 4px",lineHeight:1,flexShrink:0}}>×</button>
                        )}
                        {!isBlankTag(a.ouInventory) ? null : (a.ouInventory||"").trim() ? (
                          <span title="This value will be treated as no tag during reconciliation" style={{fontSize:9,color:"#a16207",background:"#422006",border:"1px solid #a16207",borderRadius:3,padding:"1px 4px",flexShrink:0,whiteSpace:"nowrap"}}>ignored</span>
                        ) : null}
                      </div>
                    </td>
                    <td style={{padding:"9px 12px",color:"#475569",fontSize:10,whiteSpace:"nowrap"}}>{a.addedAt}</td>
                    <td style={{padding:"9px 12px"}}><button className="del-btn" onClick={function(){ removeExpected(a.serial); }} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* ── Awaiting Approval View ── */}
      {!isNew && isAwaitingApproval && pr && (
        <div style={{marginBottom:20}}>
          <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:15,color:"#fb923c",marginBottom:12}}>⏳ Awaiting Approval — Pickup Results</div>

          {/* Matched */}
          {(pr.matched||[]).length>0 && (
            <details style={{marginBottom:8}}>
              <summary style={{cursor:"pointer",background:"#052e16",border:"1px solid #166534",borderRadius:8,padding:"10px 14px",color:"#86efac",fontSize:13,fontWeight:500,listStyle:"none",display:"flex",alignItems:"center",gap:8}}>
                ✅ Matched ({(pr.matched||[]).length}) <span style={{marginLeft:"auto",fontSize:11,color:"#166534"}}>▾ show</span>
              </summary>
              <div style={{background:"#0a1f0a",border:"1px solid #166534",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"8px 14px"}}>
                {(pr.matched||[]).map(function(m,i){ return <div key={i} style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:"#86efac",padding:"3px 0",borderBottom:"1px solid #0f2d0f"}}>{m.serial}</div>; })}
              </div>
            </details>
          )}

          {/* Proposed Corrections — verbs write pickupResult; finalizePickup applies at validation (Build 1b) */}
          {(function(){
            var decidable = (pr.partial||[]).filter(function(p){ return !(isNoopCorrection(p) && p.resolution==="accept"); });
            var linkedCnt = (pr.missing||[]).filter(function(m){ return m.linkedTo; }).length;
            if(decidable.length+linkedCnt===0) return null;
            return (
            <div style={{background:"#1e1040",border:"1px solid #a78bfa",borderRadius:8,padding:"12px 14px",marginBottom:8}}>
              <div style={{color:"#a78bfa",fontWeight:600,fontSize:13,marginBottom:8}}>🔧 Proposed Corrections ({decidable.length+linkedCnt})</div>
              {decidable.map(function(p,i){
                var acc = p.resolution==="accept", rej = p.resolution==="reject";
                return <div key={i} style={{display:"flex",gap:10,alignItems:"center",padding:"4px 0",borderBottom:"1px solid #2e1065",flexWrap:"wrap",opacity:rej?0.6:1}}>
                  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:"#fca5a5",textDecoration:"line-through"}}>{p.expectedSerial}</span>
                  <span style={{color:"#6d28d9"}}>→</span>
                  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:"#86efac"}}>{p.canonical||p.scannedSerial}</span>
                  {p.distance>0 && <span style={{fontSize:10,color:"#64748b"}}>{p.distance} char(s) apart</span>}
                  {p.scannedSerial && p.canonical && p.scannedSerial!==p.canonical && <span style={{fontSize:10,color:"#64748b",fontFamily:"'Geist Mono',monospace"}}>captured as: {p.scannedSerial}</span>}
                  <span style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
                    {acc && <span style={{fontSize:10,color:"#86efac",border:"1px solid #166534",borderRadius:4,padding:"1px 6px"}}>✓ Accepted</span>}
                    {rej && <span style={{fontSize:10,color:"#fca5a5",border:"1px solid #7f1d1d",borderRadius:4,padding:"1px 6px"}}>✕ Rejected</span>}
                    {(acc||rej)
                      ? <button onClick={function(){ setPrRes("partial", p.id, null); }} style={{background:"none",border:"1px solid #334155",borderRadius:5,color:"#475569",cursor:"pointer",fontSize:10,padding:"2px 8px",fontFamily:"inherit"}}>Undo</button>
                      : <React.Fragment>
                          <button onClick={function(){ setPrRes("partial", p.id, "accept"); }} style={{background:"none",border:"1px solid #10b981",borderRadius:5,color:"#86efac",cursor:"pointer",fontSize:11,padding:"3px 10px",fontFamily:"inherit"}}>Accept</button>
                          <button onClick={function(){ setPrRes("partial", p.id, "reject"); }} style={{background:"none",border:"1px solid #7f1d1d",borderRadius:5,color:"#fca5a5",cursor:"pointer",fontSize:11,padding:"3px 10px",fontFamily:"inherit"}}>Reject</button>
                        </React.Fragment>}
                  </span>
                </div>;
              })}
              {(pr.missing||[]).filter(function(m){ return m.linkedTo; }).map(function(m,i){
                var ex = (pr.extra||[]).find(function(e){ return e.id===m.linkedTo; });
                return <div key={"l"+i} style={{display:"flex",gap:10,alignItems:"center",padding:"4px 0",borderBottom:"1px solid #2e1065",flexWrap:"wrap"}}>
                  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:"#fca5a5",textDecoration:"line-through"}}>{m.serial}</span>
                  <span style={{color:"#6d28d9"}}>→</span>
                  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:"#86efac"}}>{ex?ex.serial:"?"}</span>
                  <span style={{fontSize:10,color:"#64748b"}}>linked match</span>
                </div>;
              })}
            </div>
            );
          })()}

          {/* Missing */}
          {(pr.missing||[]).filter(function(m){ return !m.linkedTo; }).length>0 && (
            <div style={{background:"#200a0a",border:"1px solid #7f1d1d",borderRadius:8,padding:"12px 14px",marginBottom:8}}>
              <div style={{color:"#fca5a5",fontWeight:600,fontSize:13,marginBottom:4}}>❌ Missing ({(pr.missing||[]).filter(function(m){ return !m.linkedTo; }).length})</div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>Confirm each item the customer kept — not picked up.</div>
              {(pr.missing||[]).filter(function(m){ return !m.linkedTo; }).map(function(m,i){
                var approved = m.approvedMissing===true || m.resolution==="kept";
                return (
                  <div key={i} style={{display:"flex",gap:10,alignItems:"center",padding:"5px 0",borderBottom:"1px solid #450a0a",flexWrap:"wrap",opacity:approved?0.5:1}}>
                    <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:"#fca5a5",textDecoration:approved?"line-through":"none"}}>{m.serial}</span>
                    {m.manufacturer&&<span style={{fontSize:10,color:"#64748b"}}>{m.manufacturer}</span>}
                    {m.machineType&&<span style={{fontSize:10,color:"#64748b"}}>{m.machineType}</span>}
                    {approved
                      ? <React.Fragment>
                          <span style={{fontSize:10,color:"#86efac",border:"1px solid #166534",borderRadius:4,padding:"1px 6px"}}>✓ Kept — not picked up</span>
                          <button onClick={function(){ setPrRes("missing", m.id, null); }} style={{marginLeft:"auto",background:"none",border:"1px solid #334155",borderRadius:5,color:"#475569",cursor:"pointer",fontSize:10,padding:"2px 8px",fontFamily:"inherit"}}>Undo</button>
                        </React.Fragment>
                      : <button onClick={function(){ setPrRes("missing", m.id, "kept"); }} style={{marginLeft:"auto",background:"none",border:"1px solid #166534",borderRadius:5,color:"#86efac",cursor:"pointer",fontSize:11,padding:"3px 10px",fontFamily:"inherit"}}>✓ Confirm Kept</button>
                    }
                  </div>
                );
              })}
            </div>
          )}

          {/* Extras — verbs write pickupResult; finalizePickup applies at validation (Build 1b) */}
          {(pr.extra||[]).filter(function(e){ return !e.linkedTo; }).length>0 && (
            <div style={{background:"#0c1a2e",border:"1px solid #1e40af",borderRadius:8,padding:"12px 14px",marginBottom:8}}>
              <div style={{color:"#93c5fd",fontWeight:600,fontSize:13,marginBottom:8}}>➕ Extra — Scanned but not on ticket</div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>Include to add each item to the record, or remove it.</div>
              {(pr.extra||[]).filter(function(e){ return !e.linkedTo; }).map(function(x,i){
                var inc = x.resolution==="include", rem = x.resolution==="remove";
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:"1px solid #1e293b",flexWrap:"wrap",opacity:rem?0.4:1}}>
                    <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:"#93c5fd",textDecoration:rem?"line-through":"none"}}>{x.serial}</span>
                    {inc && <span style={{fontSize:10,color:"#86efac",border:"1px solid #166534",borderRadius:4,padding:"1px 6px"}}>✓ Included</span>}
                    {rem && <span style={{fontSize:10,color:"#fca5a5",border:"1px solid #7f1d1d",borderRadius:4,padding:"1px 6px"}}>✕ Removed</span>}
                    {!inc && !rem && (
                      <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                        <button onClick={function(){ setPrRes("extra", x.id, "include"); }} style={{background:"none",border:"1px solid #166534",borderRadius:5,color:"#86efac",cursor:"pointer",fontSize:11,padding:"3px 10px",fontFamily:"inherit"}}>✓ Include</button>
                        <button onClick={function(){ setPrRes("extra", x.id, "remove"); }} style={{background:"none",border:"1px solid #7f1d1d",borderRadius:5,color:"#fca5a5",cursor:"pointer",fontSize:11,padding:"3px 10px",fontFamily:"inherit"}}>✗ Remove</button>
                      </div>
                    )}
                    {(inc||rem) && (
                      <button onClick={function(){ setPrRes("extra", x.id, null); }} style={{marginLeft:"auto",background:"none",border:"1px solid #334155",borderRadius:5,color:"#475569",cursor:"pointer",fontSize:10,padding:"2px 8px",fontFamily:"inherit"}}>Undo</button>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Waived */}
          {(pr.waived||[]).length>0 && (
            <div style={{background:"#1a0a2e",border:"1px solid #6d28d9",borderRadius:8,padding:"10px 14px",marginBottom:8}}>
              <div style={{color:"#c4b5fd",fontWeight:600,fontSize:13,marginBottom:6}}>⊘ Waived ({(pr.waived||[]).length})</div>
              {(pr.waived||[]).map(function(s,i){ return <div key={i} style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:"#7c3aed",textDecoration:"line-through",padding:"2px 0"}}>{s}</div>; })}
            </div>
          )}
        </div>
      )}

      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", borderTop:"1px solid #1e293b", paddingTop:20}}>
        <div style={{display:"flex", alignItems:"center", gap:10}}>
          <span style={{color:"#64748b",fontSize:12}}>{form.expectedAssets.length} expected serial{form.expectedAssets.length!==1?"s":""}</span>
          {!isNew && form.originalAssets && (
            <button onClick={function(){
              var rows = [["Serial Number","Manufacturer","Machine Type","Asset Tag"]];
              (form.originalAssets||[]).forEach(function(a){
                rows.push([a.serial||"", a.manufacturer||"", a.machineType||"", a.ouInventory||""]);
              });
              var ws = XLSX.utils.aoa_to_sheet(rows);
              ws["!cols"] = [{wch:26},{wch:18},{wch:20},{wch:18}];
              var wb = XLSX.utils.book_new();
              XLSX.utils.book_append_sheet(wb, ws, "Original List");
              XLSX.writeFile(wb, "OriginalList-"+form.ticketNo+".xlsx");
            }} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:7,padding:"6px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>⬇ Original Submitted List</button>
          )}
          {!isNew && (isAwaitingApproval || form.approvalStatus==="validated") && (
            <button onClick={regenApprovalPdf} style={{background:"linear-gradient(135deg,#92400e,#b45309)",color:"#fff",border:"none",borderRadius:7,padding:"6px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500}}>📄 Re-download Approval PDF</button>
          )}
          {!isNew && form.approvalStatus==="validated" && (
            <button onClick={function(){
              var confirmedAssets = (form.assets||[]).filter(function(a){ return a.approved !== false; });
              var rows = [["Serial Number","Manufacturer","Machine Type","Asset Tag","Source"]];
              confirmedAssets.forEach(function(a){
                rows.push([
                  a.serial||"",
                  a.manufacturer||"",
                  a.machineType||"",
                  a.ouInventory||"",
                  a.source||"scanned",
                ]);
              });
              var csv = rows.map(function(r){ return r.map(function(v){ var s=String(v); return s.indexOf(",")!==-1||s.indexOf('"')!==-1?'"'+s.replace(/"/g,'""')+'"':s; }).join(","); }).join("\r\n");
              var blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
              var url = URL.createObjectURL(blob);
              var a = document.createElement("a"); a.href=url; a.download="ConfirmedAssets-"+form.ticketNo+".csv"; a.click(); URL.revokeObjectURL(url);

        </div>

      </div>
    </div>
  );
}
