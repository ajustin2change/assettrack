    // -- Data-access repository (the swap seam) ------------------------------
    // The ONLY code that knows the backend is Firestore. Moving to the REST
    // backend later = reimplement this one object; nothing else changes.
    function repoDocToObj(d){ return Object.assign({}, d.data(), { id: d.id }); }
    function repoSnapToList(snap){ return snap.docs.map(repoDocToObj); }
    function repoSet(coll, data){
      var clean = JSON.parse(JSON.stringify(data)); // Firestore: strip undefined/functions
      return db.collection(coll).doc(data.id).set(clean);
    }
    var repo = {
      subscribeTickets:    function(cb){ return db.collection("tickets").orderBy("ticketNo").onSnapshot(function(s){ cb(repoSnapToList(s)); }); },
      subscribeShipments:  function(cb){ return db.collection("shipments").onSnapshot(function(s){ cb(repoSnapToList(s)); }); },
      subscribeLocations:  function(cb){ return db.collection("locations").onSnapshot(function(s){ cb(repoSnapToList(s)); }); },
      subscribeRequestors: function(cb){ return db.collection("requestors").onSnapshot(function(s){ cb(repoSnapToList(s)); }); },
      getTickets:    function(){ return db.collection("tickets").orderBy("ticketNo").get().then(repoSnapToList); },
      getShipments:  function(){ return db.collection("shipments").get().then(repoSnapToList); },
      getLocations:  function(){ return db.collection("locations").get().then(repoSnapToList); },
      getRequestors: function(){ return db.collection("requestors").get().then(repoSnapToList); },
      saveTicket:    function(t){  return repoSet("tickets", t); },
      saveShipment:  function(sh){ return repoSet("shipments", sh); },
      saveLocation:  function(l){  return repoSet("locations", l); },
      saveRequestor: function(r){  return repoSet("requestors", r); },
      // -- Chain-of-custody event log: APPEND-ONLY by design -------------
      // Deliberately NO update/delete methods: custody events are immutable
      // audit records. saveCustodyEvent does not reuse repoSet because the
      // server-side recordedAt must be attached AFTER the JSON cleaning pass
      // (a raw FieldValue would not survive JSON.parse/JSON.stringify).
      subscribeCustodyEvents: function(cb){ return db.collection("custodyEvents").onSnapshot(function(s){ cb(repoSnapToList(s)); }); },
      getCustodyEvents:       function(){ return db.collection("custodyEvents").get().then(repoSnapToList); },
      saveCustodyEvent:       function(ev){
        var clean = JSON.parse(JSON.stringify(ev));
        clean.recordedAt = firebase.firestore.FieldValue.serverTimestamp();
        return db.collection("custodyEvents").doc(ev.id).set(clean);
      },
      // -- Discrepancy tracker (BUILD D1): living records - update allowed,
      // delete deliberately absent (resolved, never removed; rules agree).
      subscribeDiscrepancies: function(cb){ return db.collection("discrepancies").onSnapshot(function(s){ cb(repoSnapToList(s)); }); },
      saveDiscrepancy:        function(d){ return repoSet("discrepancies", d); },
      // -- App config: ONE small key-value doc (config/app), e.g. the
      // governance-manifest destination email (BUILD 4). Read once at
      // sign-in. Owner-write under the wildcard rule like everything else.
      getConfig:  function(){ return db.collection("config").doc("app").get().then(function(d){ return d.exists ? d.data() : {}; }); },
      saveConfig: function(cfg){ return db.collection("config").doc("app").set(JSON.parse(JSON.stringify(cfg))); },
      deleteTicket:    function(id){ return db.collection("tickets").doc(id).delete(); },
      deleteShipment:  function(id){ return db.collection("shipments").doc(id).delete(); },
      deleteLocation:  function(id){ return db.collection("locations").doc(id).delete(); },
      deleteRequestor: function(id){ return db.collection("requestors").doc(id).delete(); }
    };

<script type="text/jsx-source" id="jsx-source">
const { useState, useRef, useEffect, useMemo } = React;

// ── Column name constants ─────────────────────────────────────────
// findCol does: exact → case-insensitive → "starts with" → "contains"
// so these only need to match the beginning of the actual header text.
const SERIAL_COL       = "Service Tag/Serial Number";
const MANUFACTURER_COL = "Manufacturer";
const MACHINE_TYPE_COL = "Machine Type";
const OU_INVENTORY_COL = "OU Inventory #";

// ── Status color map ──────────────────────────────────────────────
const SC = {
  matched:      { bg:"#d1fae5", text:"#065f46", border:"#6ee7b7", label:"Matched" },
  missing:      { bg:"#fee2e2", text:"#7f1d1d", border:"#fca5a5", label:"Missing" },
  extra:        { bg:"#fef9c3", text:"#713f12", border:"#fde047", label:"Extra"   },
  partial:      { bg:"#ede9fe", text:"#4c1d95", border:"#a78bfa", label:"Partial Match" },
  assetTagMatch:{ bg:"#ede9fe", text:"#4c1d95", border:"#a78bfa", label:"Asset Tag Match" },
};

// Approval sheet generator — produces an XLSX workbook for items needing requestor sign-off
function generateApprovalSheet(ticket, resolved){
  const rows = [];
  const addRow = function(category, serial, note){
    rows.push([category, serial, note||"", "[ ] Approved  [ ] Denied", ""]);
  };
  (resolved.missing||[]).forEach(function(m){
    addRow("Not Picked Up", m.serial, (m.manufacturer||"")+" "+(m.machineType||""));
  });
  (resolved.extra||[]).forEach(function(e){
    addRow("Not on List (Extra)", e.serial, "Picked up but not in submitted list");
  });
  actionableCorrections(resolved.partial).forEach(function(p){
    addRow("Partial Match", p.expectedSerial, "Expected: "+p.expectedSerial+" / Scanned: "+p.scannedSerial+" / Will record as: "+(p.canonical||p.scannedSerial));
  });

  const header = ["Category","Serial Number","Details","Decision","Notes"];
  const wb = XLSX.utils.book_new();
  const wsData = [
    ["IT Asset Disposal — Approval Required"],
    ["Ticket:", ticket.ticketNo, "", "Date:", new Date().toLocaleDateString()],
    ["Site:", ticket.site||"", "", "Requestor:", ticket.requestor||""],
    [],
    header,
    ...rows,
    [],
    ["Please review each item above, mark Approved or Denied, and reply to this email."],
  ];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws["!cols"] = [{wch:22},{wch:22},{wch:36},{wch:26},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws, "Approval Required");
  XLSX.writeFile(wb, "ApprovalRequest-"+ticket.ticketNo+".xlsx");
  return rows.length;
}

const TABS = ["Tickets","Pickup Scan","Vendor Pickup","Reconcile","Report","Audit X-Ref","Discrepancies"];

// ── Helpers ───────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function localDateStr(d){
  var dt = d || new Date();
  var y = dt.getFullYear();
  var m = String(dt.getMonth()+1).padStart(2,"0");
  var day = String(dt.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day;
}

// Values treated as "no tag" for matching purposes
var BLANK_TAG_PATTERNS = /^(unknown|n\/?a|none|n\.a\.|nil|no asset tag|no tag|—|-)$/i;
function isBlankTag(v){ return !v || !v.trim() || BLANK_TAG_PATTERNS.test(v.trim()); }
function fmtDate(iso){ if(!iso) return "—"; var p=iso.split("-"); return new Date(p[0],p[1]-1,p[2]).toLocaleDateString(); }

function findCol(sampleRow, name){
  const keys = Object.keys(sampleRow);
  const low = name.toLowerCase();
  // 1. Exact match
  const exact = keys.find(function(k){ return k === name; });
  if(exact) return exact;
  // 2. Case-insensitive exact
  const ci = keys.find(function(k){ return k.toLowerCase() === low; });
  if(ci) return ci;
  // 3. Key starts with search term (handles extra parenthetical/newline text after the header)
  const sw = keys.find(function(k){ return k.toLowerCase().startsWith(low); });
  if(sw) return sw;
  // 4. Key contains search term
  const has = keys.find(function(k){ return k.toLowerCase().includes(low); });
  if(has) return has;
  return null;
}

// Levenshtein distance
function levenshtein(a, b){
  const m=a.length, n=b.length;
  const dp=[]; for(let ii=0;ii<=m;ii++){ dp[ii]=[]; for(let jj=0;jj<=n;jj++) dp[ii][jj]=ii===0?jj:jj===0?ii:0; }
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function findPartialMatch(scanned, expectedList){
  const maxDist = Math.max(1, Math.floor(scanned.length * 0.15));
  let best = null;
  for(const exp of expectedList){
    const d = levenshtein(scanned, exp);
    if(d > 0 && d <= maxDist && (!best || d < best.distance)) best = {serial:exp, distance:d};
  }
  return best;
}

// ── Identifier extraction + matching (tested spec in matcher.js) ──
var EXACT_AUTO_LEN=8, EXACT_REVIEW_LEN=7, EXACT_MIN_LEN=EXACT_REVIEW_LEN, FUZZY_MIN_LEN=6;
function extractIdentifiers(str){
  var up=String(str||"").toUpperCase().trim(); if(!up) return [];
  var cands={}; var whole=up.replace(/[^A-Z0-9]/g,""); if(whole.length>=2) cands[whole]=true;
  up.split(/[^A-Z0-9]+/).forEach(function(t){ if(t.length>=2) cands[t]=true; });
  return Object.keys(cands);
}
function bestMatch(expSerial, pool){
  var expToks=extractIdentifiers(expSerial); var exact=null, contained=null, fuzzy=null;
  pool.forEach(function(sc){
    var scToks=extractIdentifiers(sc);
    expToks.forEach(function(et){ scToks.forEach(function(st){
      if(et===st){ if(et.length>=EXACT_MIN_LEN && (!exact||et.length>exact.token.length)) exact={scanned:sc,token:et}; }
      // Containment tier: one side's token is an exact substring of a LONGER
      // token on the other side — undelimited compound barcodes (e.g. Lenovo
      // 1S + machine-type-model + serial scans as one solid token). Min length
      // EXACT_AUTO_LEN(8) for the contained token; ALWAYS review, never auto —
      // substring evidence is weaker than a delimited shared token.
      else if(et.length>=EXACT_AUTO_LEN && st.length>et.length && st.indexOf(et)!==-1){
        if(!contained||et.length>contained.token.length) contained={scanned:sc,token:et};
      }
      else if(st.length>=EXACT_AUTO_LEN && et.length>st.length && et.indexOf(st)!==-1){
        if(!contained||st.length>contained.token.length) contained={scanned:sc,token:st};
      }
      else if(et.length>=FUZZY_MIN_LEN && st.length>=FUZZY_MIN_LEN){
        var maxd=(et.length>=10&&st.length>=10)?2:1; var d=levenshtein(et,st);
        if(d>=1&&d<=maxd&&(!fuzzy||d<fuzzy.distance||(d===fuzzy.distance&&(et.length+st.length)>(fuzzy.expTok.length+fuzzy.scTok.length)))) fuzzy={scanned:sc,expTok:et,scTok:st,distance:d};
      }
    }); });
  });
  if(exact) return {kind:(exact.token.length>=EXACT_AUTO_LEN)?"exact":"exact-review", scanned:exact.scanned, canonical:exact.token, expToken:exact.token, scanToken:exact.token, distance:0};
  if(contained) return {kind:"exact-review", scanned:contained.scanned, canonical:contained.token, expToken:contained.token, scanToken:contained.token, distance:0};
  if(fuzzy) return {kind:"fuzzy", scanned:fuzzy.scanned, canonical:fuzzy.scTok, expToken:fuzzy.expTok, scanToken:fuzzy.scTok, distance:fuzzy.distance};
  return null;
}
// ── No-op corrections (approval-exempt) ──
// A "no-op" correction: an exact-token match — auto ("exact") or review-tier
// ("exact-review": containment / 7-char token, accepted by the operator) —
// where the recorded serial equals the ticket serial VERBATIM. Scanner noise
// was stripped; the customer's record is unchanged, so there is nothing for
// them to decide. ACCEPTED no-ops are excluded from the approval round-trip,
// approval documents, email counts, and derived approval status. They remain
// fully visible in the scan view (review rows still require the operator's
// accept) and preserved in pickupResult/pickupScanList. Fuzzy is NEVER no-op.
function isNoopCorrection(p){
  return !!p && (p.matchKind==="exact" || p.matchKind==="exact-review") &&
    String(p.canonical||"").trim().toUpperCase()===String(p.expectedSerial||"").trim().toUpperCase();
}
function actionableCorrections(list){
  return (list||[]).filter(function(p){ return p.resolution!=="reject" && !(isNoopCorrection(p) && p.resolution==="accept"); });
}

// ── Pickup resolution core (Build 1a) ──
// The ONE place decision consequences are applied. Accept: record the
// corrected serial. Reject: device was not taken — capture is discarded,
// expected serial becomes Missing. Pending: stays a proposed correction,
// NEVER enters assets. Extracted and exercised by pickup_tests.js.
function finalizePickup(resolved, expMap){
  var now = new Date().toLocaleString();
  function infoFor(serial){ var a=expMap[serial]||{}; return {manufacturer:a.manufacturer||"",machineType:a.machineType||"",ouInventory:a.ouInventory||""}; }
  var assets = [];
  var missing = (resolved.missing||[]).map(function(m){ return m.resolution==="kept" ? {...m, approvedMissing:true} : m; });
  var rejectedCaptures = [];
  (resolved.matched||[]).forEach(function(m){ assets.push({serial:m.serial, ...infoFor(m.serial), addedAt:now, source:"scan"}); });
  (resolved.partial||[]).forEach(function(p){
    if(p.resolution==="accept"){
      assets.push({serial:p.canonical||p.scannedSerial, ...infoFor(p.expectedSerial), addedAt:now, source:"scan-"+(p.matchKind||"partial")});
    } else if(p.resolution==="reject"){
      rejectedCaptures.push(p.scannedSerial);
      missing.push({id:p.id, expIdx:p.expIdx, serial:p.expectedSerial, ...infoFor(p.expectedSerial), type:"missing", resolution:null, fromRejected:true});
    }
  });
  (resolved.extra||[]).forEach(function(e){
    if(e.linkedTo) assets.push({serial:e.serial, ...infoFor(e.linkedTo), addedAt:now, source:"scan-linked"});
  });
  (resolved.extra||[]).forEach(function(e){
    if(e.linkedTo) return;
    if(e.resolution==="remove") return; // decided out — capture stays in pickupScanList only
    if(e.resolution==="include"){ assets.push({serial:e.serial, manufacturer:"", machineType:"", ouInventory:"", addedAt:now, source:"scan-extra", approved:true}); return; }
    assets.push({serial:e.serial, manufacturer:"", machineType:"", ouInventory:"", addedAt:now, source:"scan-extra-pending", approved:null});
  });
  var partial = (resolved.partial||[]).filter(function(p){ return p.resolution!=="reject"; });
  return {assets:assets, missing:missing, partial:partial, rejectedCaptures:rejectedCaptures};
}
// Exit gate (Build 1b): undecided discrepancies on a resolved result.
// Linked pairs are decided by the link; a kept missing or an
// included/removed extra is decided; anything else is open.
function undecidedCounts(resolved){
  var p = (resolved.partial||[]).filter(function(x){ return x.resolution!=="accept" && x.resolution!=="reject"; }).length;
  var m = (resolved.missing||[]).filter(function(x){ return !x.linkedTo && x.resolution!=="kept" && !x.approvedMissing; }).length;
  var e = (resolved.extra||[]).filter(function(x){ return !x.linkedTo && x.resolution!=="include" && x.resolution!=="remove"; }).length;
  return {partials:p, missing:m, extras:e, total:p+m+e};
}
// Exit B (Build 1b): in-person clicks cleared; every discrepancy restates
// fresh. Machine pre-acceptance (defaultResolution on exacts) and links survive.
function restateForApproval(resolved){
  return {...resolved,
    partial:(resolved.partial||[]).map(function(p){ return {...p, resolution:p.defaultResolution||null}; }),
    missing:(resolved.missing||[]).map(function(m){ return m.linkedTo ? m : {...m, resolution:null, approvedMissing:false}; }),
    extra:(resolved.extra||[]).map(function(e){ return e.linkedTo ? e : {...e, resolution:null}; })
  };
}
// ── End pickup resolution core ──

// ── Correction-row visualization (Phase 2b) ──
function highlightToken(original, token){
  var orig=String(original||""); var up=orig.toUpperCase(); var t=String(token||"").toUpperCase();
  var i=t?up.indexOf(t):-1;
  if(i<0) return <span style={{color:"#94a3b8"}}>{orig}</span>;
  var dim={color:"#475569",textDecoration:"line-through"}, hi={color:"#f1f5f9",background:"#334155",borderRadius:3,padding:"0 3px"};
  return <span>{i>0 && <span style={dim}>{orig.slice(0,i)}</span>}<span style={hi}>{orig.slice(i,i+t.length)}</span>{(i+t.length<orig.length) && <span style={dim}>{orig.slice(i+t.length)}</span>}</span>;
}
function diffMark(str, ref){
  var a=String(str||""), b=String(ref||"");
  return <span>{a.split("").map(function(ch,idx){ var d=ch!==(b.charAt(idx)); return <span key={idx} style={d?{color:"#f87171",fontWeight:700,textDecoration:"underline"}:{color:"#cbd5e1"}}>{ch}</span>; })}</span>;
}

// Scan all raw rows for item count labels.
// Handles both single-pair rows (label | value) and
// double-pair rows (label | value | label | value).
function extractItemCounts(rawRows){
  const counts = {lcdMonitors:0, miscBoxes:0, hardDriveBoxes:0, printers:0};
  for(let ri=0; ri<rawRows.length; ri++){
    const row = rawRows[ri];
    // Check every cell; the value is the next non-empty cell to the right
    for(let ci=0; ci<row.length; ci++){
      const cell = String(row[ci]||"").toLowerCase().trim();
      if(!cell) continue;
      // Find the next non-empty cell to the right as the value
      let val = 0;
      for(let vi=ci+1; vi<row.length && vi<=ci+2; vi++){
        const raw = String(row[vi]||"").trim();
        if(raw !== ""){
          const n = parseInt(raw, 10);
          if(!isNaN(n)) val = n;
          break;
        }
      }
      if(cell.includes("lcd")||cell.includes("flat panel")||(cell.includes("display")&&!cell.includes("only")))
        counts.lcdMonitors = val;
      else if(cell.includes("misc"))
        counts.miscBoxes = val;
      else if(cell.includes("hard drive")||cell.includes("other media"))
        counts.hardDriveBoxes = val;
      else if(cell.includes("printer"))
        counts.printers = val;
    }
  }
  return counts;
}

// Read serials + metadata from a File object.
// Auto-detects the header row (scans for "serial" keyword), normalizes
// multi-line headers to their first line, then extracts data.
async function readXlsxFile(file){
  return new Promise(function(resolve, reject){
    const reader = new FileReader();
    reader.onload = function(evt){
      try {
        const wb = XLSX.read(evt.target.result, {type:"binary"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rawRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});

        // Find the header row by scanning up to row 25.
        // Prefer rows containing "service tag". Fall back to the last row containing
        // "serial" that does NOT look like instructional text (must/only/complete/for/bearing).
        const INSTRUCTIONAL_WORDS = ["must","only","complete","bearing","please","note","enter","include","data"];
        function isInstructional(cell){
          var lc = cell.toLowerCase();
          return INSTRUCTIONAL_WORDS.some(function(w){ return lc.includes(w); });
        }
        let headerRowIdx = 0;
        let serviceTagRow = -1;
        let lastSerialRow = -1;
        for(let i=0; i<Math.min(rawRows.length,25); i++){
          const row = rawRows[i];
          for(let j=0; j<row.length; j++){
            const cell = String(row[j]||"").split("\n")[0].trim();
            const lc = cell.toLowerCase();
            if(lc.startsWith("service tag")){ serviceTagRow = i; break; }
            if(lc.startsWith("serial") && !isInstructional(cell)){ lastSerialRow = i; }
          }
        }
        if(serviceTagRow !== -1) headerRowIdx = serviceTagRow;
        else if(lastSerialRow !== -1) headerRowIdx = lastSerialRow;

        // Build normalized headers: take first line of each cell, trim whitespace
        const rawHeaders = rawRows[headerRowIdx]||[];
        const headers = rawHeaders.map(function(h){
          return String(h||"").split("\n")[0].trim();
        });

        // Build object rows from data rows (headerRowIdx+1 onwards)
        const objRows = rawRows.slice(headerRowIdx+1).map(function(row){
          const obj = {};
          headers.forEach(function(h,i){ obj[h] = row[i]; });
          return obj;
        }).filter(function(r){ return Object.values(r).some(function(v){ return v!==""; }); });

        const sampleRow = objRows[0] || {};
        // Try multiple common serial column header names in order of preference
        const SERIAL_VARIANTS = [SERIAL_COL, "Serial Number", "Serial #", "Serial", "Service Tag", "Asset Serial"];
        let col = null;
        for(let vi=0; vi<SERIAL_VARIANTS.length; vi++){
          col = findCol(sampleRow, SERIAL_VARIANTS[vi]);
          if(col) break;
        }
        const mfrCol = findCol(sampleRow, MANUFACTURER_COL);
        const typCol = findCol(sampleRow, MACHINE_TYPE_COL);
        const ouCol  = findCol(sampleRow, OU_INVENTORY_COL);
        const itemCounts = extractItemCounts(rawRows);

        if(!col) return resolve({serials:[], itemCounts, warning:`Serial column not found. Headers detected: ${headers.filter(function(h){ return h; }).join(", ")||"(none)"}`});

        const now = new Date().toLocaleString();
        const seen = new Set();
        const serials = [];
        for(let ri=0; ri<objRows.length; ri++){
          const r = objRows[ri];
          // Stop when any cell in the row contains the end-of-data sentinel
          const rowVals = Object.values(r).map(function(v){ return String(v||"").toLowerCase().trim(); });
          if(rowVals.some(function(v){ return v.includes("add more lines if needed"); })) break;
          const serial = String(r[col]||"").trim().toUpperCase();
          if(!serial) continue; // skip blank serials but keep going
          const isDuplicate = seen.has(serial);
          seen.add(serial);
          serials.push({
            serial,
            manufacturer: mfrCol ? String(r[mfrCol]||"").trim() : "",
            machineType:  typCol ? String(r[typCol]||"").trim() : "",
            ouInventory:  ouCol  ? String(r[ouCol]||"").trim()  : "",
            addedAt:      now,
            duplicate:    isDuplicate, // flag for display — does not prevent import
          });
        }

        const colsFound = {
          serial:       col    || null,
          manufacturer: mfrCol || null,
          machineType:  typCol || null,
          ouInventory:  ouCol  || null,
        };
        resolve({serials, itemCounts, warning:null, rawHeaders:headers.filter(function(h){ return h; }), colsFound});
      } catch(e){ reject(e); }
    };
    reader.onerror = reject;
    reader.readAsBinaryString(file);
  });
}

// Pickup status helper
function pickupStatus(ticket){
  if(!ticket.pickupScanned) return "pending";
  if(ticket.approvalStatus === "validated") return "verified";
  if(ticket.approvalStatus === "awaiting-approval") return "awaiting-approval";
  const r = ticket.pickupResult;
  if(!r) return "pending";
  const hasApprovalItems = (r.missing&&r.missing.length>0) || (r.extra&&r.extra.length>0) || actionableCorrections(r.partial).length>0;
  return hasApprovalItems ? "awaiting-approval" : "verified";
}

const FSA_SUPPORTED = (typeof window !== "undefined") && typeof window.showOpenFilePicker === "function";

async function fsaPickOpenFile(){
  const [fh] = await window.showOpenFilePicker({
    types:[{description:"JSON Files", accept:{"application/json":[".json"]}}],
    multiple:false
  });
  const file = await fh.getFile();
  const text = await file.text();
  const s = JSON.parse(text);
  if(!s.tickets) throw new Error("Invalid session file");
  return {fileHandle:fh, tickets:s.tickets, shipments:s.shipments||[]};
}

async function fsaPickSaveFile(){
  const fh = await window.showSaveFilePicker({
    suggestedName:`AssetTrack-Session-${new Date().toISOString().slice(0,10)}.json`,
    types:[{description:"JSON Files", accept:{"application/json":[".json"]}}]
  });
  return fh;
}

async function fsaWrite(fileHandle, tickets, shipments, locations, requestors){
  if(!fileHandle) return false;
  try {
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify({version:5, exportedAt:new Date().toLocaleString(), tickets, shipments, locations:locations||[], requestors:requestors||[]}, null, 2));
    await writable.close();
    return true;
  } catch(e){ console.error("Auto-save failed:", e); return false; }
}

// Export a structured JSON payload for the TDX PowerShell sync script
function exportForTdx(tickets){
  const verified = tickets.filter(function(t){
    return t.pickupScanned && t.pickupResult && t.assets && t.assets.length > 0;
  });
  const payload = {
    exportedAt: new Date().toISOString(),
    exportedBy: "AssetTrack",
    ticketCount: verified.length,
    tickets: verified.map(function(t){
      return {
        assetTrackId:   t.id,
        ticketNo:       t.ticketNo,
        date:           t.date,
        site:           t.site,
        requestor:      t.requestor,
        phone:          t.phone||'',
        notes:          t.notes,
        itemCounts:     t.itemCounts || {},
        assets: (t.assets||[]).map(function(a){
          return {
            serial:       a.serial,
            manufacturer: a.manufacturer||"",
            machineType:  a.machineType||"",
            ouInventory:  a.ouInventory||"",
            source:       a.source||"",
          };
        }),
        pickupSummary: t.pickupResult ? {
          matched:  (t.pickupResult.matched||[]).length,
          missing:  (t.pickupResult.missing||[]).length,
          extra:    (t.pickupResult.extra||[]).length,
          partial:  (t.pickupResult.partial||[]).length,
          waived:   (t.pickupResult.waived||[]).length,
          scannedAt: t.pickupResult.scannedAt||"",
        } : null,
      };
    }),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url;
  a.download = "AssetTrack-TDX-Export-"+new Date().toISOString().slice(0,10)+".json";
  a.click(); URL.revokeObjectURL(url);
  return verified.length;
}

// Signature pad (Build 1b, Exit A). Light "paper" canvas, dark ink, so
// the exported PNG stays legible on the white approval PDF.
function SignaturePad({onChange}){
  const cRef = useRef(null);
  const drawing = useRef(false);
  const [hasInk, setHasInk] = useState(false);
  function pos(e){
    var r = cRef.current.getBoundingClientRect();
    return {x:(e.clientX-r.left)*(cRef.current.width/r.width), y:(e.clientY-r.top)*(cRef.current.height/r.height)};
  }
  function down(e){ e.preventDefault(); cRef.current.setPointerCapture(e.pointerId); drawing.current=true; var c=cRef.current.getContext("2d"); c.strokeStyle="#0f172a"; c.lineWidth=2.2; c.lineCap="round"; c.lineJoin="round"; var p=pos(e); c.beginPath(); c.moveTo(p.x,p.y); }
  function move(e){ if(!drawing.current) return; var c=cRef.current.getContext("2d"); var p=pos(e); c.lineTo(p.x,p.y); c.stroke(); }
  function up(e){ if(!drawing.current) return; drawing.current=false; setHasInk(true); onChange(cRef.current.toDataURL("image/png")); }
  function clear(){ var c=cRef.current.getContext("2d"); c.clearRect(0,0,cRef.current.width,cRef.current.height); setHasInk(false); onChange(null); }
  return (
    <div>
      <canvas ref={cRef} width={560} height={140}
        onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
        style={{width:"100%",maxWidth:560,height:140,background:"#f8fafc",border:"1px dashed #475569",borderRadius:8,touchAction:"none",cursor:"crosshair",display:"block"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6,maxWidth:560}}>
        <span style={{fontSize:11,color:"#64748b"}}>{hasInk?"Signed":"Sign here"}</span>
        <button onClick={clear} style={{background:"none",border:"1px solid #334155",borderRadius:6,color:"#94a3b8",cursor:"pointer",fontSize:11,padding:"3px 10px",fontFamily:"inherit"}}>Clear</button>
      </div>
    </div>
  );
}

function App(){
  const [tab, setTab]               = useState(0);
  const [openTicketId, setOpenTicketId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [locations,  setLocations]  = useState([]);
  const [requestors, setRequestors] = useState([]);
  const [tickets, setTickets]       = useState([]);
  const [shipments, setShipments]   = useState([]);
  const [custodyEvents, setCustodyEvents] = useState([]); // read-only display of the append-only log (BUILD 3); no ref - never diffed, never written from state
  const [discrepancies, setDiscrepancies] = useState([]); // discrepancy tracker (BUILD D1); ref exists because the harvest reads it synchronously inside saveShipments
  const discrepanciesRef = useRef([]);
  const [appConfig, setAppConfig] = useState({}); // small settings doc (BUILD 4): { governanceEmail }
  const [vendorReport, setVendorReport] = useState(null);
  const [importMsg, setImportMsg]   = useState(null);
  const [fileHandle, setFileHandle] = useState(null);
  const [saveStatus, setSaveStatus] = useState("idle");
  const [writeError, setWriteError] = useState(null); // a Firestore write/delete FAILED — data did NOT save
  const [user, setUser]             = useState(null);   // Firebase auth user
  const userRef                     = React.useRef(null); // always-current user for closures
  const ticketsRef    = useRef([]);    // mirrors latest tickets (prev for upsert diffing, outside the updater)
  const shipmentsRef  = useRef([]);
  const locationsRef  = useRef([]);
  const requestorsRef = useRef([]);
  const [fbLoading, setFbLoading]   = useState(true);   // initial Firestore load
  const jsonRef         = useRef();
  const saveTimer       = useRef(null);
  const [pendingSession, setPendingSession] = useState(null); // session waiting to push
  const [routeOrder, setRouteOrder]       = useState(null);  // persists pickup route order across tabs
  const [openShipmentId, setOpenShipmentId] = useState(null); // navigate to specific vendor pickup

  // ── Firebase Auth ─────────────────────────────────────────────
  useEffect(function(){
    var unsub = auth.onAuthStateChanged(function(u){ setUser(u); userRef.current = u; });
    return unsub;
  }, []);

  function signIn(){  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  function signOut(){ auth.signOut(); }

  // -- Firestore: subscribe only while signed in (reads now require auth) --
  // Gating on `user` is required: rules deny reads when signed out, and
  // re-running on auth change is what re-subscribes after sign-in.
  useEffect(function(){
    if(!user){
      // Signed out: clear the view and do not subscribe (reads are denied).
      ticketsRef.current=[]; shipmentsRef.current=[]; locationsRef.current=[]; requestorsRef.current=[];
      setTickets([]); setShipments([]); setLocations([]); setRequestors([]);
      setCustodyEvents([]);
      setAppConfig({});
      setFbLoading(false);
      return;
    }
    setFbLoading(true);
    var unsubs = [];
    unsubs.push(repo.subscribeTickets(function(list){
      ticketsRef.current = list; setTickets(list); setFbLoading(false);
    }));
    unsubs.push(repo.subscribeShipments(function(list){
      shipmentsRef.current = list; setShipments(list);
    }));
    unsubs.push(repo.subscribeLocations(function(list){
      locationsRef.current = list; setLocations(list);
    }));
    unsubs.push(repo.subscribeRequestors(function(list){
      requestorsRef.current = list; setRequestors(list);
    }));
    // Chain-of-custody log (BUILD 3): READ-ONLY subscription for display.
    // Deliberately NOT part of the session JSON / hydrateAll / pushToFirestore
    // paths - the log is displayed, never round-tripped, so no session load
    // or import can ever write events back. Appends still go only through
    // repo.saveCustodyEvent in the emission layer.
    unsubs.push(repo.subscribeCustodyEvents(function(list){
      setCustodyEvents(list);
    }));
    // Discrepancies (BUILD D1): like custodyEvents, NEVER part of session
    // JSON / hydrateAll / pushToFirestore. Writes go only through the
    // harvest below and (later) the tracker UI.
    unsubs.push(repo.subscribeDiscrepancies(function(list){
      discrepanciesRef.current = list; setDiscrepancies(list);
    }));
    // App config (BUILD 4): one-time read - rarely changes, no subscription.
    repo.getConfig().then(function(cfg){ setAppConfig(cfg||{}); }).catch(function(e){ console.error("config load:", e); });
    return function(){ unsubs.forEach(function(u){ u(); }); };
  }, [user]);

  // -- Persistence (calls repo.* only; never Firestore directly) --
  function reportWriteError(op, coll, id, e){
    console.error("Firestore "+op+" error:", e);
    setWriteError({ collection: coll, id: id, op: op, message: (e && e.message) || String(e) });
  }
  function saveAppConfig(patch){
    var next = {...appConfig, ...patch};
    setAppConfig(next);
    repo.saveConfig(next).catch(function(e){ reportWriteError("save","config","app",e); });
  }
  // -- Discrepancy tracker (BUILD D2): direct repo writes - discrepancies
  // are NOT session state (see the subscription note), so no save wrapper.
  function updateDiscrepancy(d){
    if(!userRef.current) return;
    repo.saveDiscrepancy(d).catch(function(e){ reportWriteError("save","discrepancies",d.id,e); });
  }
  // Track button (BUILD D3): manual promotion of a vendor extra into the
  // tracker - the ONE type where only the operator can judge pertinence,
  // so it never auto-opens (see harvest note).
  function trackExtra(report, item){
    if(!userRef.current || !report || !item) return;
    var s = (shipmentsRef.current||[]).find(function(x){ return x.reconcileReport && x.reconcileReport.generatedAt===report.generatedAt; });
    if(!s){ alert("Couldn't find the pickup this report belongs to. Re-run the reconcile, then track from the fresh report."); return; }
    var id = dxId(s.id, "extra", item.serial);
    if((discrepanciesRef.current||[]).some(function(d){ return d.id===id; })) return;
    var now = new Date().toISOString();
    repo.saveDiscrepancy({ id:id, v:1, type:"extra", serial:item.serial,
      ticketNo:"", ticketId:"",
      pickupId:s.id, pickupName:s.name||s.id,
      state:"open", openedAt:now, lastSeenAt:now,
      notes:[dxNote(userRef.current.email||"user","Tracked from the report's Extra list ("+(report.fileName||"")+")")],
      evidence:{ vendorTag:item.vendorTag||"", vendorDesc:item.vendorDesc||"", vendorMfgr:item.vendorMfgr||"" },
      resolution:null
    }).catch(function(e){ reportWriteError("save","discrepancies",id,e); });
  }
  // -- Chain-of-custody emission (Option A: wrapper transition detection) --
  // custodyEvents is an APPEND-ONLY audit log (see repo). Events are inferred
  // from state transitions inside saveTickets / saveShipments because EVERY
  // interactive write path flows through those two wrappers -- no UI path can
  // change custody state without leaving a log entry. Bulk paths (Firestore
  // subscribe, hydrateAll, legacy session load, pushToFirestore) bypass the
  // wrappers on purpose and therefore never emit. No backfill: log starts at
  // go-live. WARNING: if the meaning of pickupScanned, directVendorPickup,
  // shipment.status, ticketIds, arrivedDate, codd, approvalSignature or
  // approvalStatus ever changes, revisit the detectors below -- event
  // semantics ride on those transitions.
  function emitCustody(type, fields){
    if(!userRef.current) return;
    var ev = Object.assign({
      id: uid(), v: 1, type: type,
      ticketIds: [], shipmentId: null,
      provenance: null, serials: [],
      recorderEmail: userRef.current.email || "",
      attester: null, witness: null, vendorRef: null,
      occurredAt: new Date().toISOString(),
      note: ""
    }, fields);
    repo.saveCustodyEvent(ev).catch(function(e){ reportWriteError("save","custodyEvents",ev.id,e); });
  }
  function custodySerials(t){
    var list = (t.pickupScanned ? t.assets : t.expectedAssets) || [];
    return list.map(function(a){ return a && a.serial; }).filter(Boolean);
  }
  function attesterFor(t){
    var name = (t.requestor||"").trim();
    var match = (requestorsRef.current||[]).find(function(r){ return (r.name||"").trim().toLowerCase()===name.toLowerCase(); });
    return { name: name, email: (match && match.email) || "" };
  }
  function shipVendorRef(s){ return s.vendorPO || s.auditPo || null; }
  function shipmentSerials(sh){
    var out = [];
    (sh.ticketIds||[]).forEach(function(tid){
      var t = (ticketsRef.current||[]).find(function(x){ return x.id===tid; });
      if(t) out = out.concat(custodySerials(t));
    });
    return out;
  }
  function detectTicketCustody(prev, next){
    var prevById = {};
    prev.forEach(function(t){ prevById[t.id] = t; });
    next.forEach(function(t){
      var old = prevById[t.id];
      if(!old) emitCustody("ticket-created", { ticketIds:[t.id], serials: custodySerials(t) });
      var wasScanned = old ? !!old.pickupScanned : false;
      if(!wasScanned && t.pickupScanned){
        if(t.directVendorPickup){
          emitCustody("pickup-attested", { ticketIds:[t.id], provenance:"expected", serials: custodySerials(t), attester: attesterFor(t) });
        } else {
          emitCustody("pickup-scanned",  { ticketIds:[t.id], provenance:"scanned",  serials: custodySerials(t) });
        }
      }
      // In-person approval (Build 1b, Exit A): the signature appearing is the
      // transition. Attester = the signer, email name-matched from requestors.
      var hadSig = old ? !!old.approvalSignature : false;
      if(!hadSig && t.approvalSignature){
        var sName = (t.approvalSignature.printedName||"").trim();
        var sMatch = (requestorsRef.current||[]).find(function(r){ return (r.name||"").trim().toLowerCase()===sName.toLowerCase(); });
        emitCustody("approval-captured", { ticketIds:[t.id], serials: custodySerials(t),
          attester: {name:sName, email:(sMatch && sMatch.email)||""},
          note: "In-person approval signed by "+(sName||"?") });
      }
      // Remote validation (Build 1c): approvalStatus reaching "validated"
      // without a signature = Mark Validated on a returned form. Signature
      // saves and attested direct pickups are covered above, so both are
      // excluded here to keep one event per approval.
      var wasVal = old ? old.approvalStatus==="validated" : false;
      if(!wasVal && t.approvalStatus==="validated" && !t.approvalSignature && !t.directVendorPickup){
        emitCustody("approval-validated", { ticketIds:[t.id], serials: custodySerials(t),
          attester: attesterFor(t),
          note: "Approval validated from returned form"+(t.approvalFile?" ("+t.approvalFile+")":"") });
      }
    });
  }
  function detectShipmentCustody(prev, next){
    var prevById = {};
    prev.forEach(function(s){ prevById[s.id] = s; });
    next.forEach(function(s){
      var old = prevById[s.id];
      var oldIds = old ? (old.ticketIds||[]) : [];
      var newIds = s.ticketIds||[];
      var added   = newIds.filter(function(id){ return oldIds.indexOf(id)===-1; });
      var removed = oldIds.filter(function(id){ return newIds.indexOf(id)===-1; });
      if(added.length)   emitCustody("grouped-into-shipment",   { shipmentId:s.id, ticketIds:added,   vendorRef:shipVendorRef(s), note:"Grouped into "+(s.name||s.id) });
      if(removed.length) emitCustody("ungrouped-from-shipment", { shipmentId:s.id, ticketIds:removed, vendorRef:shipVendorRef(s), note:"Removed from "+(s.name||s.id) });
      var oldStatus = old ? (old.status||"scheduled") : "scheduled";
      var newStatus = s.status||"scheduled";
      if(oldStatus==="scheduled" && (newStatus==="picked-up" || newStatus==="reconciled")){
        emitCustody("vendor-handoff", { shipmentId:s.id, ticketIds:newIds, serials:shipmentSerials(s), vendorRef:shipVendorRef(s), note: newStatus==="reconciled" ? "Inferred: status advanced scheduled to reconciled on "+(s.name||s.id) : (s.name||"") });
      }
      var oldArr = old ? (old.arrivedDate||"") : "";
      var newArr = s.arrivedDate||"";
      if(newArr && newArr!==oldArr){
        emitCustody("warehouse-arrival", { shipmentId:s.id, ticketIds:newIds, serials:shipmentSerials(s), vendorRef:shipVendorRef(s), occurredAt:newArr, note: oldArr ? "Arrival date corrected from "+oldArr : (s.name||"") });
      }
      if(newStatus==="reconciled" && oldStatus!=="reconciled"){
        emitCustody("reconciled", { shipmentId:s.id, ticketIds:newIds, serials:shipmentSerials(s), vendorRef:shipVendorRef(s), note:(s.name||"") });
      }
      // Re-run of reconciliation on an already-reconciled pickup (audit file
      // replaced): status does not transition, but generatedAt changes.
      var oldGen = (old && old.reconcileReport && old.reconcileReport.generatedAt) || "";
      var newGen = (s.reconcileReport && s.reconcileReport.generatedAt) || "";
      if(oldStatus==="reconciled" && newStatus==="reconciled" && newGen && newGen!==oldGen){
        emitCustody("reconciled", { shipmentId:s.id, ticketIds:newIds, serials:shipmentSerials(s), vendorRef:shipVendorRef(s), note:(oldGen ? "Re-reconciled - audit file replaced (" : "Reconciliation run on already-reconciled pickup (")+(s.auditFileName||"")+") on "+(s.name||s.id) });
      }
      // CoDD attach/replace (custody BUILD 2): batch Certificate of Data
      // Destruction, metadata only, recorded on the shipment. occurredAt =
      // the certificate's Date of destruction (honest after-the-fact
      // recording, same convention as warehouse arrivals); vendorRef = the
      // PO printed ON the certificate - the vendor-side join key.
      var oldCodd = old ? (old.codd||null) : null;
      var newCodd = s.codd||null;
      if(newCodd && JSON.stringify(newCodd)!==JSON.stringify(oldCodd)){
        emitCustody("codd-attached", {
          shipmentId:s.id, ticketIds:newIds, serials:shipmentSerials(s),
          vendorRef: newCodd.certPO || shipVendorRef(s),
          occurredAt: newCodd.destructionDate || new Date().toISOString(),
          note: (oldCodd ? "CoDD replaced (was PO "+(oldCodd.certPO||"?")+", destroyed "+(oldCodd.destructionDate||"?")+")" : "CoDD attached"+(newCodd.certNo?" #"+newCodd.certNo:"")) + (newCodd.fileName ? " ["+newCodd.fileName+"]" : "") + (newCodd.note ? " - "+newCodd.note : "")
        });
      }
    });
  }
  // -- Discrepancy harvest (BUILD D1) -- one record per (pickup, type, serial).
  // Rides the wrapper-transition pattern like custody: fires when a pickup's
  // reconcileReport.generatedAt changes (first reconcile AND re-runs), so
  // backfilled audits feed the tracker automatically. Extras are NEVER
  // auto-opened (the vendor reports serials we do not track); they are
  // promoted by hand from the report view. State follows evidence both ways:
  // cleared items auto-resolve as the SYSTEM's act; resolved items that
  // reappear auto-reopen.
  function dxKeyPart(s){ return String(s||"").toUpperCase().replace(/[^A-Z0-9_-]/g, function(c){ return "~"+c.charCodeAt(0).toString(16); }); }
  function dxId(pickupId, type, serial){ return "dx_"+pickupId+"_"+type+"_"+dxKeyPart(serial); }
  function dxNote(by, text){ return { at: new Date().toISOString(), by: by, text: text }; }
  function harvestDiscrepancies(prev, next){
    var prevById = {};
    prev.forEach(function(s){ prevById[s.id] = s; });
    next.forEach(function(s){
      var R = s.reconcileReport;
      var old = prevById[s.id];
      var oldGen = (old && old.reconcileReport && old.reconcileReport.generatedAt) || "";
      if(!R || !R.generatedAt || R.generatedAt === oldGen) return;
      var now = new Date().toISOString();
      var file = R.fileName || s.auditFileName || "";
      var existing = {};
      (discrepanciesRef.current||[]).forEach(function(d){ existing[d.id] = d; });
      var present = {};
      function save(doc){ repo.saveDiscrepancy(doc).catch(function(e){ reportWriteError("save","discrepancies",doc.id,e); }); }
      function upsert(type, serial, ticketNo, ticketId, evidence){
        var id = dxId(s.id, type, serial);
        present[id] = true;
        var d = existing[id];
        if(!d){
          save({ id:id, v:1, type:type, serial:serial,
            ticketNo:ticketNo||"", ticketId:ticketId||"",
            pickupId:s.id, pickupName:s.name||s.id,
            state:"open", openedAt:now, lastSeenAt:now,
            notes:[dxNote("system","Opened by reconcile of "+file)],
            evidence:evidence||{}, resolution:null });
        } else if(d.state==="resolved"){
          // Automation may only reopen what automation closed. A HUMAN
          // resolution (vendor email, judgment call) is not contradicted by
          // a report that merely still lists the serial - only system-
          // resolved records reopen on new evidence.
          if(d.resolution && d.resolution.resolvedBy==="system"){
            save(Object.assign({}, d, { state:"open", resolution:null, lastSeenAt:now,
              notes:(d.notes||[]).concat(dxNote("system","Reappeared on reconcile of "+file+(d.resolution&&d.resolution.reason?" (was resolved: "+d.resolution.reason+")":""))) }));
          }
        } else {
          save(Object.assign({}, d, { lastSeenAt:now }));
        }
      }
      (R.missingFromVendor||[]).forEach(function(a){
        upsert("missing", a.serial, a.ticketNo, a.ticketId,
          { ourTag:a.ouInventory||"", manufacturer:a.manufacturer||"", machineType:a.machineType||"", site:a.site||"" });
      });
      (R.tagMismatch||[]).forEach(function(a){
        upsert("tag-mismatch", a.serial, a.ticketNo, a.ticketId,
          { ourTag:a.ouInventory||"", vendorTag:a.vendorTag||"", vendorSerial:a.vendorSerial||"", vendorDesc:a.vendorDesc||"" });
      });
      (R.crossTicketMatches||[]).forEach(function(m){
        upsert("cross-ticket", m.serial, m.ticketNo, m.ticketId,
          { vendorTag:m.vendorTag||"", vendorDesc:m.vendorDesc||"", ourTag:m.ouInventory||"" });
      });
      (R.duplicateAuditMatches||[]).forEach(function(m){
        upsert("duplicate-audit", m.serial, m.ticketNo, m.ticketId,
          { otherPickup:m.otherPickup||"", otherAudit:m.otherAudit||"", vendorSerial:m.vendorSerial||"" });
      });
      // Promoted extras count as present while the serial is still listed as
      // an extra, so this run does not auto-resolve them.
      (R.extraFromVendor||[]).forEach(function(x){ present[dxId(s.id,"extra",x.serial)] = true; });
      var waived = {};
      (R.waivedSerials||[]).forEach(function(w){ waived[String(w).toUpperCase()] = true; });
      (discrepanciesRef.current||[]).forEach(function(d){
        if(d.pickupId!==s.id || d.state==="resolved" || present[d.id]) return;
        var wasWaived = waived[String(d.serial||"").toUpperCase()];
        var reason = wasWaived ? "waived" : "cleared-by-re-reconcile";
        var text = wasWaived ? "Waived by operator; reconcile of "+file+" excluded this serial"
                             : "Re-reconcile of "+file+" no longer reports this "+d.type;
        save(Object.assign({}, d, { state:"resolved", lastSeenAt:now,
          resolution:{ reason:reason, note:text, resolvedBy:"system", at:now },
          notes:(d.notes||[]).concat(dxNote("system",text)) }));
      });
    });
  }
  // UPSERT-ONLY: writes changed/added items, NEVER deletes. Deletion is
  // explicit (remove* below), so a filtered/subset array can no longer
  // silently mass-delete. Runs OUTSIDE the React updater (uses *Ref.current
  // as prev) so a double-invoked updater cannot double-write.
  function upsertList(prev, next, save, coll){
    next.forEach(function(item){
      var old = prev.find(function(x){ return x.id===item.id; });
      if(!old || JSON.stringify(old) !== JSON.stringify(item)){
        save(item).catch(function(e){ reportWriteError("save", coll, item.id, e); });
      }
    });
  }
  function saveTickets(updaterOrArray){
    var prev = ticketsRef.current || [];
    var next = typeof updaterOrArray==="function" ? updaterOrArray(prev) : updaterOrArray;
    ticketsRef.current = next; setTickets(next);
    if(userRef.current){
      upsertList(prev, next, repo.saveTicket, "tickets");
      detectTicketCustody(prev, next); // chain-of-custody (see emitCustody)
    }
  }
  function saveShipments(updaterOrArray){
    var prev = shipmentsRef.current || [];
    var next = typeof updaterOrArray==="function" ? updaterOrArray(prev) : updaterOrArray;
    shipmentsRef.current = next; setShipments(next);
    if(userRef.current){
      upsertList(prev, next, repo.saveShipment, "shipments");
      detectShipmentCustody(prev, next); // chain-of-custody (see emitCustody)
      harvestDiscrepancies(prev, next);  // discrepancy tracker (BUILD D1)
    }
  }
  function saveLocations(updaterOrArray){
    var prev = locationsRef.current || [];
    var next = typeof updaterOrArray==="function" ? updaterOrArray(prev) : updaterOrArray;
    locationsRef.current = next; setLocations(next);
    if(userRef.current) upsertList(prev, next, repo.saveLocation, "locations");
  }
  function saveRequestors(updaterOrArray){
    var prev = requestorsRef.current || [];
    var next = typeof updaterOrArray==="function" ? updaterOrArray(prev) : updaterOrArray;
    requestorsRef.current = next; setRequestors(next);
    if(userRef.current) upsertList(prev, next, repo.saveRequestor, "requestors");
  }
  // Explicit deletes -- the ONLY path that removes a record from the DB.
  function removeTicket(id){
    ticketsRef.current = (ticketsRef.current||[]).filter(function(x){ return x.id!==id; });
    setTickets(ticketsRef.current);
    if(userRef.current) repo.deleteTicket(id).catch(function(e){ reportWriteError("delete","tickets",id,e); });
  }
  function removeShipment(id){
    var doomed = (shipmentsRef.current||[]).find(function(x){ return x.id===id; });
    shipmentsRef.current = (shipmentsRef.current||[]).filter(function(x){ return x.id!==id; });
    setShipments(shipmentsRef.current);
    if(userRef.current){
      // Custody: deletion bypasses saveShipments, so ungroup is emitted here.
      if(doomed && (doomed.ticketIds||[]).length){
        emitCustody("ungrouped-from-shipment", { shipmentId:doomed.id, ticketIds:doomed.ticketIds, vendorRef:shipVendorRef(doomed), note:"Vendor pickup "+(doomed.name||doomed.id)+" deleted" });
      }
      repo.deleteShipment(id).catch(function(e){ reportWriteError("delete","shipments",id,e); });
    }
  }
  function removeLocation(id){
    locationsRef.current = (locationsRef.current||[]).filter(function(x){ return x.id!==id; });
    setLocations(locationsRef.current);
    if(userRef.current) repo.deleteLocation(id).catch(function(e){ reportWriteError("delete","locations",id,e); });
  }
  function removeRequestor(id){
    requestorsRef.current = (requestorsRef.current||[]).filter(function(x){ return x.id!==id; });
    setRequestors(requestorsRef.current);
    if(userRef.current) repo.deleteRequestor(id).catch(function(e){ reportWriteError("delete","requestors",id,e); });
  }

  // Auto-save session file (still supported for offline backup)
  useEffect(function(){
    if(!fileHandle) return;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current = setTimeout(async function(){
      const ok = await fsaWrite(fileHandle, tickets, shipments, locations, requestors);
      setSaveStatus(ok ? "saved" : "error");
      if(ok) setTimeout(function(){ setSaveStatus("idle"); }, 2500);
    }, 600);
    return function(){ clearTimeout(saveTimer.current); };
  }, [tickets, shipments, fileHandle]);

  // Whole-session loads (FSA open/new, legacy load, push) go through here so
  // state and refs are set together and the refs never drift from React state.
  function hydrateAll(next){
    if(next.tickets){    ticketsRef.current = next.tickets;       setTickets(next.tickets); }
    if(next.shipments){  shipmentsRef.current = next.shipments;   setShipments(next.shipments); }
    if(next.locations){  locationsRef.current = next.locations;   setLocations(next.locations); }
    if(next.requestors){ requestorsRef.current = next.requestors; setRequestors(next.requestors); }
  }
  async function handleFSAOpen(){
    try {
      const result = await fsaPickOpenFile();
      setFileHandle(result.fileHandle);
      hydrateAll({tickets: result.tickets, shipments: result.shipments});
      setVendorReport(null);
      setSaveStatus("idle");
      setImportMsg({ok:true, text:`Opened "${result.fileHandle.name}" — ${result.tickets.length} ticket(s). Changes will auto-save.`});
      setTimeout(function(){ setImportMsg(null); }, 7000);
    } catch(e){
      if(e.name === "AbortError") return;
      setImportMsg({ok:false, text:"Could not open file: "+e.message});
      setTimeout(function(){ setImportMsg(null); }, 5000);
    }
  }

  async function handleFSANew(){
    if(tickets.length > 0 && !confirm("Start a new session? Unsaved in-memory data will be lost.")) return;
    try {
      const fh = await fsaPickSaveFile();
      if(!fh) return;
      setFileHandle(fh);
      hydrateAll({tickets: [], shipments: []}); setVendorReport(null); setSaveStatus("idle");
      setImportMsg({ok:true, text:`New session file created. All changes will auto-save to "${fh.name}".`});
      setTimeout(function(){ setImportMsg(null); }, 7000);
    } catch(e){
      if(e.name === "AbortError") return;
    }
  }

  function pushToFirestore(s){
    if(!userRef.current){
      setImportMsg({ok:false, text:"Not signed in — sign in first, then try pushing again."});
      setTimeout(function(){ setImportMsg(null); }, 5000);
      return;
    }
    // Bulk push via the repository (writes everything; never deletes).
    (s.tickets||[]).forEach(function(t){ repo.saveTicket(t).catch(function(e){ reportWriteError("save","tickets",t.id,e); }); });
    (s.shipments||[]).forEach(function(sh){ repo.saveShipment(sh).catch(function(e){ reportWriteError("save","shipments",sh.id,e); }); });
    (s.locations||[]).forEach(function(l){ repo.saveLocation(l).catch(function(e){ reportWriteError("save","locations",l.id,e); }); });
    (s.requestors||[]).forEach(function(r){ repo.saveRequestor(r).catch(function(e){ reportWriteError("save","requestors",r.id,e); }); });
    // Also update local state + refs
    hydrateAll({tickets: s.tickets||[], shipments: s.shipments||[], locations: s.locations||[], requestors: s.requestors||[]});
    setImportMsg({ok:true, text:"Pushed "+(s.tickets||[]).length+" tickets to Firestore."});
    setTimeout(function(){ setImportMsg(null); }, 6000);
    setPendingSession(null);
  }

  function handleLegacyLoad(e){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(evt){
      try {
        const s = JSON.parse(evt.target.result);
        if(!s.tickets) throw new Error();
        setPendingSession(s);
        setVendorReport(null);
        if(userRef.current){
          pushToFirestore(s);
        } else {
          // Load into local state only — show push button
          hydrateAll({tickets: s.tickets||[], shipments: s.shipments||[], locations: s.locations||[], requestors: s.requestors||[]});
          setImportMsg({ok:true, text:"Loaded "+s.tickets.length+" ticket(s). Sign in then click \"Push to Firestore\" to save."});
        }
      } catch(err){
        setImportMsg({ok:false, text:"Invalid session file."});
      }
      setTimeout(function(){ setImportMsg(null); }, 6000);
    };
    reader.readAsText(file); e.target.value="";
  }

  const needsReviewCount = useMemo(function(){ return tickets.filter(function(t){ return pickupStatus(t)==="awaiting-approval"; }).length; }, [tickets]);
  const pendingCount     = useMemo(function(){ return tickets.filter(function(t){ return pickupStatus(t)==="pending"&&(t.expectedAssets||[]).length>0; }).length; }, [tickets]);
  const openDxCount      = useMemo(function(){ return discrepancies.filter(function(d){ return d.state!=="resolved"; }).length; }, [discrepancies]);

  return (
    <div style={{minHeight:"100vh", background:"#0f172a", paddingBottom:60}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a,#1e293b)", borderBottom:"1px solid #1e3a5f", padding:"24px 36px 0"}}>
        <div style={{maxWidth:1020, margin:"0 auto"}}>
          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12, marginBottom:6}}>
            <div style={{display:"flex", alignItems:"center", gap:14}}>
              <div style={{width:40,height:40,borderRadius:10,overflow:"hidden",flexShrink:0}}>
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+CiAgPGRlZnM+CiAgICA8bGluZWFyR3JhZGllbnQgaWQ9ImJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwJSIgc3R5bGU9InN0b3AtY29sb3I6IzNiODJmNiIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiMwNmI2ZDQiLz4KICAgIDwvbGluZWFyR3JhZGllbnQ+CiAgPC9kZWZzPgogIDwhLS0gQmFja2dyb3VuZCByb3VuZGVkIHNxdWFyZSAtLT4KICA8cmVjdCB3aWR0aD0iNjQiIGhlaWdodD0iNjQiIHJ4PSIxNCIgZmlsbD0idXJsKCNiZykiLz4KICA8IS0tIENsaXBib2FyZCBib2R5IC0tPgogIDxyZWN0IHg9IjE2IiB5PSIxOCIgd2lkdGg9IjMyIiBoZWlnaHQ9IjM2IiByeD0iNCIgZmlsbD0id2hpdGUiIG9wYWNpdHk9IjAuOTUiLz4KICA8IS0tIENsaXBib2FyZCBjbGlwIC0tPgogIDxyZWN0IHg9IjI2IiB5PSIxMyIgd2lkdGg9IjEyIiBoZWlnaHQ9IjkiIHJ4PSIzIiBmaWxsPSIjMWQ0ZWQ4Ii8+CiAgPHJlY3QgeD0iMjgiIHk9IjE1IiB3aWR0aD0iOCIgaGVpZ2h0PSI1IiByeD0iMiIgZmlsbD0id2hpdGUiIG9wYWNpdHk9IjAuNyIvPgogIDwhLS0gQ2hlY2sgbGluZXMgLS0+CiAgPGxpbmUgeDE9IjIyIiB5MT0iMzAiIHgyPSI0MiIgeTI9IjMwIiBzdHJva2U9IiMzYjgyZjYiIHN0cm9rZS13aWR0aD0iMi41IiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KICA8bGluZSB4MT0iMjIiIHkxPSIzNyIgeDI9IjQyIiB5Mj0iMzciIHN0cm9rZT0iIzNiODJmNiIgc3Ryb2tlLXdpZHRoPSIyLjUiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgogIDwhLS0gQ2hlY2ttYXJrIC0tPgogIDxwb2x5bGluZSBwb2ludHM9IjIyLDQ0IDI2LDQ4IDM0LDQwIiBmaWxsPSJub25lIiBzdHJva2U9IiMwNmI2ZDQiIHN0cm9rZS13aWR0aD0iMyIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIi8+Cjwvc3ZnPgo=" style={{width:40,height:40}} alt="AssetTrack"/>
              </div>
              <div>
                <div style={{fontFamily:"'Geist',sans-serif", fontWeight:800, fontSize:22, color:"#f1f5f9", letterSpacing:-0.5}}>AssetTrack</div>
                <div style={{fontSize:11, color:"#64748b", letterSpacing:1.2, textTransform:"uppercase"}}>Computer Disposal Reconciliation</div>
              </div>
            </div>
            {/* Session controls */}
            <div style={{display:"flex", gap:8, alignItems:"center", flexWrap:"wrap"}}>
              {/* Firebase auth */}
              {user ? (
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#86efac"}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:"#86efac",display:"inline-block"}}/>

                  <button onClick={signOut} style={{background:"none",color:"#64748b",border:"1px solid #334155",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Sign out</button>
                </div>
              ) : (
                <button onClick={signIn} style={{background:"linear-gradient(135deg,#1d4ed8,#0284c7)",color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500}}>
                  🔑 Sign in to edit
                </button>
              )}
              {fbLoading && <span style={{fontSize:11,color:"#475569"}}>Loading…</span>}
              {!fbLoading && !user && <span style={{fontSize:11,color:"#64748b"}}>👁 Read-only</span>}
              {user && pendingSession && (
                <button onClick={function(){ pushToFirestore(pendingSession); }}
                  style={{background:"linear-gradient(135deg,#065f46,#0284c7)",color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500,animation:"pulse 1s infinite"}}>
                  ☁ Push to Firestore
                </button>
              )}
              <input ref={jsonRef} type="file" accept=".json" style={{display:"none"}} onChange={handleLegacyLoad}/>
            </div>
            <button onClick={function(){ setShowSettings(true); }}
              style={{background:"#1e293b",color:"#64748b",border:"1px solid #334155",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:16,lineHeight:1}} title="Settings">⚙</button>
          </div>
          {writeError && (
            <div style={{margin:"8px 0",padding:"10px 14px",borderRadius:6,fontSize:12,background:"#450a0a",color:"#fca5a5",border:"1px solid #7f1d1d",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
              <span>{"\u26A0 A change did NOT save to the database ("+writeError.collection+"/"+writeError.id+", "+writeError.op+"). Your latest edit may be lost on refresh \u2014 check your connection or sign-in and re-apply it. Error: "+writeError.message}</span>
              <button onClick={function(){ setWriteError(null); }} style={{background:"#7f1d1d",color:"#fecaca",border:"1px solid #b91c1c",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>Dismiss</button>
            </div>
          )}
          {importMsg && (
            <div style={{margin:"8px 0",padding:"8px 14px",borderRadius:6,fontSize:12,background:importMsg.ok?"#052e16":"#450a0a",color:importMsg.ok?"#86efac":"#fca5a5",border:`1px solid ${importMsg.ok?"#166534":"#7f1d1d"}`}}>
              {importMsg.ok?"✓ ":"✗ "}{importMsg.text}
            </div>
          )}
          {/* Tabs */}
          <div style={{display:showSettings?"none":"flex", gap:2, marginTop:16}}>
            {TABS.map(function(t,i){
              if(i===1 && !user) return null; // hide Pickup Scan for non-signed-in users
              return (
                <button key={t} className="tab-btn" onClick={function(){ setTab(i); }} style={{
                  background:tab===i?"#1d4ed8":"transparent", color:tab===i?"#fff":"#64748b",
                  border:"none", borderBottom:tab===i?"2px solid #3b82f6":"2px solid transparent",
                  padding:"9px 18px", fontSize:12, fontFamily:"inherit", fontWeight:tab===i?500:400,
                  letterSpacing:0.3, borderRadius:"6px 6px 0 0", position:"relative"
                }}>
                  {t}
                  {i===0 && tickets.length>0 && <span style={{marginLeft:6,background:"#1e40af",color:"#93c5fd",borderRadius:999,padding:"1px 6px",fontSize:10}}>{tickets.length}</span>}
                  {i===1 && pendingCount>0 && <span style={{marginLeft:6,background:"#1e3a5f",color:"#93c5fd",borderRadius:999,padding:"1px 6px",fontSize:10}}>{pendingCount}</span>}
                  {i===2 && shipments.length>0 && <span style={{marginLeft:6,background:"#1e40af",color:"#93c5fd",borderRadius:999,padding:"1px 6px",fontSize:10}}>{shipments.length}</span>}
                  {i===6 && openDxCount>0 && <span style={{marginLeft:6,background:"#7f1d1d",color:"#fca5a5",borderRadius:999,padding:"1px 6px",fontSize:10}}>{openDxCount}</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1020, margin:"32px auto 0", padding:"0 24px"}}>
        {showSettings && <SettingsPage locations={locations} setLocations={saveLocations} requestors={requestors} setRequestors={saveRequestors} tickets={tickets} shipments={shipments} appConfig={appConfig} saveAppConfig={saveAppConfig} onClose={function(){ setShowSettings(false); }} readOnly={!user} onDeleteLocation={removeLocation} onDeleteRequestor={removeRequestor}/>}
        {!showSettings && tab===0 && <TicketsTab tickets={tickets} setTickets={saveTickets} setVendorReport={setVendorReport} setTab={setTab} openTicketId={openTicketId} setOpenTicketId={setOpenTicketId} locations={locations} requestors={requestors} custodyEvents={custodyEvents} readOnly={!user} onDeleteTicket={removeTicket}/>}
        {!showSettings && tab===1 && <PickupScanTab tickets={tickets} setTickets={saveTickets} locations={locations} readOnly={!user} routeOrder={routeOrder} setRouteOrder={setRouteOrder}/>}
        {!showSettings && tab===2 && <ShipmentsTab tickets={tickets} setTickets={saveTickets} shipments={shipments} setShipments={saveShipments} setVendorReport={setVendorReport} readOnly={!user} openShipmentId={openShipmentId} setOpenShipmentId={setOpenShipmentId} custodyEvents={custodyEvents} appConfig={appConfig} saveAppConfig={saveAppConfig} onDeleteShipment={removeShipment}/>}
        {!showSettings && tab===3 && <ReconcileTab tickets={tickets} shipments={shipments} setShipments={saveShipments} vendorReport={vendorReport} setVendorReport={setVendorReport} setTab={setTab} readOnly={!user} discrepancies={discrepancies} onTrackExtra={trackExtra}/>}
        {!showSettings && tab===4 && <ReportTab report={vendorReport} tickets={tickets} shipments={shipments} setTab={setTab}/>}
        {!showSettings && tab===5 && <AuditXRefTab tickets={tickets} shipments={shipments} setTab={setTab} setOpenTicketId={setOpenTicketId} setOpenShipmentId={setOpenShipmentId}/>}
        {!showSettings && tab===6 && <DiscrepanciesTab discrepancies={discrepancies} onSave={updateDiscrepancy} userEmail={user&&user.email?user.email:""} readOnly={!user}/>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// SETTINGS PAGE
// ══════════════════════════════════════════════════════════════════
function SettingsPage({locations, setLocations, requestors, setRequestors, tickets, shipments, appConfig, saveAppConfig, onClose, readOnly, onDeleteLocation, onDeleteRequestor}){
  const [section, setSection] = useState("locations");

  // ── Locations ────────────────────────────────────────────────────
  const [locForm, setLocForm] = useState({name:"", address:"", campus:""});
  const [locEdit, setLocEdit] = useState(null); // id being edited

  function saveLoc(){
    if(!locForm.name.trim()){ alert("Location name is required."); return; }
    if(locEdit){
      setLocations(function(prev){ return prev.map(function(l){ return l.id===locEdit ? {...l,...locForm} : l; }); });
      setLocEdit(null);
    } else {
      setLocations(function(prev){ return [...prev, {id:uid(), ...locForm}]; });
    }
    setLocForm({name:"",address:""});
  }
  function editLoc(l){ setLocEdit(l.id); setLocForm({name:l.name, address:l.address||"", campus:l.campus||""}); }
  function delLoc(id){ if(!confirm("Delete this location?")) return; onDeleteLocation(id); if(locEdit===id){ setLocEdit(null); setLocForm({name:"",address:"",campus:""}); } }

  // ── Requestors ───────────────────────────────────────────────────
  const [reqForm, setReqForm] = useState({name:"", email:"", phone:"", department:""});
  const [reqEdit, setReqEdit] = useState(null);

  function saveReq(){
    if(!reqForm.name.trim()){ alert("Requestor name is required."); return; }
    if(reqEdit){
      setRequestors(function(prev){ return prev.map(function(r){ return r.id===reqEdit ? {...r,...reqForm} : r; }); });
      setReqEdit(null);
    } else {
      setRequestors(function(prev){ return [...prev, {id:uid(), ...reqForm}]; });

    setReqForm({name:"",email:"",phone:""});

            <button onClick={function(){ setReqForm({name:"",email:"",phone:"",department:"",_open:false}); setReqEdit(null); }}
              style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:7,padding:"8px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Cancel</button>
            <button onClick={function(){ saveReq(); setReqForm({name:"",email:"",phone:"",department:"",_open:false}); }}
              style={{background:"linear-gradient(135deg,#065f46,#0284c7)",color:"#fff",border:"none",borderRadius:7,padding:"8px 22px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>{reqEdit?"Update Requestor":"Add Requestor"}</button>

  );
}


function DataManagementSection({tickets, shipments, locations, setLocations, requestors, setRequestors, appConfig, saveAppConfig, readOnly}){
  const [govEmail, setGovEmail] = useState((appConfig&&appConfig.governanceEmail)||"");
  useEffect(function(){ setGovEmail((appConfig&&appConfig.governanceEmail)||""); }, [appConfig&&appConfig.governanceEmail]);
  const [showImport, setShowImport]     = useState(false);
  const [importMsg,  setImportMsg]      = useState(null);
  const [preview,    setPreview]        = useState(null); // {locations:[], requestors:[]}
  const locFileRef  = React.useRef();
  const reqFileRef  = React.useRef();

  function flashMsg(ok, text){ setImportMsg({ok,text}); setTimeout(function(){ setImportMsg(null); }, 6000); }

  function parseLocFile(e){
    var file = e.target.files[0]; e.target.value=""; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var wb = XLSX.read(ev.target.result, {type:"array"});
        var ws = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(ws, {defval:""});
        // Auto-detect columns — look for name/location, campus
        var sample = rows[0] ? Object.keys(rows[0]) : [];
        function findCol(keys){ return sample.find(function(k){ return keys.some(function(kw){ return k.toLowerCase().includes(kw); }); })||""; }
        var nameCol   = findCol(["location","building","site","name"]);
        var campusCol = findCol(["campus"]);
        var addressCol= findCol(["address"]);
        if(!nameCol){ flashMsg(false,"Could not find a Location/Name column. Expected a column named 'Location', 'Building', 'Site', or 'Name'."); return; }

        var seen = new Set();
        var locs = [];
        rows.forEach(function(r){
          var name = String(r[nameCol]||"").trim();
          if(!name || seen.has(name.toLowerCase())) return;
          seen.add(name.toLowerCase());
          locs.push({ id:uid(), name:name, campus:(campusCol?String(r[campusCol]||"").trim():""), address:(addressCol?String(r[addressCol]||"").trim():"") });
        });
        setPreview(function(prev){ return {...(prev||{}), locations:locs}; });
        flashMsg(true, locs.length+" unique locations detected — review below then click Import.");
      } catch(err){ flashMsg(false,"Could not read file: "+err.message); }
    };
    reader.readAsArrayBuffer(file);
  }

  function parseReqFile(e){
    var file = e.target.files[0]; e.target.value=""; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var wb = XLSX.read(ev.target.result, {type:"array"});
        var ws = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(ws, {defval:""});
        var sample = rows[0] ? Object.keys(rows[0]) : [];
        function findCol(keys){ return sample.find(function(k){ return keys.some(function(kw){ return k.toLowerCase().includes(kw); }); })||""; }
        var nameCol  = findCol(["name","requestor","contact","person"]);
        var emailCol = findCol(["email","mail"]);
        var phoneCol = findCol(["phone","tel","mobile","cell"]);
        var deptCol  = findCol(["department","dept","division","unit"]);
        if(!nameCol && !emailCol){ flashMsg(false,"Could not find a Name or Email column."); return; }

        var seenEmail = new Set();
        var seenName  = new Set();
        var reqs = [];
        rows.forEach(function(r){
          var name  = String(r[nameCol]||"").trim();
          var email = String(r[emailCol]||"").trim().toLowerCase();
          if(!name && !email) return;
          // Deduplicate by email first, then by name
          var key = email || name.toLowerCase();
          if(seenEmail.has(key)) return;
          seenEmail.add(key);
          if(name && seenName.has(name.toLowerCase())) return;
          if(name) seenName.add(name.toLowerCase());

// ── Chain-of-Custody timeline (custody BUILD 3) ──────────────────
// Read-only view over custodyEvents. Rendering rules: sort by occurredAt
// (recordedAt tie-break); show "recorded ..." only when the recorded day
// differs from the occurred day (the honest after-the-fact gap: arrivals,
// CoDDs); serials collapsed to a count, expandable per event.
var CUSTODY_META = {
  "ticket-created":          {icon:"🎫", label:"Ticket Created",             color:"#93c5fd", border:"#1e40af"},
  "pickup-scanned":          {icon:"📷", label:"Pickup Scanned",             color:"#93c5fd", border:"#1e40af"},
  "pickup-attested":         {icon:"🖊", label:"Pickup Attested",            color:"#93c5fd", border:"#1e40af"},
  "approval-captured":       {icon:"🖊", label:"In-Person Approval",         color:"#86efac", border:"#166534"},
  "approval-validated":      {icon:"✅", label:"Approval Validated",         color:"#86efac", border:"#166534"},
  "grouped-into-shipment":   {icon:"📦", label:"Grouped into Vendor Pickup", color:"#94a3b8", border:"#334155"},
  "ungrouped-from-shipment": {icon:"📤", label:"Removed from Vendor Pickup", color:"#94a3b8", border:"#334155"},
  "vendor-handoff":          {icon:"🚛", label:"Vendor Handoff",             color:"#fbbf24", border:"#a16207"},
  "warehouse-arrival":       {icon:"🏭", label:"Warehouse Arrival",          color:"#a78bfa", border:"#4c1d95"},
  "reconciled":              {icon:"✅", label:"Reconciled",                 color:"#86efac", border:"#166534"},
  "codd-attached":           {icon:"📜", label:"CoDD Attached",              color:"#a78bfa", border:"#4c1d95"}
};
function custodyOccurredStr(iso){
  if(!iso) return "—";
  if(/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(iso)) return fmtDate(iso);
  var d = new Date(iso);
  return isNaN(d.getTime()) ? String(iso) : d.toLocaleString();
}
function custodyDayLocal(iso){
  if(!iso) return "";
  if(/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(iso)){ var p=iso.split("-"); return new Date(p[0],p[1]-1,p[2]).toLocaleDateString(); }
  var d = new Date(iso);
  return isNaN(d.getTime()) ? "" : d.toLocaleDateString();
}
function custodyRecordedDate(rec){
  if(!rec) return null;
  if(typeof rec.toDate === "function") return rec.toDate(); // Firestore Timestamp
  if(rec.seconds !== undefined) return new Date(rec.seconds*1000);
  var d = new Date(rec);
  return isNaN(d.getTime()) ? null : d;
}
function CustodyTimeline({events}){
  const [openSerials, setOpenSerials] = useState({});
  const [openHeaderSerials, setOpenHeaderSerials] = useState(false);
  var sorted = (events||[]).slice().sort(function(a,b){
    var cmp = String(a.occurredAt||"").localeCompare(String(b.occurredAt||""));
    if(cmp!==0) return cmp;
    var ar = custodyRecordedDate(a.recordedAt), br = custodyRecordedDate(b.recordedAt);
    return (ar?ar.getTime():0) - (br?br.getTime():0);
  });
  if(sorted.length===0) return (
    <div style={{padding:"16px 4px",fontSize:12,color:"#64748b"}}>No custody events recorded. The log starts at go-live — earlier history was not backfilled.</div>
  );
  var headerRef = null, headerSerials = null;
  for(var hi=sorted.length-1; hi>=0; hi--){
    if(headerRef===null && sorted[hi].vendorRef) headerRef = sorted[hi].vendorRef;
    if(headerSerials===null && (sorted[hi].serials||[]).length) headerSerials = sorted[hi].serials;
    if(headerRef!==null && headerSerials!==null) break;
  }
  var headerKey = headerSerials ? headerSerials.join("|") : "";
  return (
    <React.Fragment>
      {(headerRef || headerSerials) && (
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            {headerRef && <span style={{fontSize:10,fontFamily:"'Geist Mono',monospace",background:"#0f172a",color:"#93c5fd",border:"1px solid #1e3a5f",borderRadius:5,padding:"2px 8px"}}>PO {headerRef}</span>}
            {headerSerials && (
              <button onClick={function(){ setOpenHeaderSerials(function(v){ return !v; }); }} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:5,padding:"2px 9px",cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>{headerSerials.length+" serial"+(headerSerials.length!==1?"s":"")+" in custody"+(openHeaderSerials?" ▴":" ▾")}</button>
            )}
          </div>
          {openHeaderSerials && headerSerials && (
            <div style={{marginTop:6,padding:"8px 10px",background:"#0f172a",border:"1px solid #334155",borderRadius:7,fontFamily:"'Geist Mono',monospace",fontSize:10,color:"#94a3b8",maxHeight:140,overflowY:"auto",lineHeight:1.8}}>
              {headerSerials.join("  ·  ")}
            </div>
          )}
        </div>
      )}
      <div style={{position:"relative",paddingLeft:32,paddingTop:4}}>
      <div style={{position:"absolute",left:12,top:10,bottom:10,width:2,background:"#334155"}}/>
      {sorted.map(function(ev){
        var m = CUSTODY_META[ev.type] || {icon:"•", label:ev.type||"(unknown event)", color:"#94a3b8", border:"#334155"};
        var rec = custodyRecordedDate(ev.recordedAt);
        var showRecorded = rec && custodyDayLocal(ev.occurredAt)!==rec.toLocaleDateString();
        var serialCount = (ev.serials||[]).length;
        var serialsDiffer = serialCount>0 && (ev.serials||[]).join("|")!==headerKey;
        return (
          <div key={ev.id} style={{position:"relative",paddingBottom:16}}>
            <div style={{position:"absolute",left:-32,top:0,width:26,height:26,borderRadius:"50%",background:"#0f172a",border:"2px solid "+m.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>{m.icon}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",minHeight:26}}>
              <span style={{fontSize:13,fontWeight:600,color:m.color}}>{m.label}</span>
              {ev.vendorRef && ev.vendorRef!==headerRef && <span style={{fontSize:10,fontFamily:"'Geist Mono',monospace",background:"#0f172a",color:"#93c5fd",border:"1px solid #1e3a5f",borderRadius:5,padding:"1px 7px"}}>PO {ev.vendorRef}</span>}
              {ev.provenance && <span style={{fontSize:10,color:"#64748b",border:"1px solid #334155",borderRadius:5,padding:"1px 7px"}}>{ev.provenance}</span>}
              {serialsDiffer && (
                <button onClick={function(){ setOpenSerials(function(o){ var n={...o}; n[ev.id]=!n[ev.id]; return n; }); }} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:5,padding:"1px 8px",cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>{serialCount+" serial"+(serialCount!==1?"s":"")+(openSerials[ev.id]?" ▴":" ▾")}</button>
              )}
            </div>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>
              {custodyOccurredStr(ev.occurredAt)}
              {showRecorded && <span style={{color:"#64748b"}}>{" · recorded "+rec.toLocaleDateString()}</span>}
              {ev.recorderEmail && <span style={{color:"#64748b"}}>{" · "+ev.recorderEmail}</span>}
              {ev.attester && ev.attester.name && <span style={{color:"#64748b"}}>{" · attested by "+ev.attester.name}</span>}
            </div>
            {ev.note && <div style={{fontSize:11,color:"#64748b",fontStyle:"italic",marginTop:2}}>{ev.note}</div>}
            {openSerials[ev.id] && serialsDiffer && (
              <div style={{marginTop:6,padding:"8px 10px",background:"#0f172a",border:"1px solid #334155",borderRadius:7,fontFamily:"'Geist Mono',monospace",fontSize:10,color:"#94a3b8",maxHeight:140,overflowY:"auto",lineHeight:1.8}}>
                {ev.serials.join("  ·  ")}
              </div>
            )}
          </div>
        );
      })}
      </div>
    </React.Fragment>
  );
}

      expectedAssets:[], itemCounts:{lcdMonitors:0,miscBoxes:0,hardDriveBoxes:0,printers:0},
