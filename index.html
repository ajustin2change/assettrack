                    <div key={row.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 8px",borderRadius:6,background:"#0f172a"}}>
                      <span style={{fontSize:11,color:row.color}}>{row.label}</span>
                      <span style={{fontSize:12,color:"#f1f5f9",fontWeight:600}}>{row.count}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── Row 3: Vendor breakdown + scan method ── */}
      {/* ── Row 3: Pickup method (full width) ── */}
      <div style={{marginBottom:20}}>
        <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"18px 22px"}}>
          <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:14}}>Pickup Method</div>
          {(function(){
            var direct   = filteredTickets.filter(function(t){ return t.directVendorPickup; }).length;
            var scanned  = filteredTickets.filter(function(t){ return t.pickupScanned && !t.directVendorPickup; }).length;
            var pending  = filteredTickets.filter(function(t){ return !t.pickupScanned; }).length;
            var tot      = direct+scanned+pending||1;
            return (
              <div>
                <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
                  <DonutChart size={100} thickness={22} segments={[
                    {value:scanned, color:"#166534"},
                    {value:direct,  color:"#d97706"},
                    {value:pending, color:"#334155"},
                  ]}/>
                </div>
                {[
                  {label:"Scanned Internally", count:scanned, color:"#86efac"},
                  {label:"Vendor Direct",       count:direct,  color:"#fde047"},
                  {label:"Not Yet Scanned",     count:pending, color:"#475569"},
                ].map(function(row){
                  return (
                    <div key={row.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #334155"}}>
                      <span style={{fontSize:11,color:row.color,display:"flex",alignItems:"center",gap:6}}>
                        <span style={{width:8,height:8,borderRadius:"50%",background:row.color,display:"inline-block",flexShrink:0}}/>
                        {row.label}
                      </span>
                      <span style={{fontSize:12,color:"#f1f5f9",fontWeight:600}}>{row.count} <span style={{fontSize:10,color:"#475569"}}>({Math.round(row.count/tot*100)}%)</span></span>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      </div>

      {/* ── Row 4: Vendor pickup status ── */}
      <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"18px 22px",marginBottom:20}}>
        <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:14}}>Vendor Pickup Status</div>
        {shipments.length===0 ? (
          <div style={{color:"#475569",fontSize:12,textAlign:"center"}}>No vendor pickups created yet.</div>
        ) : (function(){
          var sched = shipments.filter(function(s){ return s.status==="scheduled"; }).length;
          var pickedUp = shipments.filter(function(s){ return s.status==="picked-up"; }).length;
          var recon = shipments.filter(function(s){ return s.status==="reconciled"; }).length;
          var tot = shipments.length;
          return (
            <div style={{display:"flex",gap:24,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{height:20,borderRadius:6,overflow:"hidden",display:"flex",background:"#0f172a",flex:1,minWidth:200}}>
                {recon>0    && <div style={{width:(recon/tot*100)+"%",   background:"#166534"}} title={"Reconciled: "+recon}/>}
                {pickedUp>0 && <div style={{width:(pickedUp/tot*100)+"%",background:"#a16207"}} title={"Picked Up: "+pickedUp}/>}
                {sched>0    && <div style={{width:(sched/tot*100)+"%",   background:"#1e3a5f"}} title={"Scheduled: "+sched}/>}
              </div>
              <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                {[
                  {label:"Reconciled",count:recon,    color:"#86efac"},
                  {label:"Picked Up", count:pickedUp, color:"#fde047"},
                  {label:"Scheduled", count:sched,    color:"#93c5fd"},
                ].map(function(row){
                  return <span key={row.label} style={{fontSize:12,color:row.color}}><strong>{row.count}</strong> {row.label}</span>;
                })}
              </div>
            </div>
          );
        })()}
      </div>

      {/* ── Placeholder for future metrics ── */}
      <div style={{border:"1px dashed #334155",borderRadius:12,padding:"24px",textAlign:"center",color:"#334155"}}>
        <div style={{fontSize:20,marginBottom:6}}>📊</div>
        <div style={{fontSize:12}}>Additional metrics and charts can be added here.</div>
      </div>
    </div>
  );
}


// ── Discrepancy tracker UI (BUILD D2) ──────────────────────────────
// Severity IS the type: rank orders the list worst-first, no manual ranking.
const DX_TYPES = {
  "missing":         { label:"Missing from Vendor", rank:1, stripe:"#ef4444", bg:"#450a0a", text:"#fca5a5", border:"#7f1d1d" },
  "cross-ticket":    { label:"Cross-Ticket",        rank:2, stripe:"#f97316", bg:"#431407", text:"#fdba74", border:"#7c2d12" },
  "duplicate-audit": { label:"Duplicate Audit",     rank:3, stripe:"#eab308", bg:"#422006", text:"#fde047", border:"#713f12" },
  "extra":           { label:"Extra from Vendor",   rank:4, stripe:"#a855f7", bg:"#3b0764", text:"#d8b4fe", border:"#6b21a8" },
  "tag-mismatch":    { label:"Tag Mismatch",        rank:5, stripe:"#38bdf8", bg:"#082f49", text:"#7dd3fc", border:"#075985" }
};
const DX_STATES = {
  open:     { label:"Open",     bg:"#450a0a", text:"#fca5a5", border:"#7f1d1d" },
  chasing:  { label:"Chasing",  bg:"#422006", text:"#fde047", border:"#713f12" },
  resolved: { label:"Resolved", bg:"#052e16", text:"#86efac", border:"#166534" }
};
const DX_REASONS = [
  { code:"found-later-audit", label:"Found on later audit" },
  { code:"vendor-serial",     label:"Vendor-created serial" },
  { code:"vendor-confirmed",  label:"Vendor confirmed after inquiry" },
  { code:"our-data-error",    label:"Our data error" },
  { code:"never-left",        label:"Never left the building" },
  { code:"other",             label:"Other (note required)" }
];
const DX_REASON_LABELS = (function(){
  var m = { "cleared-by-re-reconcile":"Cleared by re-reconcile", "waived":"Waived" };
  DX_REASONS.forEach(function(r){ m[r.code] = r.label; });
  return m;
})();
function dxAgeDays(d){
  var t = Date.parse(d.openedAt||""); if(isNaN(t)) return null;
  return Math.max(0, Math.floor((Date.now()-t)/86400000));
}
function dxFmtDate(iso){ var t = Date.parse(iso||""); return isNaN(t) ? "" : new Date(t).toLocaleDateString(); }

function DiscrepanciesTab({discrepancies, onSave, userEmail, readOnly}){
  const [fType, setFType]               = useState("");
  const [fState, setFState]             = useState("");
  const [fPickup, setFPickup]           = useState("");
  const [showResolved, setShowResolved] = useState(false);
  const [expandedId, setExpandedId]     = useState(null);
  const [resolvingId, setResolvingId]   = useState(null);
  const [reasonCode, setReasonCode]     = useState("");
  const [resolveNote, setResolveNote]   = useState("");
  const [noteDraft, setNoteDraft]       = useState("");
  const [copied, setCopied]             = useState(false);

  const pickupNames = useMemo(function(){
    var seen = {};
    (discrepancies||[]).forEach(function(d){ if(d.pickupName) seen[d.pickupName] = true; });
    return Object.keys(seen).sort();
  }, [discrepancies]);

  const list = useMemo(function(){
    var out = (discrepancies||[]).filter(function(d){
      if(fType && d.type!==fType) return false;
      if(fPickup && d.pickupName!==fPickup) return false;
      if(fState) return d.state===fState;
      if(d.state==="resolved" && !showResolved) return false;
      return true;
    });
    out.sort(function(a,b){
      var ra = (DX_TYPES[a.type]||{}).rank||9, rb = (DX_TYPES[b.type]||{}).rank||9;
      if(ra!==rb) return ra-rb;
      return String(a.openedAt||"").localeCompare(String(b.openedAt||""));
    });
    return out;
  }, [discrepancies, fType, fState, fPickup, showResolved]);

  const counts = useMemo(function(){
    var c = { open:0, chasing:0, resolved:0 };
    (discrepancies||[]).forEach(function(d){ c[d.state] = (c[d.state]||0)+1; });
    return c;
  }, [discrepancies]);
  const copyable = useMemo(function(){
    var seen = {}, out = [];
    list.forEach(function(d){ if(d.state!=="resolved" && d.serial && !seen[d.serial]){ seen[d.serial]=true; out.push(d.serial); } });
    return out;
  }, [list]);

  function stamp(){ return new Date().toISOString(); }
  function withNote(d, text, patch){
    return Object.assign({}, d, patch||{}, { notes:(d.notes||[]).concat({ at:stamp(), by:(userEmail||"user"), text:text }) });
  }
  function cycleState(d){
    if(readOnly || d.state==="resolved") return;
    var next = d.state==="open" ? "chasing" : "open";
    onSave(withNote(d, next==="chasing" ? "Marked chasing" : "Marked open", { state:next }));
  }
  function submitResolve(d){
    if(!reasonCode) return;
    if(reasonCode==="other" && !resolveNote.trim()) return;
    var label = DX_REASON_LABELS[reasonCode]||reasonCode;
    onSave(withNote(d, "Resolved: "+label+(resolveNote.trim() ? " - "+resolveNote.trim() : ""), {
      state:"resolved",
      resolution:{ reason:reasonCode, note:resolveNote.trim(), resolvedBy:"user", at:stamp() }
    }));
    setResolvingId(null); setReasonCode(""); setResolveNote("");
  }
  function reopen(d){
    if(readOnly) return;
    var was = d.resolution && d.resolution.reason ? (DX_REASON_LABELS[d.resolution.reason]||d.resolution.reason) : "";
    onSave(withNote(d, "Reopened by operator"+(was ? " (was resolved: "+was+")" : ""), { state:"open", resolution:null }));
  }
  function addNote(d){
    var t = noteDraft.trim(); if(!t) return;
    onSave(withNote(d, t)); setNoteDraft("");
  }
  function copySerials(){
    if(!copyable.length) return;
    navigator.clipboard.writeText(copyable.join("\n")).then(function(){
      setCopied(true); setTimeout(function(){ setCopied(false); }, 1600);
    });
  }
  function chip(label, active, onClick, colors){
    return (
      <button key={label} onClick={onClick} className="tab-btn" style={{
        background: active ? ((colors&&colors.bg)||"#1d4ed8") : "transparent",
        color: active ? ((colors&&colors.text)||"#fff") : "#64748b",
        border: "1px solid "+(active ? ((colors&&colors.border)||"#3b82f6") : "#334155"),
        borderRadius:999, padding:"3px 12px", fontSize:11, fontFamily:"inherit"
      }}>{label}</button>
    );
  }
  function evRow(k, v){
    if(v===undefined || v===null || v==="") return null;
    return (
      <div key={k} style={{display:"flex", gap:8, fontSize:12}}>
        <span style={{color:"#64748b", minWidth:140}}>{k}</span>
        <span style={{color:"#cbd5e1", fontFamily:"'Geist Mono',monospace"}}>{String(v)}</span>
      </div>
    );
  }
  function evidenceBlock(d){
    var e = d.evidence||{};
    var rows;
    if(d.type==="tag-mismatch")       rows = [evRow("Our tag", e.ourTag||"(blank)"), evRow("Vendor tag", e.vendorTag||"(blank)"), evRow("Vendor serial", e.vendorSerial), evRow("Vendor description", e.vendorDesc)];
    else if(d.type==="cross-ticket")  rows = [evRow("Belongs to ticket", d.ticketNo||"?"), evRow("Vendor tag", e.vendorTag), evRow("Vendor description", e.vendorDesc)];
    else if(d.type==="duplicate-audit") rows = [evRow("Also on pickup", e.otherPickup), evRow("Other audit file", e.otherAudit)];
    else if(d.type==="missing")       rows = [evRow("Our tag", e.ourTag), evRow("Manufacturer", e.manufacturer), evRow("Machine type", e.machineType), evRow("Site", e.site)];
    else rows = Object.keys(e).map(function(k){ return evRow(k, e[k]); });
    return <div style={{display:"flex", flexDirection:"column", gap:4}}>{rows}</div>;
  }

  return (
    <div style={{display:"flex", flexDirection:"column", gap:14}}>
      <div style={{display:"flex", alignItems:"baseline", gap:14, flexWrap:"wrap"}}>
        <h2 style={{fontSize:18, fontWeight:600, color:"#e2e8f0"}}>Discrepancies</h2>
        <span style={{fontSize:12, color:"#64748b"}}>{counts.open} open &middot; {counts.chasing} chasing &middot; {counts.resolved} resolved</span>
        <button onClick={copySerials} disabled={!copyable.length} className="resolve-btn" style={{
          marginLeft:"auto", background:copied?"#052e16":"#172554", color:copied?"#86efac":"#93c5fd",
          border:"1px solid "+(copied?"#166534":"#1e40af"), borderRadius:6, padding:"5px 14px",
          fontSize:12, fontFamily:"inherit", cursor:copyable.length?"pointer":"default", opacity:copyable.length?1:0.4
        }}>{copied ? "Copied \u2713" : "Copy open serials ("+copyable.length+")"}</button>
      </div>
      <div style={{display:"flex", flexWrap:"wrap", gap:6, alignItems:"center"}}>
        {chip("All types", !fType, function(){ setFType(""); })}
        {Object.keys(DX_TYPES).map(function(k){ return chip(DX_TYPES[k].label, fType===k, function(){ setFType(fType===k?"":k); }, DX_TYPES[k]); })}
      </div>
      <div style={{display:"flex", flexWrap:"wrap", gap:6, alignItems:"center"}}>
        {chip("Open", fState==="open", function(){ setFState(fState==="open"?"":"open"); }, DX_STATES.open)}
        {chip("Chasing", fState==="chasing", function(){ setFState(fState==="chasing"?"":"chasing"); }, DX_STATES.chasing)}
        {chip("Resolved", fState==="resolved", function(){ setFState(fState==="resolved"?"":"resolved"); }, DX_STATES.resolved)}
        <select value={fPickup} onChange={function(e){ setFPickup(e.target.value); }} style={{
          background:"#0b1222", color:"#cbd5e1", border:"1px solid #334155", borderRadius:6,
          padding:"4px 8px", fontSize:12, fontFamily:"inherit"
        }}>
          <option value="">All pickups</option>
          {pickupNames.map(function(p){ return <option key={p} value={p}>{p}</option>; })}
        </select>
        {!fState && (
          <label style={{fontSize:12, color:"#64748b", display:"flex", alignItems:"center", gap:6, cursor:"pointer"}}>
            <input type="checkbox" checked={showResolved} onChange={function(e){ setShowResolved(e.target.checked); }}/>
            show resolved
          </label>
        )}
      </div>
      {list.length===0 && (
        <div style={{textAlign:"center", padding:"48px 20px", color:"#64748b", border:"1px dashed #334155", borderRadius:10}}>
          {(discrepancies||[]).length===0 ? (
            <div style={{fontSize:14}}>No discrepancies tracked yet. Records appear automatically when a reconcile reports problems.</div>
          ) : (
            <div style={{fontSize:13}}>Nothing matches the current filters.</div>
          )}
        </div>
      )}
      {list.map(function(d){
        var T = DX_TYPES[d.type]||{ label:d.type, rank:9, stripe:"#64748b", bg:"#1e293b", text:"#94a3b8", border:"#334155" };
        var S = DX_STATES[d.state]||DX_STATES.open;
        var isOpen = expandedId===d.id;
        var age = dxAgeDays(d);
        return (
          <div key={d.id} className="card-hover" style={{border:"1px solid #1e293b", borderLeft:"4px solid "+T.stripe, borderRadius:8, background:"#0b1222", overflow:"hidden"}}>
            <div onClick={function(){ setExpandedId(isOpen?null:d.id); setResolvingId(null); setNoteDraft(""); }} style={{display:"flex", alignItems:"center", gap:10, padding:"10px 14px", cursor:"pointer", flexWrap:"wrap"}}>
              <span className="pill" style={{background:T.bg, color:T.text, border:"1px solid "+T.border}}>{T.label}</span>
              <span style={{fontFamily:"'Geist Mono',monospace", fontSize:14, fontWeight:600, color:"#e2e8f0"}}>{d.serial}</span>
              {d.ticketNo ? <span style={{fontSize:11, color:"#93c5fd", background:"#172554", border:"1px solid #1e40af", borderRadius:999, padding:"1px 8px"}}>{d.ticketNo}</span> : null}
              <span style={{fontSize:11, color:"#94a3b8", background:"#1e293b", border:"1px solid #334155", borderRadius:999, padding:"1px 8px"}}>{d.pickupName}</span>
              <span style={{marginLeft:"auto", fontSize:11, color:"#64748b"}}>
                {d.state==="resolved" ? ("resolved "+dxFmtDate(d.resolution&&d.resolution.at)) : (age===null ? "" : ("open "+age+(age===1?" day":" days")))}
              </span>
              <span className="pill" style={{background:S.bg, color:S.text, border:"1px solid "+S.border}}>{S.label}</span>
            </div>
            {isOpen && (
              <div style={{borderTop:"1px solid #1e293b", padding:"12px 16px", display:"flex", flexDirection:"column", gap:12}}>
                {evidenceBlock(d)}
                {d.state==="resolved" && d.resolution && (
                  <div style={{fontSize:12, color:"#86efac", background:"#052e16", border:"1px solid #166534", borderRadius:6, padding:"8px 12px"}}>
                    Resolved &mdash; {DX_REASON_LABELS[d.resolution.reason]||d.resolution.reason}
                    {d.resolution.note ? " \u00b7 "+d.resolution.note : ""}
                    {" \u00b7 by "}{d.resolution.resolvedBy==="system" ? "system" : "operator"}
                    {" \u00b7 "+dxFmtDate(d.resolution.at)}
                  </div>
                )}
                <div style={{display:"flex", flexDirection:"column", gap:5}}>
                  {(d.notes||[]).map(function(n,i){
                    return (
                      <div key={i} style={{fontSize:12, display:"flex", gap:8}}>
                        <span style={{color:"#475569", whiteSpace:"nowrap"}}>{dxFmtDate(n.at)}</span>
                        <span style={{color:n.by==="system"?"#f59e0b":"#38bdf8", whiteSpace:"nowrap"}}>{n.by==="system"?"system":n.by}</span>
                        <span style={{color:"#cbd5e1"}}>{n.text}</span>
                      </div>
                    );
                  })}
                </div>
                {!readOnly && d.state!=="resolved" && (
                  <div style={{display:"flex", gap:8}}>
                    <input value={noteDraft} onChange={function(e){ setNoteDraft(e.target.value); }} placeholder="Add a note to the trail" style={{
                      flex:1, background:"#0f172a", color:"#e2e8f0", border:"1px solid #334155", borderRadius:6, padding:"6px 10px", fontSize:12, fontFamily:"inherit"
                    }}/>
                    <button onClick={function(){ addNote(d); }} className="resolve-btn" style={{background:"#1e293b", color:"#93c5fd", border:"1px solid #334155", borderRadius:6, padding:"6px 14px", fontSize:12, fontFamily:"inherit", cursor:"pointer"}}>Add note</button>
                  </div>
                )}
                {!readOnly && d.state!=="resolved" && resolvingId!==d.id && (
                  <div style={{display:"flex", gap:8}}>
                    <button onClick={function(){ cycleState(d); }} className="resolve-btn" style={{
                      background:d.state==="open"?"#422006":"#1e293b", color:d.state==="open"?"#fde047":"#94a3b8",
                      border:"1px solid "+(d.state==="open"?"#713f12":"#334155"),
                      borderRadius:6, padding:"6px 16px", fontSize:12, fontFamily:"inherit", cursor:"pointer"
                    }}>{d.state==="open" ? "Mark as Chasing" : "Back to Open"}</button>
                    <button onClick={function(){ setResolvingId(d.id); setReasonCode(""); setResolveNote(""); }} className="resolve-btn" style={{background:"#052e16", color:"#86efac", border:"1px solid #166534", borderRadius:6, padding:"6px 16px", fontSize:12, fontFamily:"inherit", cursor:"pointer"}}>Resolve&hellip;</button>
                  </div>
                )}
                {!readOnly && resolvingId===d.id && (
                  <div style={{display:"flex", flexDirection:"column", gap:8, background:"#0f172a", border:"1px solid #334155", borderRadius:8, padding:"10px 12px"}}>
                    <div style={{fontSize:12, color:"#94a3b8"}}>Resolution reason</div>
                    <select value={reasonCode} onChange={function(e){ setReasonCode(e.target.value); }} style={{background:"#0b1222", color:"#e2e8f0", border:"1px solid #334155", borderRadius:6, padding:"6px 8px", fontSize:12, fontFamily:"inherit"}}>
                      <option value="">Select a reason&hellip;</option>
                      {DX_REASONS.map(function(r){ return <option key={r.code} value={r.code}>{r.label}</option>; })}
                    </select>
                    <input value={resolveNote} onChange={function(e){ setResolveNote(e.target.value); }} placeholder={reasonCode==="other" ? "Note (required for Other)" : "Note (optional)"} style={{
                      background:"#0b1222", color:"#e2e8f0", border:"1px solid "+(reasonCode==="other"&&!resolveNote.trim()?"#7f1d1d":"#334155"), borderRadius:6, padding:"6px 10px", fontSize:12, fontFamily:"inherit"
                    }}/>
                    <div style={{display:"flex", gap:8}}>
                      <button onClick={function(){ submitResolve(d); }} disabled={!reasonCode||(reasonCode==="other"&&!resolveNote.trim())} className="resolve-btn" style={{
                        background:"#166534", color:"#fff", border:"none", borderRadius:6, padding:"6px 16px", fontSize:12, fontFamily:"inherit",
                        cursor:(!reasonCode||(reasonCode==="other"&&!resolveNote.trim()))?"default":"pointer",
                        opacity:(!reasonCode||(reasonCode==="other"&&!resolveNote.trim()))?0.4:1
                      }}>Confirm resolve</button>
                      <button onClick={function(){ setResolvingId(null); }} className="resolve-btn" style={{background:"transparent", color:"#64748b", border:"1px solid #334155", borderRadius:6, padding:"6px 14px", fontSize:12, fontFamily:"inherit", cursor:"pointer"}}>Cancel</button>
                    </div>
                  </div>
                )}
                {!readOnly && d.state==="resolved" && (
                  <div>
                    <button onClick={function(){ reopen(d); }} className="resolve-btn" style={{background:"#1e293b", color:"#fdba74", border:"1px solid #7c2d12", borderRadius:6, padding:"6px 16px", fontSize:12, fontFamily:"inherit", cursor:"pointer"}}>Reopen</button>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function AuditXRefTab({tickets, shipments, setTab, setOpenTicketId, setOpenShipmentId}){
  const [results,      setResults]      = useState(null);
  const [running,      setRunning]      = useState(false);
  const [serialSearch, setSerialSearch] = useState("");
  const [serialResult, setSerialResult] = useState(null); // null | {found, hits:[]}

  function searchSerial(raw){
    var q = raw.trim().toUpperCase();
    if(!q){ setSerialResult(null); return; }
    var qNorm = /^\d+$/.test(q) ? String(parseInt(q,10)) : q;
    var hits = [];

    // Search all tickets
    tickets.forEach(function(t){
      var seen = new Set();
      var allAssets = [];
      [(t.expectedAssets||[]),(t.assets||[])].forEach(function(list){
        list.forEach(function(a){
          if(!a.serial || seen.has(a.serial.toUpperCase())) return;
          seen.add(a.serial.toUpperCase());
          allAssets.push(a);
        });
      });
      allAssets.forEach(function(a){
        var su = a.serial.toUpperCase();
        var sn = /^\d+$/.test(su) ? String(parseInt(su,10)) : su;
        if(su.includes(q) || sn.includes(qNorm)){
          hits.push({
            type:         "ticket",
            serial:       a.serial,
            manufacturer: a.manufacturer||"",
            machineType:  a.machineType||"",
            ouInventory:  a.ouInventory||"",
            ticketNo:     t.ticketNo||"(no number)",
            ticketId:     t.id,
            site:         t.site||"",
            requestor:    t.requestor||"",
            source:       (t.assets||[]).find(function(x){ return x.serial.toUpperCase()===su; }) ? "scanned" : "expected",
          });
        }
      });
    });

    // Search vendor audit serials
    shipments.forEach(function(s){
      var vserials = (s.reconcileReport && s.reconcileReport.vendorSerials) || [];
      vserials.forEach(function(vs){
        var su = vs.toUpperCase();
        var sn = /^\d+$/.test(su) ? String(parseInt(su,10)) : su;
        if(su.includes(q) || sn.includes(qNorm)){
          hits.push({
            type:       "shipment",
            serial:     vs,
            shipmentId: s.id,
            shipmentName: s.name,
            vendor:     s.vendor||"",
            fileName:   (s.reconcileReport&&s.reconcileReport.fileName)||s.auditFileName||"",
          });
        }
      });
    });

    setSerialResult({q:raw, hits:hits});
  }

  function run(){
    setRunning(true);
    setTimeout(function(){
      // Build lookup: pickupId -> Set of vendor serials (normalised)
      var auditSerials = {}; // pickupId -> Set<normSerial>
      var auditMeta   = {}; // pickupId -> {name, fileName, poNumber}
      shipments.forEach(function(s){
        var vserials = (s.reconcileReport && s.reconcileReport.vendorSerials) || [];
        if(!vserials.length) return;
        var normSet = new Set();
        vserials.forEach(function(vs){
          normSet.add(vs.toUpperCase());
          if(/^\d+$/.test(vs)) normSet.add(String(parseInt(vs,10)));
        });
        auditSerials[s.id] = normSet;
        auditMeta[s.id] = {
          name:     s.name,
          fileName: (s.reconcileReport && s.reconcileReport.fileName) || s.auditFileName || "",
          poNumber: (s.reconcileReport && s.reconcileReport.poNumber) || s.auditPo || "",
        };
      });

      var reconciledIds = Object.keys(auditSerials);
      if(!reconciledIds.length){
        setResults({error:"No reconciled vendor pickups found. Run reconciliation on at least one pickup first."});
        setRunning(false); return;
      }

      // Build a lookup: normalised serial → [{ticketNo, ticketId, site, manufacturer, machineType, vendorPickupNo, assignedPickupId}]
      var serialToTickets = {};
      function normSerial(s){ var u=s.toUpperCase(); return /^\d+$/.test(u)?String(parseInt(u,10)):u; }

      tickets.forEach(function(t){
        var assignedPickup = shipments.find(function(s){ return s.name === t.vendorPickupNo; });
        var assignedId = assignedPickup ? assignedPickup.id : null;
        // Use the most complete list: merge expectedAssets + assets (unique by serial)
        var seen = new Set();
        var allSerials = [];
        [(t.expectedAssets||[]),(t.assets||[])].forEach(function(list){
          list.forEach(function(a){
            if(!a.serial || seen.has(a.serial.toUpperCase())) return;
            seen.add(a.serial.toUpperCase());
            allSerials.push(a);
          });
        });
        allSerials.forEach(function(a){
          var key = normSerial(a.serial);
          if(!serialToTickets[key]) serialToTickets[key] = [];
          serialToTickets[key].push({
            serial:         a.serial,
            ticketNo:       t.ticketNo,
            ticketId:       t.id,
            site:           t.site||"",
            manufacturer:   a.manufacturer||"",
            machineType:    a.machineType||"",
            vendorPickupNo: t.vendorPickupNo||"",
            assignedId:     assignedId,
          });
        });
      });

      // Now check every serial in every reconciled audit against that lookup
      // Type A: serial is in audit X, but the matching ticket is assigned to a DIFFERENT pickup (or none)
      // Type B: serial is in audit X, no ticket found at all
      var typeA = [];
      var typeB = [];

      reconciledIds.forEach(function(pid){
        var set  = auditSerials[pid];
        var meta = auditMeta[pid];
        set.forEach(function(vs){
          var norm = normSerial(vs);
          var matches = serialToTickets[norm] || serialToTickets[vs] || [];
          if(!matches.length){
            // Type B-style: serial in audit but no ticket has it at all — skip, covered by reconcile tab extras
            return;
          }
          matches.forEach(function(m){
            if(m.assignedId === pid) return; // correct — ticket assigned to this same pickup
            if(m.assignedId && m.assignedId !== pid){
              // Type A: ticket assigned to a DIFFERENT pickup but serial found in this audit
              typeA.push({
                serial:         m.serial,
                ticketNo:       m.ticketNo,
                ticketId:       m.ticketId,
                site:           m.site,
                manufacturer:   m.manufacturer,
                machineType:    m.machineType,
                assignedPickup: m.vendorPickupNo,
                foundInPickup:  meta.name,
                foundInFile:    meta.fileName,
                foundInPo:      meta.poNumber,
              });
            } else if(!m.assignedId){
              // Type B: ticket has no pickup # but serial appears in this audit
              typeB.push({
                serial:        m.serial,
                ticketNo:      m.ticketNo,
                ticketId:      m.ticketId,
                site:          m.site,
                manufacturer:  m.manufacturer,
                machineType:   m.machineType,
                foundInPickup: meta.name,
                foundInFile:   meta.fileName,
                foundInPo:     meta.poNumber,
              });
            }
          });
        });
      });

      // Deduplicate (same serial+ticket+pickup can match multiple norms)
      function dedup(arr){
        var seen = new Set();
        return arr.filter(function(x){
          var key = x.serial+"|"+x.ticketNo+"|"+x.foundInPickup;
          if(seen.has(key)) return false;
          seen.add(key); return true;
        });
      }

      typeA = dedup(typeA).sort(function(a,b){ return a.serial.localeCompare(b.serial); });
      typeB = dedup(typeB).sort(function(a,b){ return a.serial.localeCompare(b.serial); });
      setResults({typeA:typeA, typeB:typeB, scanned:reconciledIds.length, ticketCount:tickets.length});
      setRunning(false);
    }, 50);
  }

  var headerStyle = function(color){ return {textAlign:"left",padding:"7px 12px",color:color,fontWeight:500,fontSize:12}; };
  var cellMono    = {padding:"7px 12px",fontFamily:"'Geist Mono',monospace",fontSize:12};
  var cellSmall   = {padding:"7px 12px",color:"#94a3b8",fontSize:11};

  return (
    <div>
      <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:18,color:"#f1f5f9",marginBottom:4}}>Audit Cross-Reference</div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>Cross-references all ticket serials against every reconciled vendor audit to find mismatches and unexpected appearances.</div>

      {/* ── Serial Search ── */}
      <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"18px 22px",marginBottom:20}}>
        <div style={{fontFamily:"'Geist',sans-serif",fontWeight:600,fontSize:14,color:"#e2e8f0",marginBottom:10}}>🔍 Serial Number Lookup</div>
        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <input value={serialSearch} onChange={function(e){ setSerialSearch(e.target.value); searchSerial(e.target.value); }}
            placeholder="Type a serial number to search all tickets and audits…"
            style={{flex:1,background:"#0f172a",border:"1px solid #334155",borderRadius:8,color:"#f1f5f9",padding:"10px 14px",fontSize:13,fontFamily:"'Geist Mono',monospace",letterSpacing:0.5,outline:"none"}}/>
          {serialSearch && <button onClick={function(){ setSerialSearch(""); setSerialResult(null); }}
            style={{background:"#0f172a",color:"#64748b",border:"1px solid #334155",borderRadius:8,padding:"10px 14px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>✕ Clear</button>}
        </div>

        {serialResult && (
          <div>
            {serialResult.hits.length===0 ? (
              <div style={{fontSize:13,color:"#475569",padding:"12px 0"}}>No matches found for "{serialResult.q}".</div>
            ) : (function(){
              // Group hits by serial
              var grouped = {};
              serialResult.hits.forEach(function(h){
                var key = h.serial.toUpperCase();
                if(!grouped[key]) grouped[key] = {serial:h.serial, tickets:[], shipments:[]};
                if(h.type==="ticket")   grouped[key].tickets.push(h);
                if(h.type==="shipment") grouped[key].shipments.push(h);
              });
              var groups = Object.values(grouped);
              return (
                <div>
                  <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>{groups.length} unique serial{groups.length!==1?"s":""} found for "{serialResult.q}"</div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {groups.map(function(g,i){
                      var t0 = g.tickets[0];
                      return (
                        <div key={i} style={{background:"#0f172a",borderRadius:10,border:"1px solid #334155",padding:"14px 18px"}}>
                          {/* Serial header */}
                          <div style={{fontFamily:"'Geist Mono',monospace",fontSize:14,color:"#f1f5f9",fontWeight:600,marginBottom:10}}>
                            {g.serial}
                          </div>
                          {/* Asset details from ticket if available */}
                          {t0 && (t0.manufacturer||t0.machineType||t0.ouInventory) && (
                            <div style={{fontSize:11,color:"#64748b",display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}>
                              {t0.manufacturer && <span>{t0.manufacturer}</span>}
                              {t0.machineType  && <span>{t0.machineType}</span>}
                              {t0.ouInventory  && <span>🏷 {t0.ouInventory}</span>}
                            </div>
                          )}
                          {/* Tickets section */}
                          {g.tickets.length>0 && (
                            <div style={{marginBottom:g.shipments.length>0?10:0}}>
                              <div style={{fontSize:11,color:"#475569",textTransform:"uppercase",letterSpacing:0.7,marginBottom:6}}>📋 Tickets ({g.tickets.length})</div>
                              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                                {g.tickets.map(function(h,j){
                                  return (
                                    <div key={j} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#1e293b",borderRadius:7,padding:"8px 12px",gap:10,flexWrap:"wrap"}}>
                                      <div style={{fontSize:11,color:"#64748b",display:"flex",gap:12,flexWrap:"wrap"}}>
                                        <span style={{color:h.source==="scanned"?"#86efac":"#94a3b8"}}>{h.source==="scanned"?"✓ Scanned":"Expected"}</span>
                                        {h.site      && <span>📍 {h.site}</span>}
                                        {h.requestor && <span>👤 {h.requestor}</span>}
                                      </div>
                                      <button onClick={function(){ setOpenTicketId(h.ticketId); setTab(0); }}
                                        style={{background:"#1e3a5f",color:"#93c5fd",border:"1px solid #1e40af",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:11,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                                        Ticket #{h.ticketNo} →
                                      </button>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                          {/* Vendor audits section */}
                          {g.shipments.length>0 && (
                            <div>
                              <div style={{fontSize:11,color:"#475569",textTransform:"uppercase",letterSpacing:0.7,marginBottom:6}}>🚛 Vendor Audits ({g.shipments.length})</div>
                              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                                {g.shipments.map(function(h,j){
                                  return (
                                    <div key={j} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#1e293b",borderRadius:7,padding:"8px 12px",gap:10,flexWrap:"wrap"}}>
                                      <div style={{fontSize:11,color:"#64748b",display:"flex",gap:12,flexWrap:"wrap"}}>
                                        {h.vendor   && <span>🏢 {h.vendor}</span>}
                                        {h.fileName && <span>📄 {h.fileName}</span>}
                                      </div>
                                      <button onClick={function(){ setOpenShipmentId(h.shipmentId); setTab(2); }}
                                        style={{background:"#052e16",color:"#86efac",border:"1px solid #166534",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:11,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                                        Pickup {h.shipmentName} →
                                      </button>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
          </div>
        )}
      </div>

      {/* Run button + summary */}
      <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"18px 22px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div style={{fontSize:13,color:"#94a3b8"}}>
          {results && !results.error && (
            <span>
              Checked <strong style={{color:"#f1f5f9"}}>{results.ticketCount}</strong> tickets against <strong style={{color:"#f1f5f9"}}>{results.scanned}</strong> reconciled audit{results.scanned!==1?"s":""}
              {" · "}
              <span style={{color:results.typeA.length>0?"#fca5a5":"#86efac"}}>{results.typeA.length} wrong-pickup conflict{results.typeA.length!==1?"s":""}</span>
              {" · "}
              <span style={{color:results.typeB.length>0?"#fde047":"#86efac"}}>{results.typeB.length} unassigned-but-found</span>
            </span>
          )}
          {!results && <span>No results yet — click Run to start.</span>}
        </div>
        <button onClick={run} disabled={running} style={{background:running?"#1e293b":"linear-gradient(135deg,#1d4ed8,#7c3aed)",color:running?"#475569":"#fff",border:"none",borderRadius:8,padding:"10px 26px",cursor:running?"not-allowed":"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>
          {running ? "Running…" : "▶ Run Cross-Reference"}
        </button>
      </div>

      {results && results.error && (
        <div style={{background:"#450a0a",border:"1px solid #7f1d1d",borderRadius:10,padding:"14px 18px",color:"#fca5a5",fontSize:13}}>{results.error}</div>
      )}

      {results && !results.error && (
        <div>
          {/* Type A — Wrong pickup */}
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:15,color:"#fca5a5"}}>
                ❌ Wrong Pickup ({results.typeA.length})
              </div>
              {results.typeA.length===0 && <span style={{fontSize:12,color:"#86efac"}}>✓ No conflicts found</span>}
            </div>
            {results.typeA.length>0 && (
              <div style={{background:"#200a0a",borderRadius:10,border:"1px solid #7f1d1d",overflow:"hidden"}}>
                <div style={{padding:"10px 14px",fontSize:11,color:"#94a3b8",borderBottom:"1px solid #450a0a"}}>
                  These serials are on tickets assigned to one vendor pickup but appeared in a <em>different</em> pickup's audit. This may mean the item was picked up under the wrong ticket.
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
                    <thead><tr style={{borderBottom:"1px solid #450a0a",background:"#1a0505"}}>
                      <th style={headerStyle("#fca5a5")}>Serial</th>
                      <th style={headerStyle("#fca5a5")}>Ticket #</th>
                      <th style={headerStyle("#fca5a5")}>Site</th>
                      <th style={headerStyle("#fca5a5")}>Manufacturer</th>
                      <th style={headerStyle("#fca5a5")}>Machine Type</th>
                      <th style={headerStyle("#fca5a5")}>Assigned Pickup</th>
                      <th style={headerStyle("#fca5a5")}>Found in Pickup</th>
                      <th style={headerStyle("#fca5a5")}>Audit File</th>
                    </tr></thead>
                    <tbody>
                      {results.typeA.map(function(row,i){
                        return <tr key={i} style={{borderBottom:"1px solid #450a0a"}}>
                          <td style={{...cellMono,color:"#fca5a5"}}>{row.serial}</td>
                          <td style={{...cellSmall,fontWeight:500}}>
                            <button onClick={function(){ var t=tickets.find(function(x){ return x.ticketNo===row.ticketNo; }); if(t){ setOpenTicketId(t.id); setTab(0); } }} style={{background:"none",border:"none",color:"#93c5fd",cursor:"pointer",fontSize:12,fontFamily:"inherit",padding:0,textDecoration:"underline"}}>{row.ticketNo}</button>
                          </td>
                          <td style={cellSmall}>{row.site||"—"}</td>
                          <td style={cellSmall}>{row.manufacturer||"—"}</td>
                          <td style={cellSmall}>{row.machineType||"—"}</td>
                          <td style={{...cellMono,color:"#fde047",fontSize:11}}>{row.assignedPickup}</td>
                          <td style={{...cellMono,color:"#86efac",fontSize:11}}>{row.foundInPickup}</td>
                          <td style={{...cellSmall,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.foundInFile||"—"}</td>
                        </tr>;
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>

          {/* Type B — No pickup assigned but found in an audit */}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:15,color:"#fde047"}}>
                ⚠ Unassigned but Found in Audit ({results.typeB.length})
              </div>
              {results.typeB.length===0 && <span style={{fontSize:12,color:"#86efac"}}>✓ None found</span>}
            </div>
            {results.typeB.length>0 && (
              <div style={{background:"#1a1200",borderRadius:10,border:"1px solid #a16207",overflow:"hidden"}}>
                <div style={{padding:"10px 14px",fontSize:11,color:"#94a3b8",borderBottom:"1px solid #422006"}}>
                  These serials belong to tickets with no vendor pickup number assigned, but they appeared in a vendor audit. The ticket may need to be linked to the correct pickup.
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
                    <thead><tr style={{borderBottom:"1px solid #422006",background:"#130f00"}}>
                      <th style={headerStyle("#fde047")}>Serial</th>
                      <th style={headerStyle("#fde047")}>Ticket #</th>
                      <th style={headerStyle("#fde047")}>Site</th>
                      <th style={headerStyle("#fde047")}>Manufacturer</th>
                      <th style={headerStyle("#fde047")}>Machine Type</th>
                      <th style={headerStyle("#fde047")}>Found in Pickup</th>
                      <th style={headerStyle("#fde047")}>Audit File</th>
                    </tr></thead>
                    <tbody>
                      {results.typeB.map(function(row,i){
                        return <tr key={i} style={{borderBottom:"1px solid #422006"}}>
                          <td style={{...cellMono,color:"#fde047"}}>{row.serial}</td>
                          <td style={{...cellSmall,fontWeight:500}}><button onClick={function(){ var t=tickets.find(function(x){ return x.ticketNo===row.ticketNo; }); if(t){ setOpenTicketId(t.id); setTab(0); } }} style={{background:"none",border:"none",color:"#93c5fd",cursor:"pointer",fontSize:12,fontFamily:"inherit",padding:0,textDecoration:"underline"}}>{row.ticketNo}</button></td>
                          <td style={cellSmall}>{row.site||"—"}</td>
                          <td style={cellSmall}>{row.manufacturer||"—"}</td>
                          <td style={cellSmall}>{row.machineType||"—"}</td>
                          <td style={{...cellMono,color:"#93c5fd",fontSize:11}}>{row.foundInPickup}</td>
                          <td style={{...cellSmall,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.foundInFile||"—"}</td>
                        </tr>;
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
<script type="text/javascript">
window.addEventListener("DOMContentLoaded", function() {
  var banner = document.getElementById("error-banner");
  function showErr(msg) {
    banner.style.display = "block";
    banner.textContent = msg;
  }
  try {
    if(typeof Babel === "undefined") { showErr("Babel failed to load from CDN."); return; }
    if(typeof React === "undefined") { showErr("React failed to load from CDN."); return; }
    if(typeof XLSX === "undefined") { showErr("XLSX failed to load from CDN."); return; }
    var src = document.getElementById("jsx-source").textContent;
    var result = Babel.transform(src, { presets: ["env", "react"] });
    var fn = new Function(result.code);
    fn();
  } catch(e) {
    showErr("Error: " + e.message + "\n\n" + (e.stack || ""));
  }
});
</script>
</body>
</html>
