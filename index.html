const { useState, useRef, useEffect, useMemo } = React;

// ── Column name constants ─────────────────────────────────────────
// findCol does: exact → case-insensitive → "starts with" → "contains"
// so these only need to match the beginning of the actual header text.
const SERIAL_COL       = "Service Tag/Serial Number";
const MANUFACTURER_COL = "Manufacturer";
const MACHINE_TYPE_COL = "Machine Type";
const OU_INVENTORY_COL = "OU Inventory #";

// ── Status color map ──────────────────────────────────────────────
const SC = {
  matched:      { bg:"#d1fae5", text:"#065f46", border:"#6ee7b7", label:"Matched" },
  missing:      { bg:"#fee2e2", text:"#7f1d1d", border:"#fca5a5", label:"Missing" },
  extra:        { bg:"#fef9c3", text:"#713f12", border:"#fde047", label:"Extra"   },
  partial:      { bg:"#ede9fe", text:"#4c1d95", border:"#a78bfa", label:"Partial Match" },
  assetTagMatch:{ bg:"#ede9fe", text:"#4c1d95", border:"#a78bfa", label:"Asset Tag Match" },
};

// Approval sheet generator — produces an XLSX workbook for items needing requestor sign-off
function generateApprovalSheet(ticket, resolved){
  const rows = [];
  const addRow = function(category, serial, note){
    rows.push([category, serial, note||"", "[ ] Approved  [ ] Denied", ""]);
  };
  (resolved.missing||[]).forEach(function(m){
    addRow("Not Picked Up", m.serial, (m.manufacturer||"")+" "+(m.machineType||""));
  });
  (resolved.extra||[]).forEach(function(e){
    addRow("Not on List (Extra)", e.serial, "Picked up but not in submitted list");
  });
  (resolved.partial||[]).forEach(function(p){
    addRow("Partial Match", p.expectedSerial, "Expected: "+p.expectedSerial+" / Scanned: "+p.scannedSerial);
  });

  const header = ["Category","Serial Number","Details","Decision","Notes"];
  const wb = XLSX.utils.book_new();
  const wsData = [
    ["IT Asset Disposal — Approval Required"],
    ["Ticket:", ticket.ticketNo, "", "Date:", new Date().toLocaleDateString()],
    ["Site:", ticket.site||"", "", "Requestor:", ticket.requestor||""],
    [],
    header,
    ...rows,
    [],
    ["Please review each item above, mark Approved or Denied, and reply to this email."],
  ];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws["!cols"] = [{wch:22},{wch:22},{wch:36},{wch:26},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws, "Approval Required");
  XLSX.writeFile(wb, "ApprovalRequest-"+ticket.ticketNo+".xlsx");
  return rows.length;
}

const TABS = ["Tickets","Pickup Scan","Vendor Pickup","Reconcile","Report","Audit X-Ref"];

// ── Helpers ───────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// Values treated as "no tag" for matching purposes
var BLANK_TAG_PATTERNS = /^(unknown|n\/?a|none|n\.a\.|nil|no asset tag|no tag|—|-)$/i;
function isBlankTag(v){ return !v || !v.trim() || BLANK_TAG_PATTERNS.test(v.trim()); }
function fmtDate(iso){ return iso ? new Date(iso).toLocaleDateString() : "—"; }

function findCol(sampleRow, name){
  const keys = Object.keys(sampleRow);
  const low = name.toLowerCase();
  // 1. Exact match
  const exact = keys.find(function(k){ return k === name; });
  if(exact) return exact;
  // 2. Case-insensitive exact
  const ci = keys.find(function(k){ return k.toLowerCase() === low; });
  if(ci) return ci;
  // 3. Key starts with search term (handles extra parenthetical/newline text after the header)
  const sw = keys.find(function(k){ return k.toLowerCase().startsWith(low); });
  if(sw) return sw;
  // 4. Key contains search term
  const has = keys.find(function(k){ return k.toLowerCase().includes(low); });
  if(has) return has;
  return null;
}

// Levenshtein distance
function levenshtein(a, b){
  const m=a.length, n=b.length;
  const dp=[]; for(let ii=0;ii<=m;ii++){ dp[ii]=[]; for(let jj=0;jj<=n;jj++) dp[ii][jj]=ii===0?jj:jj===0?ii:0; }
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function findPartialMatch(scanned, expectedList){
  const maxDist = Math.max(1, Math.floor(scanned.length * 0.15));
  let best = null;
  for(const exp of expectedList){
    const d = levenshtein(scanned, exp);
    if(d > 0 && d <= maxDist && (!best || d < best.distance)) best = {serial:exp, distance:d};
  }
  return best;
}

// Scan all raw rows for item count labels.
// Handles both single-pair rows (label | value) and
// double-pair rows (label | value | label | value).
function extractItemCounts(rawRows){
  const counts = {lcdMonitors:0, miscBoxes:0, hardDriveBoxes:0, printers:0};
  for(let ri=0; ri<rawRows.length; ri++){
    const row = rawRows[ri];
    // Check every cell; the value is the next non-empty cell to the right
    for(let ci=0; ci<row.length; ci++){
      const cell = String(row[ci]||"").toLowerCase().trim();
      if(!cell) continue;
      // Find the next non-empty cell to the right as the value
      let val = 0;
      for(let vi=ci+1; vi<row.length && vi<=ci+2; vi++){
        const raw = String(row[vi]||"").trim();
        if(raw !== ""){
          const n = parseInt(raw, 10);
          if(!isNaN(n)) val = n;
          break;
        }
      }
      if(cell.includes("lcd")||cell.includes("flat panel")||(cell.includes("display")&&!cell.includes("only")))
        counts.lcdMonitors = val;
      else if(cell.includes("misc"))
        counts.miscBoxes = val;
      else if(cell.includes("hard drive")||cell.includes("other media"))
        counts.hardDriveBoxes = val;
      else if(cell.includes("printer"))
        counts.printers = val;
    }
  }
  return counts;
}

// Read serials + metadata from a File object.
// Auto-detects the header row (scans for "serial" keyword), normalizes
// multi-line headers to their first line, then extracts data.
async function readXlsxFile(file){
  return new Promise(function(resolve, reject){
    const reader = new FileReader();
    reader.onload = function(evt){
      try {
        const wb = XLSX.read(evt.target.result, {type:"binary"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rawRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});

        // Find the header row by scanning up to row 25.
        // Prefer rows containing "service tag". Fall back to the last row containing
        // "serial" that does NOT look like instructional text (must/only/complete/for/bearing).
        const INSTRUCTIONAL_WORDS = ["must","only","complete","bearing","please","note","enter","include","data"];
        function isInstructional(cell){
          var lc = cell.toLowerCase();
          return INSTRUCTIONAL_WORDS.some(function(w){ return lc.includes(w); });
        }
        let headerRowIdx = 0;
        let serviceTagRow = -1;
        let lastSerialRow = -1;
        for(let i=0; i<Math.min(rawRows.length,25); i++){
          const row = rawRows[i];
          for(let j=0; j<row.length; j++){
            const cell = String(row[j]||"").split("\n")[0].trim();
            const lc = cell.toLowerCase();
            if(lc.startsWith("service tag")){ serviceTagRow = i; break; }
            if(lc.startsWith("serial") && !isInstructional(cell)){ lastSerialRow = i; }
          }
        }
        if(serviceTagRow !== -1) headerRowIdx = serviceTagRow;
        else if(lastSerialRow !== -1) headerRowIdx = lastSerialRow;

        // Build normalized headers: take first line of each cell, trim whitespace
        const rawHeaders = rawRows[headerRowIdx]||[];
        const headers = rawHeaders.map(function(h){
          return String(h||"").split("\n")[0].trim();
        });

        // Build object rows from data rows (headerRowIdx+1 onwards)
        const objRows = rawRows.slice(headerRowIdx+1).map(function(row){
          const obj = {};
          headers.forEach(function(h,i){ obj[h] = row[i]; });
          return obj;
        }).filter(function(r){ return Object.values(r).some(function(v){ return v!==""; }); });

        const sampleRow = objRows[0] || {};
        // Try multiple common serial column header names in order of preference
        const SERIAL_VARIANTS = [SERIAL_COL, "Serial Number", "Serial #", "Serial", "Service Tag", "Asset Serial"];
        let col = null;
        for(let vi=0; vi<SERIAL_VARIANTS.length; vi++){
          col = findCol(sampleRow, SERIAL_VARIANTS[vi]);
          if(col) break;
        }
        const mfrCol = findCol(sampleRow, MANUFACTURER_COL);
        const typCol = findCol(sampleRow, MACHINE_TYPE_COL);
        const ouCol  = findCol(sampleRow, OU_INVENTORY_COL);
        const itemCounts = extractItemCounts(rawRows);

        if(!col) return resolve({serials:[], itemCounts, warning:`Serial column not found. Headers detected: ${headers.filter(function(h){ return h; }).join(", ")||"(none)"}`});

        const now = new Date().toLocaleString();
        const seen = new Set();
        const serials = [];
        for(let ri=0; ri<objRows.length; ri++){
          const r = objRows[ri];
          // Stop when any cell in the row contains the end-of-data sentinel
          const rowVals = Object.values(r).map(function(v){ return String(v||"").toLowerCase().trim(); });
          if(rowVals.some(function(v){ return v.includes("add more lines if needed"); })) break;
          const serial = String(r[col]||"").trim().toUpperCase();
          if(!serial) continue; // skip blank serials but keep going
          const isDuplicate = seen.has(serial);
          seen.add(serial);
          serials.push({
            serial,
            manufacturer: mfrCol ? String(r[mfrCol]||"").trim() : "",
            machineType:  typCol ? String(r[typCol]||"").trim() : "",
            ouInventory:  ouCol  ? String(r[ouCol]||"").trim()  : "",
            addedAt:      now,
            duplicate:    isDuplicate, // flag for display — does not prevent import
          });
        }

        const colsFound = {
          serial:       col    || null,
          manufacturer: mfrCol || null,
          machineType:  typCol || null,
          ouInventory:  ouCol  || null,
        };
        resolve({serials, itemCounts, warning:null, rawHeaders:headers.filter(function(h){ return h; }), colsFound});
      } catch(e){ reject(e); }
    };
    reader.onerror = reject;
    reader.readAsBinaryString(file);
  });
}

// Pickup status helper
function pickupStatus(ticket){
  if(!ticket.pickupScanned) return "pending";
  if(ticket.approvalStatus === "validated") return "verified";
  if(ticket.approvalStatus === "awaiting-approval") return "awaiting-approval";
  const r = ticket.pickupResult;
  if(!r) return "pending";
  const hasApprovalItems = (r.missing&&r.missing.length>0) || (r.extra&&r.extra.length>0) || (r.partial&&r.partial.length>0);
  return hasApprovalItems ? "awaiting-approval" : "verified";
}

const FSA_SUPPORTED = (typeof window !== "undefined") && typeof window.showOpenFilePicker === "function";

async function fsaPickOpenFile(){
  const [fh] = await window.showOpenFilePicker({

}

async function fsaWrite(fileHandle, tickets, shipments, locations, requestors){
  if(!fileHandle) return false;
  try {
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify({version:5, exportedAt:new Date().toLocaleString(), tickets, shipments, locations:locations||[], requestors:requestors||[]}, null, 2));
    await writable.close();
    return true;
  } catch(e){ console.error("Auto-save failed:", e); return false; }
}

// Bulk folder import — reads all .xlsx files in subfolders
async function runFolderImport(setTickets, setVendorReport, onResult){
  try {
    const dirHandle = await window.showDirectoryPicker({mode:"read"});
    const preview = [];

    // Collect subfolder entries
    const subfolders = [];
    const topIter = dirHandle.entries();
    let topNext = await topIter.next();
    while(!topNext.done){
      const [subName, subHandle] = topNext.value;
      if(subHandle.kind === "directory") subfolders.push({subName, subHandle});
      topNext = await topIter.next();
    }

    // For each subfolder, collect xlsx files
    for(let si=0; si<subfolders.length; si++){
      const {subName, subHandle} = subfolders[si];
      const fileIter = subHandle.entries();
      let fileNext = await fileIter.next();
      while(!fileNext.done){
        const [fileName, fileHandle] = fileNext.value;
        if(fileHandle.kind === "file" && /\.(xlsx|xls)$/i.test(fileName)){
          const ticketNo = fileName.replace(/\.(xlsx|xls)$/i,"").trim();
          const file = await fileHandle.getFile();
          const result = await readXlsxFile(file);
          preview.push({ticketNo, fileName, subFolder:subName, ...result});
        }
        fileNext = await fileIter.next();
      }
    }

    if(preview.length === 0){
      onResult({state:"error", msg:"No .xlsx/.xls files found in any subfolders."});
      return;
    }

    setTickets(function(prev){
      let updated = [...prev];
      for(const p of preview){
        if(!p.serials.length) continue;
        const newTicket = {
          id:uid(), ticketNo:p.ticketNo,
          date:new Date().toISOString().slice(0,10),
          site:"", requestor:"", notes:"",
          expectedAssets:p.serials,
          itemCounts:p.itemCounts||{lcdMonitors:0,miscBoxes:0,hardDriveBoxes:0,printers:0},
          pickupScanned:false, pickupResult:null,
          _importedFrom:p.fileName
        };
        const idx = updated.findIndex(function(t){ return t.ticketNo === p.ticketNo; });
        if(idx !== -1) updated[idx] = newTicket;
        else updated = [newTicket, ...updated];
      }
      return updated;
    });
    setVendorReport(null);

    const ok    = preview.filter(function(p){ return p.serials.length > 0 && !p.warning; });
    const warns = preview.filter(function(p){ return p.warning || p.serials.length === 0; });
    onResult({state:"done", ok, warns, total:preview.length});
  } catch(e){
    if(e.name === "AbortError") return;
    onResult({state:"error", msg:e.message});
  }
}

// Export a structured JSON payload for the TDX PowerShell sync script
function exportForTdx(tickets){
  const verified = tickets.filter(function(t){
    return t.pickupScanned && t.pickupResult && t.assets && t.assets.length > 0;
  });
  const payload = {
    exportedAt: new Date().toISOString(),
    exportedBy: "AssetTrack",
    ticketCount: verified.length,
    tickets: verified.map(function(t){
      return {
        assetTrackId:   t.id,
        ticketNo:       t.ticketNo,
        date:           t.date,
        site:           t.site,
        requestor:      t.requestor,
        phone:          t.phone||'',
        notes:          t.notes,
        itemCounts:     t.itemCounts || {},
        assets: (t.assets||[]).map(function(a){
          return {
            serial:       a.serial,
            manufacturer: a.manufacturer||"",
            machineType:  a.machineType||"",
            ouInventory:  a.ouInventory||"",
            source:       a.source||"",
          };
        }),
        pickupSummary: t.pickupResult ? {
          matched:  (t.pickupResult.matched||[]).length,
          missing:  (t.pickupResult.missing||[]).length,
          extra:    (t.pickupResult.extra||[]).length,
          partial:  (t.pickupResult.partial||[]).length,
          waived:   (t.pickupResult.waived||[]).length,
          scannedAt: t.pickupResult.scannedAt||"",
        } : null,
      };
    }),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url;
  a.download = "AssetTrack-TDX-Export-"+new Date().toISOString().slice(0,10)+".json";
  a.click(); URL.revokeObjectURL(url);
  return verified.length;
}

}

function StepCard({n, title, children}){

    <div style={{background:"#1e293b", borderRadius:12, border:"1px solid #334155", padding:"20px 24px", marginBottom:16}}>
      <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:14}}>
        <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#1d4ed8,#0284c7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff",flexShrink:0}}>{n}</div>
        <div style={{fontFamily:"'Geist',sans-serif", fontWeight:700, fontSize:14, color:"#f1f5f9"}}>{title}</div>
      </div>
      {children}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════
function App(){
  const [tab, setTab]               = useState(0);
  const [openTicketId, setOpenTicketId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [locations,  setLocations]  = useState([]);
  const [requestors, setRequestors] = useState([]);
  const [tickets, setTickets]       = useState([]);
  const [shipments, setShipments]   = useState([]);
  const [vendorReport, setVendorReport] = useState(null);
  const [importMsg, setImportMsg]   = useState(null);
  const [fileHandle, setFileHandle] = useState(null);
  const [saveStatus, setSaveStatus] = useState("idle");
  const [user, setUser]             = useState(null);   // Firebase auth user
  const userRef                     = React.useRef(null); // always-current user for closures
  const [fbLoading, setFbLoading]   = useState(true);   // initial Firestore load
  const jsonRef      = useRef();
  const saveTimer    = useRef(null);

  // ── Firebase Auth ─────────────────────────────────────────────
  useEffect(function(){
    var unsub = auth.onAuthStateChanged(function(u){ setUser(u); userRef.current = u; });
    return unsub;
  }, []);

  function signIn(){  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  function signOut(){ auth.signOut(); }

  // ── Firestore: load all collections on mount ─────────────────
  useEffect(function(){
    setFbLoading(true);
    var unsubs = [];
    unsubs.push(db.collection("tickets").orderBy("ticketNo").onSnapshot(function(snap){
      setTickets(snap.docs.map(function(d){ return {...d.data(), id:d.id}; }));
      setFbLoading(false);
    }));
    unsubs.push(db.collection("shipments").onSnapshot(function(snap){
      setShipments(snap.docs.map(function(d){ return {...d.data(), id:d.id}; }));
    }));
    unsubs.push(db.collection("locations").onSnapshot(function(snap){
      setLocations(snap.docs.map(function(d){ return {...d.data(), id:d.id}; }));
    }));
    unsubs.push(db.collection("requestors").onSnapshot(function(snap){
      setRequestors(snap.docs.map(function(d){ return {...d.data(), id:d.id}; }));
    }));
    return function(){ unsubs.forEach(function(u){ u(); }); };
  }, []);

  // ── Firestore write helpers ───────────────────────────────────
  function fbSet(collection, id, data){
    if(!userRef.current) { console.warn("fbSet skipped — not signed in"); return; }
    var clean = JSON.parse(JSON.stringify(data));
    db.collection(collection).doc(id).set(clean).catch(function(e){ console.error("Firestore write error:", e); });
  }
  function fbDelete(collection, id){
    if(!userRef.current) return;
    db.collection(collection).doc(id).delete().catch(function(e){ console.error("Firestore delete error:", e); });
  }

  // Wrap setTickets/setShipments/setLocations/setRequestors to also write Firestore
  function saveTickets(updaterOrArray){
    setTickets(function(prev){
      var next = typeof updaterOrArray === "function" ? updaterOrArray(prev) : updaterOrArray;
      if(!userRef.current) return next;
      // Diff and write changed/added items
      next.forEach(function(t){
        var old = prev.find(function(x){ return x.id===t.id; });
        if(!old || JSON.stringify(old) !== JSON.stringify(t)) fbSet("tickets", t.id, t);
      });
      prev.forEach(function(t){
        if(!next.find(function(x){ return x.id===t.id; })) fbDelete("tickets", t.id);
      });
      return next;
    });
  }
  function saveShipments(updaterOrArray){
    setShipments(function(prev){
      var next = typeof updaterOrArray === "function" ? updaterOrArray(prev) : updaterOrArray;
      if(!userRef.current) return next;
      next.forEach(function(s){
        var old = prev.find(function(x){ return x.id===s.id; });
        if(!old || JSON.stringify(old) !== JSON.stringify(s)) fbSet("shipments", s.id, s);
      });
      prev.forEach(function(s){
        if(!next.find(function(x){ return x.id===s.id; })) fbDelete("shipments", s.id);
      });
      return next;
    });
  }
  function saveLocations(updaterOrArray){
    setLocations(function(prev){
      var next = typeof updaterOrArray === "function" ? updaterOrArray(prev) : updaterOrArray;
      if(!userRef.current) return next;
      next.forEach(function(l){
        var old = prev.find(function(x){ return x.id===l.id; });
        if(!old || JSON.stringify(old) !== JSON.stringify(l)) fbSet("locations", l.id, l);
      });
      prev.forEach(function(l){
        if(!next.find(function(x){ return x.id===l.id; })) fbDelete("locations", l.id);
      });
      return next;
    });
  }
  function saveRequestors(updaterOrArray){
    setRequestors(function(prev){
      var next = typeof updaterOrArray === "function" ? updaterOrArray(prev) : updaterOrArray;
      if(!userRef.current) return next;
      next.forEach(function(r){
        var old = prev.find(function(x){ return x.id===r.id; });
        if(!old || JSON.stringify(old) !== JSON.stringify(r)) fbSet("requestors", r.id, r);
      });
      prev.forEach(function(r){
        if(!next.find(function(x){ return x.id===r.id; })) fbDelete("requestors", r.id);
      });
      return next;
    });
  }

  // Auto-save session file (still supported for offline backup)
  useEffect(function(){
    if(!fileHandle) return;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current = setTimeout(async function(){
      const ok = await fsaWrite(fileHandle, tickets, shipments, locations, requestors);
      setSaveStatus(ok ? "saved" : "error");
      if(ok) setTimeout(function(){ setSaveStatus("idle"); }, 2500);
    }, 600);
    return function(){ clearTimeout(saveTimer.current); };
  }, [tickets, shipments, fileHandle]);

  async function handleFSAOpen(){
    try {
      const result = await fsaPickOpenFile();
      setFileHandle(result.fileHandle);
      setTickets(result.tickets);
      setShipments(result.shipments);
      setVendorReport(null);
      setSaveStatus("idle");
      setImportMsg({ok:true, text:`Opened "${result.fileHandle.name}" — ${result.tickets.length} ticket(s). Changes will auto-save.`});
      setTimeout(function(){ setImportMsg(null); }, 7000);
    } catch(e){
      if(e.name === "AbortError") return;
      setImportMsg({ok:false, text:"Could not open file: "+e.message});
      setTimeout(function(){ setImportMsg(null); }, 5000);
    }
  }

  async function handleFSANew(){
    if(tickets.length > 0 && !confirm("Start a new session? Unsaved in-memory data will be lost.")) return;
    try {
      const fh = await fsaPickSaveFile();
      if(!fh) return;
      setFileHandle(fh);
      setTickets([]); setShipments([]); setVendorReport(null); setSaveStatus("idle");
      setImportMsg({ok:true, text:`New session file created. All changes will auto-save to "${fh.name}".`});
      setTimeout(function(){ setImportMsg(null); }, 7000);
    } catch(e){
      if(e.name === "AbortError") return;
    }
  }

  function handleLegacyLoad(e){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(evt){
      try {
        const s = JSON.parse(evt.target.result);
        if(!s.tickets) throw new Error();
        saveTickets(s.tickets||[]); saveShipments(s.shipments||[]); saveLocations(s.locations||[]); saveRequestors(s.requestors||[]); setVendorReport(null);
        setImportMsg({ok:true, text:"Loaded "+s.tickets.length+" ticket(s) from \""+file.name+"\" — writing to Firestore…"});
      } catch(err){
        setImportMsg({ok:false, text:"Invalid session file."});
      }
      setTimeout(function(){ setImportMsg(null); }, 6000);
    };
    reader.readAsText(file); e.target.value="";
  }

  const needsReviewCount = useMemo(function(){ return tickets.filter(function(t){ return pickupStatus(t)==="awaiting-approval"; }).length; }, [tickets]);
  const pendingCount     = useMemo(function(){ return tickets.filter(function(t){ return pickupStatus(t)==="pending"&&(t.expectedAssets||[]).length>0; }).length; }, [tickets]);

  return (
    <div style={{minHeight:"100vh", background:"#0f172a", paddingBottom:60}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a,#1e293b)", borderBottom:"1px solid #1e3a5f", padding:"24px 36px 0"}}>
        <div style={{maxWidth:1020, margin:"0 auto"}}>
          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12, marginBottom:6}}>
            <div style={{display:"flex", alignItems:"center", gap:14}}>
              <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>♻️</div>
              <div>
                <div style={{fontFamily:"'Geist',sans-serif", fontWeight:800, fontSize:22, color:"#f1f5f9", letterSpacing:-0.5}}>AssetTrack</div>
                <div style={{fontSize:11, color:"#64748b", letterSpacing:1.2, textTransform:"uppercase"}}>Computer Disposal Reconciliation</div>
              </div>
            </div>
            {/* Session controls */}
            <div style={{display:"flex", gap:8, alignItems:"center", flexWrap:"wrap"}}>
              {/* Firebase auth */}
              {user ? (
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#86efac"}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:"#86efac",display:"inline-block"}}/>
                    {user.displayName||user.email}
                  </div>
                  <button onClick={signOut} style={{background:"none",color:"#64748b",border:"1px solid #334155",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Sign out</button>
                </div>
              ) : (
                <button onClick={signIn} style={{background:"linear-gradient(135deg,#1d4ed8,#0284c7)",color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500}}>
                  🔑 Sign in to edit
                </button>
              )}
              {fbLoading && <span style={{fontSize:11,color:"#475569"}}>Loading…</span>}
              {!fbLoading && !user && <span style={{fontSize:11,color:"#64748b"}}>👁 Read-only</span>}
              <input ref={jsonRef} type="file" accept=".json" style={{display:"none"}} onChange={handleLegacyLoad}/>
              {FSA_SUPPORTED ? (
                <React.Fragment>
                  {fileHandle && (
                    <div style={{fontSize:11, color:saveStatus==="saving"?"#94a3b8":saveStatus==="saved"?"#86efac":saveStatus==="error"?"#fca5a5":"#475569", display:"flex", alignItems:"center", gap:5, minWidth:140}}>
                      {saveStatus==="saving" && <React.Fragment><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#94a3b8",animation:"pulse 1s infinite"}}></span>Saving…</React.Fragment>}
                      {saveStatus==="saved"  && <React.Fragment><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#86efac"}}></span>Saved ✓</React.Fragment>}
                      {saveStatus==="error"  && <React.Fragment><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#fca5a5"}}></span>Save failed</React.Fragment>}
                      {saveStatus==="idle"   && <React.Fragment><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#475569"}}></span>{fileHandle.name.length>24?fileHandle.name.slice(0,22)+"…":fileHandle.name}</React.Fragment>}
                    </div>
                  )}
                  {!fileHandle && <button onClick={handleFSANew} style={{background:"linear-gradient(135deg,#065f46,#0284c7)",color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>＋ New Session File</button>}
                  <button onClick={handleFSAOpen} style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{fileHandle?"🔀 Switch File":"📂 Open Session File"}</button>
                  {fileHandle && <button onClick={handleFSANew} style={{background:"#1e293b",color:"#64748b",border:"1px solid #1e293b",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}} title="New Session">＋ New</button>}
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <div style={{fontSize:10,color:"#475569",maxWidth:160,lineHeight:1.4}}>⚠ Auto-save requires Chrome/Edge. Using manual save.</div>
                  <button onClick={function(){ jsonRef.current && jsonRef.current.click(); }} style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>⬆ Load Session</button>
                  <button onClick={function(){ downloadSessionJson(tickets,shipments); }} disabled={!tickets.length} style={{background:tickets.length?"linear-gradient(135deg,#1d4ed8,#0284c7)":"#1e293b",color:tickets.length?"#fff":"#475569",border:"none",borderRadius:7,padding:"7px 16px",cursor:tickets.length?"pointer":"not-allowed",fontSize:12,fontFamily:"inherit"}}>⬇ Save Session</button>
                </React.Fragment>
              )}
            </div>
            <button onClick={function(){ setShowSettings(true); }}
              style={{background:"#1e293b",color:"#64748b",border:"1px solid #334155",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:16,lineHeight:1}} title="Settings">⚙</button>
          </div>
          {importMsg && (
            <div style={{margin:"8px 0",padding:"8px 14px",borderRadius:6,fontSize:12,background:importMsg.ok?"#052e16":"#450a0a",color:importMsg.ok?"#86efac":"#fca5a5",border:`1px solid ${importMsg.ok?"#166534":"#7f1d1d"}`}}>
              {importMsg.ok?"✓ ":"✗ "}{importMsg.text}
            </div>
          )}
          {/* Tabs */}
          <div style={{display:"flex", gap:2, marginTop:16}}>
            {TABS.map(function(t,i){
              return (
                <button key={t} className="tab-btn" onClick={function(){ setTab(i); }} style={{
                  background:tab===i?"#1d4ed8":"transparent", color:tab===i?"#fff":"#64748b",
                  border:"none", borderBottom:tab===i?"2px solid #3b82f6":"2px solid transparent",
                  padding:"9px 18px", fontSize:12, fontFamily:"inherit", fontWeight:tab===i?500:400,
                  letterSpacing:0.3, borderRadius:"6px 6px 0 0", position:"relative"
                }}>
                  {["① ","② ","③ ","④ ","⑤ ","⑥ "][i]}{t}
                  {i===0 && tickets.length>0 && <span style={{marginLeft:6,background:"#1e40af",color:"#93c5fd",borderRadius:999,padding:"1px 6px",fontSize:10}}>{tickets.length}</span>}
                  {i===1 && pendingCount>0 && <span style={{marginLeft:6,background:"#1e3a5f",color:"#93c5fd",borderRadius:999,padding:"1px 6px",fontSize:10}}>{pendingCount}</span>}
                  {i===2 && shipments.length>0 && <span style={{marginLeft:6,background:"#1e40af",color:"#93c5fd",borderRadius:999,padding:"1px 6px",fontSize:10}}>{shipments.length}</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1020, margin:"32px auto 0", padding:"0 24px"}}>
        {showSettings && <SettingsPage locations={locations} setLocations={saveLocations} requestors={requestors} setRequestors={saveRequestors} onClose={function(){ setShowSettings(false); }} readOnly={!user}/>}
        {!showSettings && tab===0 && <TicketsTab tickets={tickets} setTickets={saveTickets} setVendorReport={setVendorReport} setTab={setTab} openTicketId={openTicketId} setOpenTicketId={setOpenTicketId} locations={locations} requestors={requestors} readOnly={!user}/>}
        {!showSettings && tab===1 && <PickupScanTab tickets={tickets} setTickets={saveTickets} locations={locations}/>}
        {!showSettings && tab===2 && <ShipmentsTab tickets={tickets} setTickets={saveTickets} shipments={shipments} setShipments={saveShipments} setVendorReport={setVendorReport}/>}
        {!showSettings && tab===3 && <ReconcileTab tickets={tickets} shipments={shipments} setShipments={saveShipments} vendorReport={vendorReport} setVendorReport={setVendorReport} setTab={setTab}/>}
        {!showSettings && tab===4 && <ReportTab report={vendorReport} tickets={tickets} shipments={shipments} setTab={setTab}/>}
        {!showSettings && tab===5 && <AuditXRefTab tickets={tickets} shipments={shipments} setTab={setTab} setOpenTicketId={setOpenTicketId}/>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// SETTINGS PAGE
// ══════════════════════════════════════════════════════════════════
function SettingsPage({locations, setLocations, requestors, setRequestors, onClose}){
  const [section, setSection] = useState("locations");

  // ── Locations ────────────────────────────────────────────────────
  const [locForm, setLocForm] = useState({name:"", address:"", campus:""});
  const [locEdit, setLocEdit] = useState(null); // id being edited

  function saveLoc(){
    if(!locForm.name.trim()){ alert("Location name is required."); return; }
    if(locEdit){
      setLocations(function(prev){ return prev.map(function(l){ return l.id===locEdit ? {...l,...locForm} : l; }); });
      setLocEdit(null);
    } else {
      setLocations(function(prev){ return [...prev, {id:uid(), ...locForm}]; });
    }
    setLocForm({name:"",address:""});
  }
  function editLoc(l){ setLocEdit(l.id); setLocForm({name:l.name, address:l.address||"", campus:l.campus||""}); }
  function delLoc(id){ if(!confirm("Delete this location?")) return; setLocations(function(prev){ return prev.filter(function(l){ return l.id!==id; }); }); if(locEdit===id){ setLocEdit(null); setLocForm({name:"",address:"",campus:""}); } }

  // ── Requestors ───────────────────────────────────────────────────
  const [reqForm, setReqForm] = useState({name:"", email:"", phone:"", department:""});
  const [reqEdit, setReqEdit] = useState(null);

  function saveReq(){
    if(!reqForm.name.trim()){ alert("Requestor name is required."); return; }
    if(reqEdit){
      setRequestors(function(prev){ return prev.map(function(r){ return r.id===reqEdit ? {...r,...reqForm} : r; }); });
      setReqEdit(null);
    } else {
      setRequestors(function(prev){ return [...prev, {id:uid(), ...reqForm}]; });
    }
    setReqForm({name:"",email:"",phone:""});
  }
  function editReq(r){ setReqEdit(r.id); setReqForm({name:r.name, email:r.email||"", phone:r.phone||"", department:r.department||""}); }
  function delReq(id){ if(!confirm("Delete this requestor?")) return; setRequestors(function(prev){ return prev.filter(function(r){ return r.id!==id; }); }); if(reqEdit===id){ setReqEdit(null); setReqForm({name:"",email:"",phone:"",department:""}); } }

  var inputStyle = {width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit"};
  var labelStyle = {display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6};

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <div>
          <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:18,color:"#f1f5f9"}}>⚙ Settings</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Manage locations, addresses, and requestor contact info.</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={function(){
            var nl = "\n";
            var locLines = (locations||[]).map(function(l){
              return "  { name: "+JSON.stringify(l.name)+", address: "+JSON.stringify(l.address||"")+", campus: "+JSON.stringify(l.campus||"")+" }";
            }).join(","+nl);
            var locJs = "var LOCATIONS = ["+nl+locLines+nl+"];";
            var reqLines = (requestors||[]).map(function(r){
              return "  { name: "+JSON.stringify(r.name)+", email: "+JSON.stringify(r.email||"")+", phone: "+JSON.stringify(r.phone||"")+", department: "+JSON.stringify(r.department||"")+" }";
            }).join(","+nl);
            var reqJs = "var REQUESTORS = ["+nl+reqLines+nl+"];";
            var full = locJs+nl+nl+reqJs;
            navigator.clipboard.writeText(full).then(function(){
              alert("Config copied!\n\nPaste into the config block at the top of DisposalRequest index.html, replacing the LOCATIONS and REQUESTORS arrays.");
            }).catch(function(){
              prompt("Copy this and paste into DisposalRequest index.html:", full);
            });
          }} style={{background:"linear-gradient(135deg,#4f46e5,#7c3aed)",color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>📋 Copy Form Config</button>
          <button onClick={onClose} style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>← Back to App</button>
        </div>
      </div>

      {/* Section tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:"1px solid #1e293b",paddingBottom:0}}>
        {[["locations","📍 Locations"],["requestors","✉ Requestors"]].map(function(pair){
          var active = section===pair[0];
          return (
            <button key={pair[0]} onClick={function(){ setSection(pair[0]); }}
              style={{background:"none",border:"none",borderBottom:active?"2px solid #3b82f6":"2px solid transparent",color:active?"#f1f5f9":"#64748b",padding:"8px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:active?500:400,marginBottom:-1}}>
              {pair[1]}
            </button>
          );
        })}
      </div>

      {/* ── Locations section ── */}
      {section==="locations" && (
        <div>
          {/* Add / edit form */}
          <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"20px 24px",marginBottom:20}}>
            <div style={{fontFamily:"'Geist',sans-serif",fontWeight:600,fontSize:14,color:"#e2e8f0",marginBottom:14}}>{locEdit?"Edit Location":"Add Location"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr",gap:14,marginBottom:14}}>
              <div>
                <label style={labelStyle}>Location Name *</label>
                <input value={locForm.name} onChange={function(e){ setLocForm(function(f){ return {...f,name:e.target.value}; }); }}
                  placeholder="e.g. Main Campus Bldg A" style={inputStyle}/>
              </div>
              <div>
                <label style={labelStyle}>Campus</label>
                <select value={locForm.campus||""} onChange={function(e){ setLocForm(function(f){ return {...f,campus:e.target.value}; }); }} style={inputStyle}>
                  <option value="">— None —</option>
                  <option value="Norman">Norman (Thursdays)</option>
                  <option value="HC">HC — Health Campus (Tuesdays)</option>
                </select>
              </div>
              <div>
                <label style={labelStyle}>Address</label>
                <input value={locForm.address} onChange={function(e){ setLocForm(function(f){ return {...f,address:e.target.value}; }); }}
                  placeholder="e.g. 660 Parrington Oval, Norman, OK 73019" style={inputStyle}/>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>

              {reqEdit && <button onClick={function(){ setReqEdit(null); setReqForm({name:"",email:"",phone:""}); }} style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:7,padding:"8px 16px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Cancel</button>}

                    <button onClick={function(){ delReq(r.id); }} style={{background:"#0f172a",color:"#ef4444",border:"1px solid #450a0a",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>✕</button>
                  </div>
                );

          )}

      )}
    </div>
  );
}
