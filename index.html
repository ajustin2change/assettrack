// TAB 3 — VENDOR PICKUP
// ══════════════════════════════════════════════════════════════════

function decodePickupNo(name){
  var parts = (name||"").split("-");
  var vendor = parts[0]==="01"?"VantagePoint":parts[0]==="02"?"Marrs":parts[0]==="03"?"CDR":null;
  var dateStr = "";
  if(parts[1] && parts[1].length===8){
    var dd=parts[1].slice(0,2), mm=parts[1].slice(2,4), yyyy=parts[1].slice(4,8);
    dateStr = mm+"/"+dd+"/"+yyyy;
  }
  var seq = parts[2] ? parseInt(parts[2],10) : null;
  return {vendor:vendor, dateStr:dateStr, seq:seq};
}

function pickupNoInput(value, onChange, disabled){
  return <input value={value}
    onChange={function(e){
      if(disabled) return;
      var raw = e.target.value.replace(/[^0-9]/g,"");
      var fmt = raw;
      if(raw.length > 2)  fmt = raw.slice(0,2)+"-"+raw.slice(2);
      if(raw.length > 10) fmt = raw.slice(0,2)+"-"+raw.slice(2,10)+"-"+raw.slice(10,12);
      onChange(fmt);
    }}
    disabled={disabled}
    placeholder="NN-NNNNNNNN-NN" maxLength={14}
    style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:14,fontFamily:"'Geist Mono',monospace",letterSpacing:1,opacity:disabled?0.6:1}}/>;
}

var STATUS_META = {
  "scheduled":    {label:"Scheduled",    color:"#93c5fd", bg:"#1e3a5f", border:"#1e40af"},
  "picked-up":    {label:"Picked Up",    color:"#fde047", bg:"#422006", border:"#a16207"},
  "reconciled":   {label:"Reconciled",   color:"#86efac", bg:"#052e16", border:"#166534"},
};

function ShipmentsTab({tickets, setTickets, shipments, setShipments, setVendorReport, readOnly, openShipmentId, setOpenShipmentId, custodyEvents, appConfig, saveAppConfig, onDeleteShipment}){
  const [view, setView]     = useState("list");
  const [editing, setEditing] = useState(null);
  const [logShipment, setLogShipment] = useState(null); // pickup whose custody log is open (BUILD 3)

  var blankPickup = function(){
    return {
      id:uid(), name:"", vendor:"", location:"",
      createdDate:localDateStr(),
      pickupDate:"", reconcileDate:"",
      status:"scheduled", ticketIds:[],
      vendorPO:"", arrivedDate:""
    };
  };

  function openNew(){ setEditing(blankPickup()); setView("form"); }
  function openEdit(s){ setEditing({...s, ticketIds:[...s.ticketIds]}); setView("form"); }

  useEffect(function(){
    if(!openShipmentId) return;
    var s = shipments.find(function(x){ return x.id===openShipmentId; });
    if(s) openEdit(s);
    setOpenShipmentId(null);
  }, [openShipmentId]);

  function save(s, writeBack){
    setShipments(function(prev){
      var i = prev.findIndex(function(x){ return x.id===s.id; });
      if(i===-1) return [...prev,s];
      var n=[...prev]; n[i]=s; return n;
    });
    if(writeBack) writeBack(setTickets);
    setVendorReport(null);
    setView("list");
  }

  function del(id){
    if(!confirm("Delete this vendor pickup? Ticket assignments will be cleared.")) return;
    var s = shipments.find(function(x){ return x.id===id; });
    if(s){
      setTickets(function(prev){ return prev.map(function(t){
        if(s.ticketIds.includes(t.id) && t.vendorPickupNo===s.name){
          return {...t, vendorPickupNo:""};
        }
        return t;
      }); });
    }
    onDeleteShipment(id);
    setVendorReport(null);
  }

  function advanceStatus(s){
    var next = s.status==="scheduled"?"picked-up":s.status==="picked-up"?"reconciled":null;
    if(!next) return;
    var updated = {...s, status:next};
    if(next==="reconciled") updated.reconcileDate = localDateStr();
    setShipments(function(prev){ return prev.map(function(x){ return x.id===s.id?updated:x; }); });
  }

  function manifestSerialsFor(t){
    var list = (t.pickupScanned ? t.assets : t.expectedAssets) || [];
    return list.map(function(a){ return a && a.serial; }).filter(Boolean);
  }
  function governanceManifest(s){
    var jspdf = window.jspdf || window.jsPDF;
    if(!jspdf){ alert("PDF library not loaded."); return; }
    var dest = (appConfig && appConfig.governanceEmail) || "";
    if(!dest){
      var entered = prompt("No governance email is configured (Settings > Data Management).\n\nEnter the Data Governance destination email (it will be saved):");
      if(entered===null) return;
      entered = entered.trim();
      if(!entered) return;
      dest = entered;
      saveAppConfig({governanceEmail: dest});
    }
    var dec = decodePickupNo(s.name);
    var memberTickets = (s.ticketIds||[]).map(function(tid){ return tickets.find(function(t){ return t.id===tid; }); }).filter(Boolean);
    var totalSerials = 0;
    var doc = new jspdf.jsPDF({orientation:"portrait", unit:"pt", format:"letter"});
    var pageW = doc.internal.pageSize.getWidth();
    var margin = 40;
    doc.setFillColor(15,23,42); doc.rect(0,0,pageW,70,"F");
    doc.setFont("helvetica","bold"); doc.setFontSize(15); doc.setTextColor(241,245,249);
    doc.text("Chain-of-Custody Manifest", margin, 28);
    doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(148,163,184);
    doc.text("Vendor Pickup: "+(s.name||"(no number)")+"   |   Vendor: "+(dec.vendor||s.vendor||"-")+"   |   Location: "+(s.location||"-"), margin, 46);
    doc.text("Pickup date: "+(s.pickupDate?fmtDate(s.pickupDate):"-")+"   |   PO: "+(s.vendorPO||s.auditPo||"-")+"   |   Generated: "+new Date().toLocaleString(), margin, 60);
    var y = 92;
    memberTickets.forEach(function(t){
      var serials = manifestSerialsFor(t);
      totalSerials += serials.length;
      var prov = t.directVendorPickup ? "attested" : (t.pickupScanned ? "scanned" : "expected");
      var rows = [];
      for(var i=0; i<serials.length; i+=4){ rows.push([serials.slice(i,i+4).join("      ")]); }
      if(rows.length===0) rows.push(["(no serials on this ticket)"]);
      doc.autoTable({
        startY: y,
        head: [["Ticket #"+(t.ticketNo||"-")+"   |   "+(t.requestor||"-")+"   |   "+(t.site||"-")+"   |   "+serials.length+" serial"+(serials.length!==1?"s":"")+" ("+prov+")"]],
        body: rows,
        margin: {left:margin, right:margin},
        styles: {font:"courier", fontSize:8, cellPadding:3, textColor:[51,65,85]},
        headStyles: {fillColor:[30,41,59], textColor:[241,245,249], font:"helvetica", fontStyle:"bold", fontSize:9},
        theme: "grid"
      });
      y = doc.lastAutoTable.finalY + 14;
    });
    doc.setFontSize(9); doc.setTextColor(100,116,139);
    doc.text("Total: "+memberTickets.length+" ticket"+(memberTickets.length!==1?"s":"")+", "+totalSerials+" serials. Serial source per ticket: post-scan verified assets (scanned), requestor-attested expected list (attested), expected list (expected).", margin, y+6, {maxWidth: pageW-2*margin});
    var fname = "Custody-Manifest-"+(s.name||s.id)+"-"+new Date().toISOString().slice(0,10)+".pdf";
    doc.save(fname);
    var subject = "Custody Manifest - "+(s.name||"")+" - "+(dec.vendor||s.vendor||"")+(s.pickupDate?" - picked up "+fmtDate(s.pickupDate):"");
    var body = "Chain-of-custody manifest for vendor pickup "+(s.name||"")+".\n\n"
      + "Vendor: "+(dec.vendor||s.vendor||"-")+"\n"
      + "Location: "+(s.location||"-")+"\n"
      + "Pickup date: "+(s.pickupDate?fmtDate(s.pickupDate):"-")+"\n"
      + "PO: "+(s.vendorPO||s.auditPo||"(not yet captured)")+"\n"
      + "Tickets: "+memberTickets.length+"\n"
      + "Serials: "+totalSerials+"\n\n"
      + "The serial-level manifest PDF ("+fname+") was just downloaded - please attach it to this email before sending.\n\n"
      + "Generated by AssetTrack at "+new Date().toLocaleString()+".";
    window.open("mailto:"+encodeURIComponent(dest)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body));
  }
  function logArrival(s){
    var d = prompt("Warehouse arrival date from the vendor receipt email (YYYY-MM-DD):", localDateStr());
    if(d===null) return;
    d = d.trim();
    if(!/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(d)){ alert("Enter the date as YYYY-MM-DD."); return; }
    var po = prompt("Vendor PO # from the receipt email (optional):", s.vendorPO||"");
    var updated = {...s, arrivedDate:d};
    if(po!==null && po.trim()) updated.vendorPO = po.trim();
    setShipments(function(prev){ return prev.map(function(x){ return x.id===s.id?updated:x; }); });
  }

  if(view==="form") return <VendorPickupForm pickup={editing} tickets={tickets} onSave={save} onCancel={function(){ setView("list"); }} readOnly={readOnly}/>;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:18,color:"#f1f5f9"}}>Vendor Pickups</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Track vendor pickup events and the tickets included in each.</div>
        </div>
        {!readOnly && <button onClick={openNew} style={{background:"linear-gradient(135deg,#1d4ed8,#0284c7)",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>+ New Vendor Pickup</button>}
      </div>

      {shipments.length===0 ? (
        <div style={{textAlign:"center",padding:"60px 20px",border:"1px dashed #334155",borderRadius:12,color:"#475569"}}>
          <div style={{fontSize:40,marginBottom:12}}>🚛</div>
          <div style={{fontSize:14,marginBottom:16}}>No vendor pickups yet.</div>
          {!readOnly && <button onClick={openNew} style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,padding:"10px 22px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>+ Create First Vendor Pickup</button>}
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {shipments.slice().sort(function(a,b){ return (b.createdDate||"").localeCompare(a.createdDate||""); }).map(function(s){
            var sm = STATUS_META[s.status||"scheduled"]||STATUS_META["scheduled"];
            var dec = decodePickupNo(s.name);
            var ticketCount = s.ticketIds.length;
            return (
              <div key={s.id} className="card-hover" style={{background:"#1e293b",borderRadius:12,border:"1px solid "+sm.border,padding:"16px 20px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Geist Mono',monospace",fontWeight:700,fontSize:15,color:"#f1f5f9",letterSpacing:1}}>{s.name||"(no number)"}</span>
                    <span className="pill" style={{background:sm.bg,color:sm.color,border:"1px solid "+sm.border}}>{sm.label}</span>
                    <span className="pill" style={{background:"#1e293b",color:"#93c5fd",border:"1px solid #1e40af"}}>{ticketCount} ticket{ticketCount!==1?"s":""}</span>
                  </div>
                  <div style={{fontSize:11,color:"#64748b",display:"flex",gap:14,flexWrap:"wrap"}}>
                    {dec.vendor && <span>🏢 {dec.vendor}</span>}
                    {s.location && <span>📍 {s.location}</span>}
                    {s.pickupDate && <span>🚛 Picked up {fmtDate(s.pickupDate)}</span>}
                    {s.arrivedDate && <span>🏭 Arrived {fmtDate(s.arrivedDate)}</span>}
                    {s.codd && <span>📜 CoDD {fmtDate(s.codd.destructionDate)}</span>}
                    {s.reconcileDate && <span>✓ Reconciled {fmtDate(s.reconcileDate)}</span>}
                    {!s.pickupDate && s.createdDate && <span>📅 Created {fmtDate(s.createdDate)}</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {!readOnly && s.status!=="reconciled" && (
                    <button onClick={function(){ advanceStatus(s); }} style={{background:"#0f172a",color:sm.color,border:"1px solid "+sm.border,borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500}}>
                      {s.status==="scheduled"?"Mark Picked Up ▸":"Mark Reconciled ▸"}
                    </button>
                  )}
                  {!readOnly && s.status!=="scheduled" && !s.arrivedDate && (
                    <button onClick={function(){ logArrival(s); }} style={{background:"#0f172a",color:"#a78bfa",border:"1px solid #4c1d95",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500}}>Log Arrival</button>
                  )}
                  <button onClick={function(){ setLogShipment(s); }} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>📋 Log</button>
                  {!readOnly && <button onClick={function(){ governanceManifest(s); }} style={{background:"#0f172a",color:"#5eead4",border:"1px solid #115e59",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>✉ Manifest</button>}
                  <button onClick={function(){ openEdit(s); }} style={{background:"#0f172a",color:readOnly?"#475569":"#93c5fd",border:"1px solid "+(readOnly?"#334155":"#1e3a5f"),borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{readOnly?"View":"Edit"}</button>
                  {!readOnly && <button onClick={function(){ del(s.id); }} style={{background:"#0f172a",color:"#ef4444",border:"1px solid #450a0a",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12}}>✕</button>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {logShipment && (
        <CustodyModal
          title={"Chain of Custody — "+(logShipment.name||"(no number)")}
          subtitle={(decodePickupNo(logShipment.name).vendor||logShipment.vendor||"")+" · "+(logShipment.ticketIds||[]).length+" ticket"+((logShipment.ticketIds||[]).length!==1?"s":"")}
          events={(custodyEvents||[]).filter(function(ev){ return ev.shipmentId===logShipment.id; })}
          onClose={function(){ setLogShipment(null); }}/>
      )}
    </div>
  );
}

function VendorPickupForm({pickup, tickets, onSave, onCancel, readOnly}){
  var isNew = !pickup.name;
  const [form, setForm] = useState(function(){
    var f = {...pickup, ticketIds:[...pickup.ticketIds]};
    // Auto-select tickets matching this pickup number
    if(f.name && /^[0-9]{2}-[0-9]{8}-[0-9]{2}$/.test(f.name)){
      tickets.filter(function(t){ return (t.vendorPickupNo||"")===f.name && !f.ticketIds.includes(t.id); })
        .forEach(function(t){ f.ticketIds.push(t.id); });
    }
    return f;
  });
  const [ticketSearch, setTicketSearch] = useState("");
  function setF(k,v){ setForm(function(f){ return {...f,[k]:v}; }); }

  function handleNameChange(fmt){
    setForm(function(f){
      var nf = {...f, name:fmt};
      var dec = decodePickupNo(fmt);
      if(dec.vendor) nf.vendor = dec.vendor;
      if(/^[0-9]{2}-[0-9]{8}-[0-9]{2}$/.test(fmt)){
        tickets.filter(function(t){ return (t.vendorPickupNo||"")===fmt && !nf.ticketIds.includes(t.id); })
          .forEach(function(t){ nf.ticketIds.push(t.id); });
      }
      return nf;
    });
  }

  function toggle(id){
    setForm(function(f){
      var ids = f.ticketIds.includes(id)
        ? f.ticketIds.filter(function(x){ return x!==id; })
        : [...f.ticketIds, id];
      return {...f, ticketIds:ids};
    });
  }

  function handleSave(){
    if(!form.name.trim()){ alert("Please enter a vendor pickup number."); return; }
    var valid = /^[0-9]{2}-[0-9]{8}-[0-9]{2}$/.test(form.name.trim());
    if(!valid){ alert("Vendor pickup number must be in the format NN-NNNNNNNN-NN\n\nExample: 01-11032026-01"); return; }
    onSave(form, function(setTickets){
      setTickets(function(prev){ return prev.map(function(t){
        if(form.ticketIds.includes(t.id) && !t.vendorPickupNo){
          return {...t, vendorPickupNo: form.name};
        }
        return t;
      }); });
    });
  }

  // Ticket tiers: matching VP# (pre-checked), then unassigned (unchecked), hide others
  var allShipmentTicketIds = new Set(
    tickets.filter(function(t){ return t.vendorPickupNo && t.vendorPickupNo!==form.name; })
      .map(function(t){ return t.id; })
  );

  function sortDesc(arr){ return arr.slice().sort(function(a,b){ return String(b.ticketNo).localeCompare(String(a.ticketNo),undefined,{numeric:true}); }); }
  var tier1 = sortDesc(tickets.filter(function(t){ return (t.vendorPickupNo||"")===form.name && form.name; }));
  var tier2 = sortDesc(tickets.filter(function(t){ return !t.vendorPickupNo && !allShipmentTicketIds.has(t.id) && !(form.name && (t.vendorPickupNo||"")===form.name); }));

  function applySearch(list){
    var q = ticketSearch.trim().toLowerCase();
    if(!q) return list;
    return list.filter(function(t){
      return (t.ticketNo||"").toLowerCase().includes(q)
        || (t.site||"").toLowerCase().includes(q)
        || (t.requestor||"").toLowerCase().includes(q);
    });
  }

  var filteredTier1 = applySearch(tier1);
  var filteredTier2 = applySearch(tier2);
  var dec = decodePickupNo(form.name);

  function TicketRow(t, autoMatched){
    var sel = form.ticketIds.includes(t.id);
    var ps = pickupStatus(t);
    var statusPill = ps==="verified"
      ? <span className="pill" style={{background:"#052e16",color:"#86efac",border:"1px solid #166534"}}>✓ Verified</span>
      : ps==="awaiting-approval"
      ? <span className="pill" style={{background:"#3b1f02",color:"#fb923c",border:"1px solid #c2410c"}}>⏳ Awaiting Approval</span>
      : <span className="pill" style={{background:"#1e293b",color:"#64748b",border:"1px solid #334155"}}>Scan Pending</span>;
    return (
      <div key={t.id} onClick={readOnly ? undefined : function(){ toggle(t.id); }} style={{background:sel?"#0f2e4a":"#1e293b",border:"2px solid "+(sel?"#3b82f6":"#334155"),borderRadius:10,padding:"12px 16px",cursor:readOnly?"default":"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.15s"}}>
        <div style={{width:20,height:20,borderRadius:4,flexShrink:0,background:sel?"#3b82f6":"#0f172a",border:"2px solid "+(sel?"#3b82f6":"#475569"),display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12}}>{sel?"✓":""}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{color:"#f1f5f9",fontWeight:500}}>#{t.ticketNo}</span>
            {statusPill}
            <span className="pill" style={{background:"#1e3a5f",color:"#93c5fd",border:"1px solid #1e40af"}}>{(t.expectedAssets||[]).length} expected</span>
            {autoMatched && <span style={{fontSize:11,color:"#86efac"}}>✓ Auto-matched</span>}
          </div>
          <div style={{fontSize:11,color:"#64748b",marginTop:3,display:"flex",gap:12,flexWrap:"wrap"}}>
            {t.date && <span>📅 {fmtDate(t.date)}</span>}
            {t.site && <span>📍 {t.site}</span>}
            {t.requestor && <span>✉ {t.requestor}</span>}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <button onClick={onCancel} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,fontFamily:"inherit",marginBottom:16,padding:0}}>← Back to Vendor Pickups</button>
      <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:18,color:"#f1f5f9",marginBottom:20}}>{isNew?"New Vendor Pickup":"Editing: "+form.name}</div>

      {/* Fields */}
      <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"20px 24px",marginBottom:20,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:16}}>
        <div style={{gridColumn:"1/-1"}}>
          <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Vendor Pickup Number *</label>
          {pickupNoInput(form.name, handleNameChange, readOnly)}
          {form.name && (dec.vendor||dec.dateStr) && (
            <div style={{marginTop:5,fontSize:11,color:"#64748b",display:"flex",gap:12,flexWrap:"wrap"}}>
              {dec.vendor && <span style={{color:"#93c5fd"}}>🏢 {dec.vendor}</span>}
              {dec.dateStr && <span>📅 {dec.dateStr}</span>}
              {dec.seq && <span>🔢 Pickup #{dec.seq}</span>}
            </div>
          )}
        </div>
        <div>
          <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Vendor</label>
          <input value={form.vendor||""} onChange={function(e){ setF("vendor",e.target.value); }} placeholder="Auto-filled from number" disabled={readOnly}
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",opacity:readOnly?0.6:1}}/>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Location</label>
          <input value={form.location||""} onChange={function(e){ setF("location",e.target.value); }} placeholder="e.g. Main Campus" disabled={readOnly}
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",opacity:readOnly?0.6:1}}/>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Created Date</label>
          <input type="date" value={form.createdDate||""} onChange={function(e){ setF("createdDate",e.target.value); }} disabled={readOnly}
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",opacity:readOnly?0.6:1}}/>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Pickup Date</label>
          <input type="date" value={form.pickupDate||""} onChange={function(e){ setF("pickupDate",e.target.value); }} disabled={readOnly}
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",opacity:readOnly?0.6:1}}/>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Reconciliation Date</label>
          <input type="date" value={form.reconcileDate||""} onChange={function(e){ setF("reconcileDate",e.target.value); }} disabled={readOnly}
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",opacity:readOnly?0.6:1}}/>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Status</label>
          <select value={form.status||"scheduled"} onChange={function(e){ setF("status",e.target.value); }} disabled={readOnly}
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",opacity:readOnly?0.6:1}}>
            <option value="scheduled">Scheduled</option>
            <option value="picked-up">Picked Up</option>
            <option value="reconciled">Reconciled</option>
          </select>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Vendor PO #</label>
          <input value={form.vendorPO||""} onChange={function(e){ setF("vendorPO",e.target.value); }} placeholder="From vendor receipt / CoDD" disabled={readOnly}
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",opacity:readOnly?0.6:1}}/>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Warehouse Arrival Date</label>
          <input type="date" value={form.arrivedDate||""} onChange={function(e){ setF("arrivedDate",e.target.value); }} disabled={readOnly}
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",opacity:readOnly?0.6:1}}/>
        </div>
      </div>

      {/* Save bar — above ticket list */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"12px 18px",marginBottom:16}}>
        <span style={{color:"#64748b",fontSize:12}}>{form.ticketIds.length} ticket{form.ticketIds.length!==1?"s":""} in this pickup</span>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onCancel} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>{readOnly?"Close":"Cancel"}</button>
          {!readOnly && <button onClick={handleSave} style={{background:"linear-gradient(135deg,#065f46,#0284c7)",color:"#fff",border:"none",borderRadius:8,padding:"9px 22px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>Save Vendor Pickup</button>}
        </div>
      </div>

      {/* Ticket selection */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:14,color:"#e2e8f0"}}>Tickets</div>
        <input value={ticketSearch} onChange={function(e){ setTicketSearch(e.target.value); }} placeholder="Search ticket #, site, requestor..."
          style={{background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"7px 12px",fontSize:12,fontFamily:"inherit",width:240,outline:"none"}}/>
      </div>

      {tickets.length===0 ? (
        <div style={{padding:"20px",borderRadius:8,background:"#1e293b",border:"1px solid #334155",color:"#64748b",fontSize:13,marginBottom:16}}>No tickets exist yet.</div>
      ) : (
        <div style={{marginBottom:20}}>
          {filteredTier1.length>0 && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#86efac",fontWeight:600,textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>✓ Matching this pickup number ({filteredTier1.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {filteredTier1.map(function(t){ return TicketRow(t, true); })}
              </div>
            </div>
          )}
          {filteredTier2.length>0 && (
            <div>
              <div style={{fontSize:11,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>Unassigned tickets ({filteredTier2.length})</div>
              <div style={{overflowY:"auto",maxHeight:400,display:"flex",flexDirection:"column",gap:8,paddingRight:4}}>
                {filteredTier2.map(function(t){ return TicketRow(t, false); })}
              </div>
            </div>
          )}
          {filteredTier1.length===0 && filteredTier2.length===0 && (
            <div style={{padding:"20px",borderRadius:8,background:"#1e293b",border:"1px solid #334155",color:"#64748b",fontSize:13}}>
              {ticketSearch ? "No tickets match your search." : "No unassigned tickets available."}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

            var inScopeTickets = s.ticketIds.map(function(tid){ return tickets.find(function(t){ return t.id===tid; }); }).filter(Boolean);

                    <span className="pill" style={{background:sm.bg,color:sm.color,border:"1px solid "+sm.border}}>{sm.label}</span>

                    {hasAudit && <span className="pill" style={{background:"#052e16",color:"#86efac",border:"1px solid #166534"}}>✓ Audit uploaded</span>}
                  </div>
                  <div style={{fontSize:11,color:"#64748b",display:"flex",gap:14,flexWrap:"wrap"}}>
                    {dec.vendor && <span>🏢 {dec.vendor}</span>}

                </div>
