// TAB 2 — PICKUP SCAN
// ══════════════════════════════════════════════════════════════════
function PickupScanTab({tickets, setTickets, locations}){
  const [selectedId, setSelectedId] = useState(null);
  const ticket = tickets.find(function(t){ return t.id===selectedId; }) || null;
  function saveTicket(updated){ setTickets(function(prev){ return prev.map(function(t){ return t.id===updated.id?updated:t; }); }); }
  const eligible = tickets.filter(function(t){ return (t.expectedAssets||[]).length>0 && pickupStatus(t)==="pending"; })
    .slice().sort(function(a,b){ return String(b.ticketNo).localeCompare(String(a.ticketNo), undefined, {numeric:true}); });

  const [routeOrder, setRouteOrder] = useState(null); // null = use default order
  const [dragOver, setDragOver]     = useState(null);

  if(!selectedId || !ticket){
    var todayStr = new Date().toISOString().slice(0,10);
    var baseTodayTickets = tickets.filter(function(t){ return t.scheduledPickupDate===todayStr; })
      .slice().sort(function(a,b){ return String(a.ticketNo).localeCompare(String(b.ticketNo),undefined,{numeric:true}); });

    // Apply custom route order if set, reset if tickets changed
    var todayTickets = (function(){
      if(!routeOrder || routeOrder.length !== baseTodayTickets.length) return baseTodayTickets;
      var ordered = [];
      routeOrder.forEach(function(id){ var t = baseTodayTickets.find(function(x){ return x.id===id; }); if(t) ordered.push(t); });
      baseTodayTickets.forEach(function(t){ if(!ordered.find(function(x){ return x.id===t.id; })) ordered.push(t); });
      return ordered;
    })();

    var todaySerials = todayTickets.reduce(function(n,t){ return n+(t.expectedAssets||[]).length; },0);
    // Sites in route order, deduplicated preserving order
    var todaySites = (function(){
      var seen = new Set(); var list = [];
      todayTickets.forEach(function(t){
        var s = (t.site||"").trim();
        if(s && !seen.has(s)){ seen.add(s); list.push(s); }
      });
      return list;
    })();

    // Build Google Maps directions URL
    var mapsUrl = (function(){
      var GMAPS_API_KEY = ""; // Drop your API key here when ready
      var addrs = todayTickets.map(function(t){
        var loc = (locations||[]).find(function(l){ return l.name===t.site; });
        return loc && loc.address ? loc.address : (t.site||"");
      }).filter(Boolean);
      if(addrs.length < 2) return null;
      var origin = addrs[0];
      var dest   = addrs[addrs.length-1];
      var waypts = addrs.slice(1, addrs.length-1);
      if(GMAPS_API_KEY){
        var base = "https://www.google.com/maps/embed/v1/directions?key="+GMAPS_API_KEY;
        base += "&origin="+encodeURIComponent(origin)+"&destination="+encodeURIComponent(dest);
        if(waypts.length) base += "&waypoints="+waypts.map(encodeURIComponent).join("|");
        return base;
      } else {
        // Fallback: open in Google Maps tab (no iframe, no key needed)
        var base2 = "https://www.google.com/maps/dir/"+[origin].concat(waypts).concat([dest]).map(encodeURIComponent).join("/");
        return {link:base2};
      }
    })();

    return (
      <div>
        <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:18,color:"#f1f5f9",marginBottom:4}}>Pickup Scan</div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>Select a ticket to begin scanning assets at pickup.</div>

        {/* ── Today's Pickups panel ── */}
        {todayTickets.length>0 && (
          <div style={{background:"linear-gradient(135deg,#0f2e4a,#1a0a2e)",borderRadius:14,border:"1px solid #1e40af",padding:"20px 24px",marginBottom:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:16}}>
              <div>
                <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:16,color:"#f1f5f9",marginBottom:2}}>
                  📅 Today's Pickups <span style={{fontSize:12,color:"#64748b",fontWeight:400}}>— {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</span>
                </div>
                <div style={{fontSize:12,color:"#64748b",display:"flex",gap:16,flexWrap:"wrap"}}>
                  <span><strong style={{color:"#93c5fd"}}>{todayTickets.length}</strong> ticket{todayTickets.length!==1?"s":""}</span>
                  <span><strong style={{color:"#86efac"}}>{todaySerials}</strong> expected serial{todaySerials!==1?"s":""}</span>
                  <span><strong style={{color:"#c4b5fd"}}>{todaySites.length}</strong> location{todaySites.length!==1?"s":""}</span>
                </div>
              </div>
              {/* Progress summary */}
              {(function(){
                var done    = todayTickets.filter(function(t){ return pickupStatus(t)!=="pending"; }).length;
                var pending = todayTickets.filter(function(t){ return pickupStatus(t)==="pending"; }).length;
                return done>0 ? (
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:12,color:"#86efac",marginBottom:4}}>{done}/{todayTickets.length} scanned</div>
                    <div style={{width:120,height:8,borderRadius:4,background:"#1e293b",overflow:"hidden"}}>
                      <div style={{width:(done/todayTickets.length*100)+"%",height:"100%",background:"#166534",borderRadius:4}}/>
                    </div>
                  </div>
                ) : null;
              })()}
            </div>

            {/* Draggable ticket cards */}
            <div style={{fontSize:11,color:"#475569",marginBottom:8}}>⠿ Drag cards to reorder the route</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10,marginBottom:16}}>
              {todayTickets.map(function(t, idx){
                var ps = pickupStatus(t);
                var statusColor = ps==="verified"?"#86efac":ps==="awaiting-approval"?"#fde047":"#64748b";
                var statusBg    = ps==="verified"?"#052e16":ps==="awaiting-approval"?"#422006":"#1e293b";
                var statusBorder= ps==="verified"?"#166534":ps==="awaiting-approval"?"#a16207":"#334155";
                var statusLabel = ps==="verified"?"✓ Done":ps==="awaiting-approval"?"⏳ Approval":"Scan Pending";
                var canScan     = ps==="pending" && (t.expectedAssets||[]).length>0;
                var isDragOver  = dragOver===t.id;
                return (
                  <div key={t.id}
                    draggable={true}
                    onDragStart={function(e){ e.dataTransfer.setData("ticketId", t.id); }}
                    onDragOver={function(e){ e.preventDefault(); setDragOver(t.id); }}
                    onDragLeave={function(){ setDragOver(null); }}
                    onDrop={function(e){
                      e.preventDefault(); setDragOver(null);
                      var dragId = e.dataTransfer.getData("ticketId");
                      if(dragId===t.id) return;
                      var ids = todayTickets.map(function(x){ return x.id; });
                      var fromIdx = ids.indexOf(dragId);
                      var toIdx   = ids.indexOf(t.id);
                      if(fromIdx===-1||toIdx===-1) return;
                      var next = ids.slice();
                      next.splice(fromIdx,1);
                      next.splice(toIdx,0,dragId);
                      setRouteOrder(next);
                    }}
                    onClick={canScan ? function(){ setSelectedId(t.id); } : undefined}
                    style={{background:isDragOver?"#1e3a5f":"#0f172a",borderRadius:10,border:"2px solid "+(isDragOver?"#3b82f6":statusBorder),padding:"14px 16px",cursor:"grab",transition:"border-color 0.15s, background 0.15s",opacity:ps==="verified"?0.7:1,userSelect:"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{color:"#334155",fontSize:14,lineHeight:1}}>⠿</span>
                        <span style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:14,color:"#f1f5f9"}}>{t.ticketNo}</span>
                        <span style={{fontSize:10,color:"#475569",background:"#1e293b",borderRadius:10,padding:"1px 6px"}}>{idx+1}</span>
                      </div>
                      <span style={{fontSize:10,color:statusColor,background:statusBg,border:"1px solid "+statusBorder,borderRadius:4,padding:"2px 7px"}}>{statusLabel}</span>
                    </div>
                    <div style={{fontSize:11,color:"#64748b",display:"flex",flexDirection:"column",gap:3}}>
                      {t.site && <span>📍 {t.site}</span>}
                      {t.requestor && <span>👤 {t.requestor}</span>}
                      {t.phone && <span>📞 {t.phone}</span>}
                      <span>🗂 {(t.expectedAssets||[]).length} serial{(t.expectedAssets||[]).length!==1?"s":""}</span>
                    </div>
                    {canScan && <div style={{marginTop:8,fontSize:11,color:"#3b82f6",textAlign:"right"}}>Tap to scan →</div>}
                  </div>
                );
              })}
            </div>

            {/* Route summary + map */}
            {todaySites.length>0 && (
              <div>
                {/* Route stops text */}
                <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e3a5f",padding:"12px 16px",marginBottom:10}}>
                  <div style={{fontSize:11,color:"#475569",marginBottom:6,textTransform:"uppercase",letterSpacing:0.7}}>Route Order</div>
                  <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:6}}>
                    {todaySites.map(function(s,i){
                      return (
                        <React.Fragment key={s+i}>
                          <span style={{fontSize:12,color:"#93c5fd",background:"#0f2e4a",borderRadius:6,padding:"3px 10px"}}>{i+1}. {s}</span>
                          {i<todaySites.length-1 && <span style={{color:"#334155",fontSize:14}}>→</span>}
                        </React.Fragment>
                      );
                    })}
                  </div>
                </div>

                {/* Map */}
                {(function(){
                  if(!mapsUrl) return null;
                  if(typeof mapsUrl === "object" && mapsUrl.link){
                    // No API key yet — show placeholder with open-in-maps button
                    return (
                      <div style={{background:"#0f172a",borderRadius:10,border:"1px dashed #1e3a5f",padding:"24px",textAlign:"center"}}>
                        <div style={{fontSize:28,marginBottom:8}}>🗺</div>
                        <div style={{fontSize:12,color:"#475569",marginBottom:12}}>Add a Google Maps API key in the code to enable the embedded map.</div>
                        <a href={mapsUrl.link} target="_blank" rel="noopener noreferrer"
                          style={{display:"inline-block",background:"linear-gradient(135deg,#065f46,#0284c7)",color:"#fff",borderRadius:8,padding:"9px 20px",fontSize:13,textDecoration:"none",fontFamily:"inherit",fontWeight:500}}>
                          🗺 Open Route in Google Maps ↗
                        </a>
                      </div>
                    );
                  }
                  // API key present — show embedded map
                  return (
                    <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #1e3a5f",height:320}}>
                      <iframe width="100%" height="100%" frameBorder="0" style={{border:0}} src={mapsUrl} allowFullScreen/>
                    </div>
                  );
                })()}
              </div>
            )}
          </div>
        )}

        {/* ── All eligible tickets ── */}
        {eligible.length===0 ? (
          <div style={{textAlign:"center",padding:"60px 20px",border:"1px dashed #334155",borderRadius:12,color:"#475569"}}>
            <div style={{fontSize:40,marginBottom:12}}>📡</div>
            <div style={{fontSize:14}}>No tickets with expected serials yet. Create a ticket first.</div>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {eligible.map(function(t){
              const ps = pickupStatus(t);
              const assetTagCount = (t.expectedAssets||[]).filter(function(a){ return a.ouInventory && a.ouInventory.trim(); }).length;
              return (
                <div key={t.id} className="card-hover" onClick={function(){ setSelectedId(t.id); }}
                  style={{background:"#1e293b",borderRadius:12,border:"1px solid "+(ps==="awaiting-approval"?"#a16207":ps==="verified"?"#166534":"#334155"),padding:"16px 20px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:15,color:"#f1f5f9"}}>{t.ticketNo}</span>
                      <span className="pill" style={{background:"#1e3a5f",color:"#93c5fd",border:"1px solid #1e40af"}}>{(t.expectedAssets||[]).length} expected</span>
                      {ps==="verified"          && <span className="pill" style={{background:"#052e16",color:"#86efac",border:"1px solid #166534"}}>✓ Verified</span>}
                      {ps==="awaiting-approval" && <span className="pill" style={{background:"#422006",color:"#fde047",border:"1px solid #a16207"}}>⚠ Needs Review</span>}
                      {ps==="pending"           && <span className="pill" style={{background:"#1e293b",color:"#64748b",border:"1px solid #334155"}}>Scan Pending</span>}
                      {assetTagCount>0 && <span className="pill" style={{background:"#0c1a2e",color:"#7dd3fc",border:"1px solid #0284c7"}}>🏷 {assetTagCount} tagged</span>}
                      {t.scheduledPickupDate && t.scheduledPickupDate!==todayStr && <span className="pill" style={{background:"#1e293b",color:"#a78bfa",border:"1px solid #6d28d9"}}>📅 {fmtDate(t.scheduledPickupDate)}</span>}
                    </div>
                    <div style={{fontSize:11,color:"#64748b",display:"flex",gap:14,flexWrap:"wrap"}}>
                      {t.date && <span>Submitted {fmtDate(t.date)}</span>}
                      {t.site && <span>📍 {t.site}</span>}
                      {t.requestor && <span>👤 {t.requestor}</span>}
                      {t.phone && <span>📞 {t.phone}</span>}
                    </div>
                  </div>
                  <span style={{color:"#3b82f6",fontSize:13}}>Open →</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }
  return <PickupScanForm ticket={ticket} onSave={saveTicket} onBack={function(){ setSelectedId(null); }}/>;
}

function PickupScanForm({ticket, onSave, onBack}){
  const expected = ticket.expectedAssets || [];
  const expMap   = {};
  expected.forEach(function(a){ expMap[a.serial] = a; });

  const [scanned, setScanned]         = useState(ticket.pickupScanned ? (ticket.pickupScanList||[]) : []);
  const [input, setInput]             = useState("");
  const [focus, setFocus]             = useState(false);
  const [flash, setFlash]             = useState(null);
  const [result, setResult]           = useState(ticket.pickupResult || null);
  const [resolutions, setResolutions] = useState(function(){
    if(!ticket.pickupResult) return {};
    const r = {};
    [...(ticket.pickupResult.partial||[]),...(ticket.pickupResult.extra||[]),...(ticket.pickupResult.missing||[])].forEach(function(item){
      if(item.id) r[item.id] = item.resolution;
    });
    return r;
  });
  const [waived, setWaived] = useState(function(){
    if(ticket.pickupResult && ticket.pickupResult.waived) return new Set(ticket.pickupResult.waived);
    return new Set();
  });
  const [directPickup, setDirectPickup] = useState(false);
  const [linkingId, setLinkingId]   = useState(null); // missing item id currently being linked
  const [links, setLinks]           = useState({});    // {missingId: extraId, extraId: missingId}
  const inputRef = useRef();
  useEffect(function(){ if(inputRef.current && !directPickup) inputRef.current.focus(); }, []);

  function linkPair(missingId, extraId){
    setLinks(function(prev){
      // Remove any existing links for these two
      var next = {};
      Object.keys(prev).forEach(function(k){
        if(prev[k]!==missingId && prev[k]!==extraId && k!==missingId && k!==extraId) next[k]=prev[k];
      });
      next[missingId] = extraId;
      next[extraId]   = missingId;
      return next;
    });
    setLinkingId(null);
  }

  function unlink(id){
    setLinks(function(prev){
      var partnerId = prev[id];
      var next = {};
      Object.keys(prev).forEach(function(k){ if(k!==id && k!==partnerId) next[k]=prev[k]; });
      return next;
    });
  }

  function toggleWaive(serial){
    setWaived(function(prev){
      const next = new Set(prev);
      if(next.has(serial)) next.delete(serial); else next.add(serial);
      return next;
    });
    setResult(null); // clear results if waived set changes
  }

  function addScan(raw){
    const serial = raw.trim().toUpperCase(); if(!serial) return;
    if(scanned.find(function(s){ return s===serial; })){ setFlash({serial,dup:true}); setTimeout(function(){ setFlash(null); },1400); setInput(""); return; }
    setScanned(function(prev){ return [serial,...prev]; });
    setFlash({serial,dup:false}); setTimeout(function(){ setFlash(null); },800);
    setInput(""); setResult(null);
  }

  function addMultiple(serials){
    // Compute deduped list synchronously so count is available before setState fires
    var seen = new Set(scanned);
    var deduped = [];
    for(var i=0; i<serials.length; i++){
      var s = serials[i];
      if(!s || seen.has(s)) continue;
      seen.add(s);
      deduped.push(s);
    }
    if(deduped.length > 0){
      setScanned(function(prev){
        var existing = new Set(prev);
        var newItems = deduped.filter(function(s){ return !existing.has(s); });
        return newItems.concat(prev);
      });
      setResult(null);
    }
    return deduped.length;
  }

  function handlePaste(e){
    var text = e.clipboardData.getData("text");
    // Use charCodeAt to detect newline(10), carriage return(13), tab(9)
    // without embedding literal whitespace characters in the source
    var parts = [];
    var current = "";
    for(var ci=0; ci<text.length; ci++){
      var code = text.charCodeAt(ci);
      if(code === 13) continue; // carriage return — skip
      if(code === 10 || code === 9){ // newline or tab — delimiter
        var trimmed = current.trim().toUpperCase();
        if(trimmed) parts.push(trimmed);
        current = "";
      } else {
        current += text[ci];
      }
    }
    var last = current.trim().toUpperCase();
    if(last) parts.push(last);
    if(parts.length <= 1) return; // single value — let the input handle it normally
    e.preventDefault();
    var added = addMultiple(parts);
    setFlash({serial: added + " serial" + (added!==1?"s":"") + " added from paste", dup:false, multi:true});
    setTimeout(function(){ setFlash(null); }, 2500);
    setInput("");
  }

    function removeScan(s){ setScanned(function(prev){ return prev.filter(function(x){ return x!==s; }); }); setResult(null); }

  function runComparison(){
    const expSet    = new Set(expected.map(function(a){ return a.serial; }));
    const scannedSet= new Set(scanned);
    const matched=[], missing=[], extra=[], partial=[];

    expected.forEach(function(a){
      if(waived.has(a.serial)) return; // waived — skip entirely
      const meta = {manufacturer:a.manufacturer||"", machineType:a.machineType||"", ouInventory:a.ouInventory||""};
      if(scannedSet.has(a.serial)){
        matched.push({id:uid(), serial:a.serial, ...meta, type:"matched"});
      } else {
        const pm = findPartialMatch(a.serial, Array.from(scannedSet).filter(function(s){ return !expSet.has(s); }));
        if(pm) partial.push({id:uid(), expectedSerial:a.serial, scannedSerial:pm.serial, distance:pm.distance, ...meta, type:"partial", resolution:null});
        else   missing.push({id:uid(), serial:a.serial, ...meta, type:"missing", resolution:null});
      }
    });

    const partialScanned = new Set(partial.map(function(p){ return p.scannedSerial; }));
    scanned.forEach(function(serial){
      if(!expSet.has(serial) && !partialScanned.has(serial)) extra.push({id:uid(), serial, type:"extra", resolution:null});
    });

    setResult({matched, missing, extra, partial, waived:Array.from(waived), scannedAt:new Date().toLocaleString()});
    setResolutions({});
  }

  function setRes(id,val){ setResolutions(function(r){ return {...r, [id]:val}; }); }

  function getResolved(){
    if(!result) return null;
    var missing = result.missing.map(function(item){
      var linkedExtraId = links[item.id];
      return {...item, linkedTo: linkedExtraId||null, resolution: linkedExtraId ? "linked" : null};
    });
    var extra = result.extra.map(function(item){
      var linkedMissingId = links[item.id];
      return {...item, linkedTo: linkedMissingId||null, resolution: linkedMissingId ? "linked" : null};
    });
    var partial = result.partial.map(function(item){ return {...item, resolution:"use-scanned"}; });
    return {...result, missing:missing, extra:extra, partial:partial};
  }

  function saveDirectPickup(){
    var now = new Date().toLocaleString();
    // Mark all expected assets as matched (vendor picked up directly — trust the list)
    var finalAssets = expected.map(function(a){
      return {...a, addedAt:now, source:"vendor-direct"};
    });
    onSave({
      ...ticket,
      pickupScanned:    true,
      pickupScanList:   expected.map(function(a){ return a.serial; }),
      pickupResult:     {
        matched:  expected.map(function(a){ return {id:uid(), serial:a.serial, manufacturer:a.manufacturer||"", machineType:a.machineType||"", ouInventory:a.ouInventory||""}; }),
        missing:  [],
        extra:    [],
        partial:  [],
        waived:   [],
      },
      assets:           finalAssets,
      approvalStatus:   "validated",
      approvalSentAt:   now,
      directVendorPickup: true,
    });
    onBack();
  }

  function buildFinalAssets(resolved){
    const finalAssets = [];
    const now = new Date().toLocaleString();
    function infoFor(serial){ const a=expMap[serial]||{}; return {manufacturer:a.manufacturer||"",machineType:a.machineType||"",ouInventory:a.ouInventory||""}; }
    // Matched — always included
    resolved.matched.forEach(function(m){ finalAssets.push({serial:m.serial, ...infoFor(m.serial), addedAt:now, source:"scan"}); });
    // Partial matches — use scanned serial (scanner is authoritative)
    resolved.partial.forEach(function(p){
      finalAssets.push({serial:p.scannedSerial, ...infoFor(p.expectedSerial), addedAt:now, source:"scan-partial"});
    });
    // Linked pairs — use scanned (extra) serial as the correct one, borrow metadata from expected
    resolved.extra.forEach(function(e){
      if(e.linkedTo) finalAssets.push({serial:e.serial, ...infoFor(e.linkedTo), addedAt:now, source:"scan-linked"});
    });
    // Unlinked extras go to approval — included as pending, requestor can deny
    resolved.extra.forEach(function(e){
      if(!e.linkedTo) finalAssets.push({serial:e.serial, manufacturer:"", machineType:"", ouInventory:"", addedAt:now, source:"scan-extra-pending", approved:null});
    });
    return finalAssets;
  }

  function generateApprovalPdf(resolved){
    var jspdf = window.jspdf || window.jsPDF;
    var doc = new jspdf.jsPDF({orientation:"landscape", unit:"pt", format:"letter"});

    var pageW = doc.internal.pageSize.getWidth();
    var margin = 36;

    // ── Header ──────────────────────────────────────────────────
    doc.setFillColor(15, 23, 42);
    doc.rect(0, 0, pageW, 60, "F");
    doc.setFont("helvetica","bold");
    doc.setFontSize(16);
    doc.setTextColor(241,245,249);
    doc.text("IT Asset Disposal — Approval Request", margin, 24);
    doc.setFont("helvetica","normal");
    doc.setFontSize(9);
    doc.setTextColor(148,163,184);
    doc.text("Ticket: "+ticket.ticketNo+"   |   Date: "+new Date().toLocaleDateString()+"   |   Site: "+(ticket.site||"—")+"   |   Requestor: "+(ticket.requestor||"—"), margin, 40);

    // ── Instructions ─────────────────────────────────────────────
    doc.setFontSize(9);
    doc.setTextColor(100,116,139);
    doc.text("Please review each item below, enter APPROVED or DENIED in the Decision column, sign at the bottom, and return this document.", margin, 76);

    // ── Color legend ─────────────────────────────────────────────
    var lx = margin;
    var ly = 90;
    var legendItems = [
      {label:"Missing — on ticket, not picked up",  r:254,g:226,b:226},
      {label:"Extra — picked up, not on ticket",    r:219,g:234,b:254},
      {label:"Proposed Correction — serial mismatch",r:254,g:252,b:202},
    ];
    legendItems.forEach(function(li){
      doc.setFillColor(li.r,li.g,li.b);
      doc.roundedRect(lx, ly, 10, 10, 2, 2, "F");
      doc.setTextColor(71,85,105);
      doc.setFontSize(8);
      doc.text(li.label, lx+14, ly+8);
      lx += doc.getTextWidth(li.label) + 30;
    });

    // ── Build table rows ─────────────────────────────────────────
    var bodyRows = [];
    var rowStyles = {};
    var rowIdx = 0;

    // Missing — red tint
    var unlinkedMissing = resolved.missing.filter(function(m){ return !m.linkedTo; });
    unlinkedMissing.forEach(function(m){
      bodyRows.push([
        "Missing",
        m.serial || "",
        "",
        m.manufacturer||"",
        m.machineType||"",
        m.ouInventory||"",
        ""
      ]);
      rowStyles[rowIdx] = {fillColor:[254,226,226]};
      rowIdx++;
    });

    // Extra — blue tint
    var unlinkedExtra = resolved.extra.filter(function(e){ return !e.linkedTo; });
    unlinkedExtra.forEach(function(e){
      bodyRows.push([
        "Extra",
        "",
        e.serial || "",
        "",
        "",
        "",
        ""
      ]);
      rowStyles[rowIdx] = {fillColor:[219,234,254]};
      rowIdx++;
    });

    // Proposed Corrections — yellow tint
    resolved.missing.filter(function(m){ return m.linkedTo; }).forEach(function(m){
      var ex = resolved.extra.find(function(e){ return e.id===m.linkedTo; });
      bodyRows.push([
        "Correction",
        m.serial||"",
        ex ? ex.serial : "",
        m.manufacturer||"",
        m.machineType||"",
        m.ouInventory||"",
        ""
      ]);
      rowStyles[rowIdx] = {fillColor:[254,252,202]};
      rowIdx++;
    });
    resolved.partial.forEach(function(p){
      bodyRows.push([
        "Correction",
        p.expectedSerial||"",
        p.scannedSerial||"",
        p.manufacturer||"",
        p.machineType||"",
        p.ouInventory||"",
        ""
      ]);
      rowStyles[rowIdx] = {fillColor:[254,252,202]};
      rowIdx++;
    });

    // ── Table ────────────────────────────────────────────────────
    doc.autoTable({
      startY: 106,
      margin: {left:margin, right:margin},
      head: [[
        {content:"Type",          styles:{halign:"center", cellWidth:52}},
        {content:"Serial # on Ticket", styles:{cellWidth:110}},
        {content:"Serial # Scanned",   styles:{cellWidth:110}},
        {content:"Manufacturer",  styles:{cellWidth:72}},
        {content:"Machine Type",  styles:{cellWidth:72}},
        {content:"Asset Tag",     styles:{cellWidth:60}},
        {content:"Decision (APPROVED / DENIED)", styles:{cellWidth:160}},
      ]],
      body: bodyRows,
      theme: "grid",
      headStyles:{
        fillColor:[30,41,59],
        textColor:[241,245,249],
        fontSize:8,
        fontStyle:"bold",
        cellPadding:5,
      },
      bodyStyles:{
        fontSize:8,
        cellPadding:5,
        textColor:[15,23,42],
        fontStyle:"normal",
      },
      bodyRowStyles: rowStyles,
      alternateRowStyles:{fillColor:null},
      styles:{overflow:"linebreak"},
      didParseCell: function(data){
        if(data.section==="body" && rowStyles[data.row.index]){
          data.cell.styles.fillColor = rowStyles[data.row.index].fillColor;
        }
      },
      columnStyles:{
        0:{halign:"center", fontStyle:"bold"},
        6:{textColor:[148,163,184]},
      },
    });

    // ── Signature block ──────────────────────────────────────────
    var sigY = doc.lastAutoTable.finalY + 30;
    var sigPageH = doc.internal.pageSize.getHeight();
    if(sigY + 90 > sigPageH - margin){
      doc.addPage();
      sigY = margin + 20;
    }
    doc.setDrawColor(148,163,184);
    doc.setLineWidth(0.5);
    // Requestor signature
    doc.line(margin,       sigY+30, margin+200,       sigY+30);
    doc.line(margin+220,   sigY+30, margin+350,       sigY+30);
    doc.setFontSize(8);
    doc.setTextColor(100,116,139);
    doc.text("Requestor Signature",     margin,       sigY+40);
    doc.text("Date",                    margin+220,   sigY+40);
    doc.text("Printed Name: "+(ticket.requestor||"_______________________"), margin, sigY+60);

    doc.setFontSize(7);
    doc.setTextColor(148,163,184);
    doc.text("Generated by AssetTrack  |  Ticket: "+ticket.ticketNo+"  |  "+new Date().toLocaleString(), margin, sigY+80);

    // ── Page 2: All scanned serials ──────────────────────────────
    var scanList = ticket.pickupScanList || [];
    if(!scanList.length && resolved){
      // Reconstruct from resolved
      (resolved.matched||[]).forEach(function(m){ scanList.push(m.serial); });
      (resolved.partial||[]).forEach(function(p){ scanList.push(p.scannedSerial); });
      (resolved.extra||[]).forEach(function(e){ scanList.push(e.serial); });
    }
    if(scanList.length){
      doc.addPage();
      doc.setFillColor(15,23,42); doc.rect(0,0,pageW,44,"F");
      doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.setTextColor(241,245,249);
      doc.text("All Scanned Serials — Ticket #"+ticket.ticketNo, margin, 20);
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
      doc.text(scanList.length+" serial"+(scanList.length!==1?"s":"")+" scanned  |  "+ticket.site+"  |  "+new Date().toLocaleDateString(), margin, 34);

      var colW = 180; var cols = Math.floor((pageW - margin*2) / colW);
      var rowH = 16; var startY = 60; var x = margin; var y = startY; var col = 0;
      scanList.slice().sort().forEach(function(s){
        if(y + rowH > doc.internal.pageSize.getHeight() - margin){
          col++; if(col >= cols){ doc.addPage(); col=0; y=startY; } else { y=startY; }
          x = margin + col*colW;
        }
        doc.setFont("courier","normal"); doc.setFontSize(9); doc.setTextColor(15,23,42);
        doc.text(s, x, y);
        y += rowH;
      });

      doc.setFontSize(7); doc.setTextColor(71,85,105);
      doc.text("Page 2 of ApprovalRequest-"+ticket.ticketNo+".pdf  |  Generated by AssetTrack", margin, doc.internal.pageSize.getHeight()-10);
    }

    doc.save("ApprovalRequest-"+ticket.ticketNo+".pdf");
  }

  function saveAndClose(){
    const resolved = getResolved();
    const finalAssets = buildFinalAssets(resolved);
    if(needsApproval){
      generateApprovalPdf(resolved);
      const email = ticket.requestor||"";
      if(email){
        const unlinkedMissing = resolved.missing.filter(function(m){ return !m.linkedTo; });
        const unlinkedExtra   = resolved.extra.filter(function(e){ return !e.linkedTo; });
        const corrections     = resolved.missing.filter(function(m){ return m.linkedTo; }).length + resolved.partial.length;
        const subject = encodeURIComponent("IT Asset Disposal Approval Required - Ticket "+ticket.ticketNo);
        const body = encodeURIComponent(
          "Hello,\n\nYour IT asset disposal pickup for ticket "+ticket.ticketNo+" has been completed. The attached CSV lists items that require your approval.\n\n"+
          (unlinkedMissing.length ? "  - "+unlinkedMissing.length+" item(s) not picked up\n" : "")+
          (unlinkedExtra.length   ? "  - "+unlinkedExtra.length+" item(s) picked up but not on your submitted list\n" : "")+
          (corrections            ? "  - "+corrections+" proposed serial number correction(s)\n" : "")+
          "\nPlease reply with your approval or denial of each item, and attach the completed CSV.\n\nThank you,\nIT Asset Disposal Team"
        );
        window.location.href = "mailto:"+email+"?subject="+subject+"&body="+body;
      }
      onSave({...ticket, pickupScanned:true, pickupScanList:scanned, pickupResult:{...resolved, waived:Array.from(waived)}, assets:finalAssets, approvalStatus:"awaiting-approval", approvalSentAt:new Date().toLocaleString()});
    } else {
      onSave({...ticket, pickupScanned:true, pickupScanList:scanned, pickupResult:{...resolved, waived:Array.from(waived)}, assets:finalAssets, approvalStatus:undefined});
    }
    onBack();
  }

  const resolved = getResolved();
  // With new model: no per-item decisions needed — can always save once compared
  const canSave = !!result;
  // Approval needed if any unlinked missing, unlinked extra, or partial/linked corrections exist
  const needsApproval = result && (
    result.missing.some(function(m){ return !links[m.id]; }) ||
    result.extra.some(function(e){ return !links[e.id]; }) ||
    result.partial.length > 0 ||
    Object.keys(links).length > 0
  );
  const unresolvedCount = 0; // kept for compat — no per-item decisions in new model

  return (
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,fontFamily:"inherit",marginBottom:16,padding:0}}>← Back to Ticket List</button>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4,flexWrap:"wrap"}}>
        <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:18,color:"#f1f5f9"}}>Pickup Scan — {ticket.ticketNo}</div>
        {ticket.site && <span style={{fontSize:12,color:"#64748b"}}>📍 {ticket.site}</span>}
      </div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>Scan each physical asset. When done, run the comparison to see what matches, is missing, or is extra.</div>

      {/* Normal scan UI */}
      {(
      <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"18px 22px",marginBottom:16}}>
        <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:10}}>Scan Assets</div>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <input ref={inputRef} value={input} onChange={function(e){ setInput(e.target.value); }}
            onKeyDown={function(e){ if(e.key==="Enter") addScan(input); }}
            onPaste={handlePaste}
            onFocus={function(){ setFocus(true); }} onBlur={function(){ setFocus(false); }}
            placeholder="Scan or paste serials from Excel..."
            style={{flex:1,background:"#0f172a",border:`2px solid ${focus?"#3b82f6":"#334155"}`,borderRadius:8,color:"#f1f5f9",padding:"11px 14px",fontSize:14,fontFamily:"inherit",letterSpacing:1,transition:"border-color 0.2s"}}/>
          <button onClick={function(){ addScan(input); }} style={{background:"linear-gradient(135deg,#1d4ed8,#0284c7)",color:"#fff",border:"none",borderRadius:8,padding:"11px 20px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Add</button>
        </div>
        {flash && <div style={{padding:"7px 12px",borderRadius:6,fontSize:13,background:flash.dup?"#450a0a":"#052e16",color:flash.dup?"#fca5a5":"#86efac",border:`1px solid ${flash.dup?"#7f1d1d":"#166534"}`}}>
          {flash.multi ? `✓ ${flash.serial}` : flash.dup ? `⚠ Already scanned: ${flash.serial}` : `✓ Scanned: ${flash.serial}`}
        </div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
          <span style={{fontSize:12,color:"#64748b"}}>{scanned.length} scanned · {expected.length} expected</span>
          <button onClick={runComparison} disabled={!scanned.length} style={{background:scanned.length?"linear-gradient(135deg,#7c3aed,#1d4ed8)":"#0f172a",color:scanned.length?"#fff":"#475569",border:"none",borderRadius:7,padding:"9px 20px",cursor:scanned.length?"pointer":"not-allowed",fontSize:13,fontFamily:"inherit",fontWeight:500}}>
            Compare vs Expected →
          </button>
        </div>
      </div>
      )} {/* end !directPickup scan block */}

      {/* Expected serials preview — live status updates as you scan */}
      {!result && !directPickup && (
        <details open style={{marginBottom:16}}>
          <summary style={{cursor:"pointer",fontSize:12,color:"#94a3b8",padding:"10px 0",userSelect:"none",display:"flex",alignItems:"center",gap:8,listStyle:"none"}}>
            <span style={{fontSize:13}}>▾</span>
            <span style={{fontFamily:"'Geist',sans-serif",fontWeight:700,color:"#e2e8f0"}}>Expected Serials</span>
            <span style={{color:"#475569"}}>({expected.length})</span>
            <span style={{marginLeft:"auto",fontSize:11,display:"flex",gap:12,alignItems:"center"}}>
              {waived.size>0 && <span style={{color:"#a78bfa"}}>⊘ {waived.size} waived</span>}
              <span style={{color:"#86efac"}}>{scanned.filter(function(s){ return expected.some(function(a){ return a.serial===s; }); }).length} / {expected.length - waived.size} scanned</span>
            </span>
          </summary>
          <div style={{background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",marginTop:6,overflowY:"auto",maxHeight:320}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{borderBottom:"1px solid #1e293b",position:"sticky",top:0,background:"#0f172a"}}>
                  <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500,fontSize:11}}>Serial</th>
                  <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500,fontSize:11}}>Manufacturer</th>
                  <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500,fontSize:11}}>Type</th>
                  <th style={{textAlign:"left",padding:"8px 12px",color:"#475569",fontWeight:500,fontSize:11}}>Asset Tag</th>
                  <th style={{textAlign:"right",padding:"8px 12px",color:"#475569",fontWeight:500,fontSize:11}}>Status</th>
                </tr>
              </thead>
              <tbody>
                {expected.map(function(a){
                  const isScanned = scanned.includes(a.serial);
                  const isWaived  = waived.has(a.serial);
                  const rowBg = isWaived ? "#1a0a2e44" : isScanned ? "#052e1688" : "transparent";
                  const serialColor = isWaived ? "#4c1d95" : isScanned ? "#86efac" : "#e2e8f0";
                  const textDeco = (isWaived || isScanned) ? "line-through" : "none";
                  return (
                    <tr key={a.serial} style={{borderBottom:"1px solid #0f172a",background:rowBg,transition:"background 0.2s",opacity:isWaived?0.5:1}}>
                      <td style={{padding:"8px 12px",fontFamily:"'Geist Mono',monospace",letterSpacing:0.8,fontSize:12,textDecoration:textDeco}}>
                        <span style={{color:a.duplicate&&!isWaived&&!isScanned?"#fde047":serialColor}}>{a.serial}</span>
                        {a.duplicate&&<span style={{marginLeft:7,fontSize:10,color:"#a16207",background:"#422006",border:"1px solid #a16207",borderRadius:4,padding:"1px 5px"}}>dup</span>}
                      </td>
                      <td style={{padding:"8px 12px",color:"#64748b",fontSize:11}}>{a.manufacturer||"—"}</td>
                      <td style={{padding:"8px 12px",color:"#64748b",fontSize:11}}>{a.machineType||"—"}</td>
                      <td style={{padding:"8px 12px",color:"#7dd3fc",fontSize:11}}>{a.ouInventory||"—"}</td>
                      <td style={{padding:"8px 12px",textAlign:"right",whiteSpace:"nowrap"}}>
                        {isWaived ? (
                          <React.Fragment>
                            <span style={{color:"#7c3aed",fontSize:10,marginRight:8}}>⊘ Waived</span>
                            <button onClick={function(){ toggleWaive(a.serial); }} style={{background:"#2e1065",color:"#c4b5fd",border:"1px solid #7c3aed",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>Restore</button>
                          </React.Fragment>
                        ) : isScanned ? (
                          <span style={{color:"#86efac",fontSize:11}}>✓ Scanned</span>
                        ) : (
                          <React.Fragment>
                            <span style={{color:"#475569",fontSize:11,marginRight:8}}>Pending</span>
                            <button onClick={function(){ toggleWaive(a.serial); }} style={{background:"#0f172a",color:"#64748b",border:"1px solid #334155",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:10,fontFamily:"inherit"}} title="Mark as Waived — will not count as missing">Waive</button>
                          </React.Fragment>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </details>
      )}

      {scanned.length>0 && !result && (
        <details style={{marginBottom:16}}>
          <summary style={{cursor:"pointer",fontSize:12,color:"#64748b",padding:"8px 0",userSelect:"none"}}>▸ View {scanned.length} scanned serial{scanned.length!==1?"s":""}</summary>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginTop:8}}>
            <tbody>
              {scanned.map(function(s,i){
                return (
                  <tr key={s} style={{borderBottom:"1px solid #1e293b"}}>
                    <td style={{padding:"7px 12px",color:"#475569",width:36}}>{scanned.length-i}</td>
                    <td style={{padding:"7px 12px",color:"#e2e8f0",letterSpacing:1}}>{s}</td>
                    <td style={{padding:"7px 12px"}}><button className="del-btn" onClick={function(){ removeScan(s); }} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16}}>×</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </details>
      )}

      {result && (
        <div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${(result.waived&&result.waived.length>0)?5:4},1fr)`,gap:10,marginBottom:20}}>
            {[
              {label:"Matched",     count:result.matched.length, color:"#6ee7b7",bg:"#052e16"},
              {label:"Missing",     count:result.missing.filter(function(m){ return !links[m.id]; }).length, color:"#fca5a5",bg:"#450a0a"},
              {label:"Extra",       count:result.extra.filter(function(e){ return !links[e.id]; }).length,   color:"#fde047",bg:"#422006"},
              {label:"Corrections", count:result.partial.length + Object.keys(links).filter(function(k){ return result.missing.some(function(m){ return m.id===k; }); }).length, color:"#a78bfa",bg:"#2e1065"},
              ...((result.waived&&result.waived.length>0)?[{label:"Waived",count:result.waived.length,color:"#c4b5fd",bg:"#1a0a2e"}]:[]),
            ].map(function({label,count,color,bg}){
              return (
                <div key={label} style={{background:bg,borderRadius:10,padding:"14px",textAlign:"center",border:`1px solid ${color}33`}}>
                  <div style={{fontFamily:"'Geist',sans-serif",fontSize:28,fontWeight:800,color}}>{count}</div>
                  <div style={{fontSize:10,color,textTransform:"uppercase",letterSpacing:0.8,marginTop:2}}>{label}</div>
                </div>
              );
            })}
          </div>

          {/* Linking mode banner */}
          {linkingId && (
            <div style={{padding:"12px 18px",borderRadius:8,background:"#1e3a5f",border:"1px solid #3b82f6",color:"#93c5fd",fontSize:13,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>🔗 Select an <strong>Extra</strong> item below to link with <strong style={{fontFamily:"'Geist Mono',monospace",letterSpacing:1}}>{result.missing.find(function(m){ return m.id===linkingId; }) && result.missing.find(function(m){ return m.id===linkingId; }).serial}</strong></span>
              <button onClick={function(){ setLinkingId(null); }} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:16}}>✕ Cancel</button>
            </div>
          )}

          {result.matched.length>0 && (
            <ResultSection title={"✅ Matched ("+result.matched.length+")"} color="#6ee7b7" defaultOpen={false}>
              {result.matched.map(function(item){ return <ResultRow key={item.id} left={item.serial} right={<Pill type="matched"/>} info={item}/>; })}
            </ResultSection>
          )}

          {result.partial.length>0 && (
            <ResultSection title={"🔧 Proposed Corrections — Auto-detected ("+result.partial.length+")"} color="#a78bfa" defaultOpen={true}>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>Scanned serial is close but not identical to expected. The scanned version will be used as correct. These will be sent to the requestor for approval.</div>
              {result.partial.map(function(item){
                return (
                  <div key={item.id} style={{background:"#1e1040",border:"1px solid #a78bfa44",borderRadius:8,padding:"12px 16px",marginBottom:8}}>
                    <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,color:"#94a3b8",marginBottom:3,textTransform:"uppercase",letterSpacing:0.7}}>Expected (ticket)</div>
                        <div style={{fontFamily:"'Geist Mono',monospace",fontSize:14,color:"#fca5a5",letterSpacing:1.2,textDecoration:"line-through"}}>{item.expectedSerial}</div>
                      </div>
                      <div style={{color:"#6d28d9",fontSize:18}}>→</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,color:"#94a3b8",marginBottom:3,textTransform:"uppercase",letterSpacing:0.7}}>Scanned (correct)</div>
                        <div style={{fontFamily:"'Geist Mono',monospace",fontSize:14,color:"#86efac",letterSpacing:1.2}}>{item.scannedSerial}</div>
                      </div>
                      <div style={{fontSize:11,color:"#a78bfa"}}>{item.distance} char{item.distance!==1?"s":""} apart</div>
                    </div>
                  </div>
                );
              })}
            </ResultSection>
          )}

          {result.missing.length>0 && (
            <ResultSection title={"❌ Missing ("+result.missing.filter(function(m){ return !links[m.id]; }).length+" unlinked, "+result.missing.filter(function(m){ return links[m.id]; }).length+" linked) — On ticket, not scanned"} color="#fca5a5" defaultOpen={true}>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>Link a missing item to an extra if you believe they are the same device with a typo. Unlinked items will be sent to the requestor for approval.</div>
              {result.missing.map(function(item){
                const isLinked = !!links[item.id];
                const linkedExtra = isLinked ? result.extra.find(function(e){ return e.id===links[item.id]; }) : null;
                const isLinking = linkingId===item.id;
                return (
                  <div key={item.id} style={{background:isLinked?"#0a1f0a":isLinking?"#0c1a2e":"#200a0a",border:"1px solid "+(isLinked?"#166534":isLinking?"#3b82f6":"#fca5a544"),borderRadius:8,padding:"12px 16px",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                      <div style={{flex:1}}>
                        <div style={{fontFamily:"'Geist Mono',monospace",fontSize:14,color:isLinked?"#86efac":"#e2e8f0",letterSpacing:1.2,textDecoration:isLinked?"line-through":"none"}}>{item.serial}</div>
                        {(item.manufacturer||item.machineType) && (
                          <div style={{display:"flex",gap:10,marginTop:4,flexWrap:"wrap"}}>
                            {item.manufacturer && <span style={{fontSize:10,color:"#64748b"}}>🏭 {item.manufacturer}</span>}
                            {item.machineType  && <span style={{fontSize:10,color:"#64748b"}}>🖥 {item.machineType}</span>}
                            {item.ouInventory  && <span style={{fontSize:10,color:"#7dd3fc"}}>🏷 {item.ouInventory}</span>}
                          </div>
                        )}
                      </div>
                      {isLinked ? (
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{fontSize:12,color:"#86efac"}}>🔗 Linked to <span style={{fontFamily:"'Geist Mono',monospace",letterSpacing:1}}>{linkedExtra && linkedExtra.serial}</span></div>
                          <button onClick={function(){ unlink(item.id); }} style={{background:"none",border:"1px solid #475569",borderRadius:6,color:"#94a3b8",cursor:"pointer",fontSize:11,padding:"4px 10px",fontFamily:"inherit"}}>Unlink</button>
                        </div>
                      ) : (
                        <button onClick={function(){ setLinkingId(isLinking?null:item.id); }} style={{background:isLinking?"#1d4ed8":"#0f172a",border:"1px solid "+(isLinking?"#3b82f6":"#334155"),borderRadius:6,color:isLinking?"#fff":"#93c5fd",cursor:"pointer",fontSize:12,padding:"7px 14px",fontFamily:"inherit",fontWeight:500}}>
                          {isLinking ? "× Cancel Link" : "🔗 Link to Extra"}
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </ResultSection>
          )}

          {result.extra.length>0 && (
            <ResultSection title={"⚠ Extra ("+result.extra.filter(function(e){ return !links[e.id]; }).length+" unlinked, "+result.extra.filter(function(e){ return links[e.id]; }).length+" linked) — Scanned, not on ticket"} color="#fde047" defaultOpen={true}>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>{linkingId ? "👆 Click 'Link here' on the extra that matches the highlighted missing item." : "Unlinked extras will be sent to the requestor for approval. Link to a missing item if it's a serial number typo."}</div>
              {result.extra.map(function(item){
                const isLinked = !!links[item.id];
                const linkedMissing = isLinked ? result.missing.find(function(m){ return m.id===links[item.id]; }) : null;
                return (
                  <div key={item.id} style={{background:isLinked?"#0a1f0a":"#1a1200",border:"1px solid "+(isLinked?"#166534":linkingId&&!isLinked?"#f59e0b":"#fde04744"),borderRadius:8,padding:"12px 16px",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                      <div style={{flex:1,fontFamily:"'Geist Mono',monospace",fontSize:14,color:isLinked?"#86efac":"#e2e8f0",letterSpacing:1.2}}>{item.serial}</div>
                      {isLinked ? (
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{fontSize:12,color:"#86efac"}}>🔗 Linked to <span style={{fontFamily:"'Geist Mono',monospace",letterSpacing:1}}>{linkedMissing && linkedMissing.serial}</span></div>
                          <button onClick={function(){ unlink(item.id); }} style={{background:"none",border:"1px solid #475569",borderRadius:6,color:"#94a3b8",cursor:"pointer",fontSize:11,padding:"4px 10px",fontFamily:"inherit"}}>Unlink</button>
                        </div>
                      ) : linkingId ? (
                        <button onClick={function(){ linkPair(linkingId, item.id); }} style={{background:"linear-gradient(135deg,#1e3a5f,#1d4ed8)",border:"1px solid #3b82f6",borderRadius:6,color:"#fff",cursor:"pointer",fontSize:12,padding:"7px 14px",fontFamily:"inherit",fontWeight:600}}>
                          🔗 Link here
                        </button>
                      ) : null}
                    </div>
                  </div>
                );
              })}
            </ResultSection>
          )}

          <div style={{marginTop:20,padding:"14px 18px",borderRadius:8,background:needsApproval?"#1a1200":"#052e16",border:"1px solid "+(needsApproval?"#a16207":"#166534"),marginBottom:16}}>
            {needsApproval ? (
              <div>
                <div style={{color:"#fde047",fontSize:13,fontWeight:500,marginBottom:4}}>⚠ This ticket requires requestor approval</div>
                <div style={{color:"#94a3b8",fontSize:12}}>
                  {result.missing.filter(function(m){ return !links[m.id]; }).length>0 && <span style={{marginRight:16}}>❌ {result.missing.filter(function(m){ return !links[m.id]; }).length} missing</span>}
                  {result.extra.filter(function(e){ return !links[e.id]; }).length>0 && <span style={{marginRight:16}}>⚠ {result.extra.filter(function(e){ return !links[e.id]; }).length} extra</span>}
                  {(result.partial.length + Object.keys(links).filter(function(k){ return result.missing.some(function(m){ return m.id===k; }); }).length)>0 && <span style={{marginRight:16}}>🔧 {result.partial.length + Object.keys(links).filter(function(k){ return result.missing.some(function(m){ return m.id===k; }); }).length} correction(s)</span>}
                </div>
                {!ticket.requestor && <div style={{color:"#f59e0b",fontSize:11,marginTop:6}}>⚠ No requestor email on this ticket — approval email will not be sent automatically.</div>}
              </div>
            ) : (
              <div style={{color:"#86efac",fontSize:13}}>✓ All scanned — no approval required. Ticket will be marked Verified.</div>
            )}
          </div>

          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <button onClick={saveAndClose} style={{background:"linear-gradient(135deg,#065f46,#0284c7)",color:"#fff",border:"none",borderRadius:8,padding:"12px 32px",cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:500}}>
              {needsApproval ? "Save & Send for Approval ✉" : "Save & Close Ticket ✓"}
            </button>
          </div>
        </div>
      )}

      {/* Vendor Direct Pickup — bottom toggle */}
      <div style={{marginTop:24,borderTop:"1px solid #1e293b",paddingTop:18}}>
        <div style={{background:"#1e293b",borderRadius:12,border:"1px solid "+(directPickup?"#a16207":"#334155"),padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:13,fontWeight:500,color:"#e2e8f0"}}>Vendor Direct Pickup</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:2}}>Enable if the vendor picked up this ticket directly without scanning. All expected serials will be marked as confirmed.</div>
          </div>
          <div onClick={function(){ setDirectPickup(function(v){ return !v; }); setResult(null); }}
            style={{position:"relative",width:48,height:26,borderRadius:13,background:directPickup?"#d97706":"#334155",cursor:"pointer",flexShrink:0,transition:"background 0.2s"}}>
            <div style={{position:"absolute",top:3,left:directPickup?26:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}/>
          </div>
        </div>
        {directPickup && (
          <div style={{background:"#1a0f02",border:"2px solid #d97706",borderRadius:12,padding:"20px 24px",marginTop:12,textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:8}}>🚛</div>
            <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:15,color:"#fde047",marginBottom:6}}>Vendor Direct Pickup</div>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>
              All <strong style={{color:"#f1f5f9"}}>{expected.length}</strong> expected serial{expected.length!==1?"s":""} will be marked as confirmed disposed. No approval required.
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:10,flexWrap:"wrap"}}>
              <button onClick={function(){ setDirectPickup(false); }}
                style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,padding:"9px 20px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Cancel</button>
              <button onClick={function(){ if(!confirm("Mark all "+expected.length+" expected serial"+(expected.length!==1?"s":"")+" as vendor-direct pickup and close this ticket?")) return; saveDirectPickup(); }}
                style={{background:"linear-gradient(135deg,#92400e,#d97706)",color:"#fff",border:"none",borderRadius:8,padding:"9px 24px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>
                ✓ Confirm Vendor Direct Pickup
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function decodePickupNo(name){
  var parts = (name||"").split("-");
  var vendor = parts[0]==="01"?"VantagePoint":parts[0]==="02"?"Marrs":parts[0]==="03"?"CDR":null;
  var dateStr = "";
  if(parts[1] && parts[1].length===8){
    var dd=parts[1].slice(0,2), mm=parts[1].slice(2,4), yyyy=parts[1].slice(4,8);
    dateStr = mm+"/"+dd+"/"+yyyy;
  }
  var seq = parts[2] ? parseInt(parts[2],10) : null;
  return {vendor:vendor, dateStr:dateStr, seq:seq};
}

function pickupNoInput(value, onChange){
  return <input value={value}
    onChange={function(e){
      var raw = e.target.value.replace(/[^0-9]/g,"");
      var fmt = raw;
      if(raw.length > 2)  fmt = raw.slice(0,2)+"-"+raw.slice(2);
      if(raw.length > 10) fmt = raw.slice(0,2)+"-"+raw.slice(2,10)+"-"+raw.slice(10,12);
      onChange(fmt);
    }}
    placeholder="NN-NNNNNNNN-NN" maxLength={14}
    style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:14,fontFamily:"'Geist Mono',monospace",letterSpacing:1}}/>;
}

var STATUS_META = {
  "scheduled":    {label:"Scheduled",    color:"#93c5fd", bg:"#1e3a5f", border:"#1e40af"},
  "picked-up":    {label:"Picked Up",    color:"#fde047", bg:"#422006", border:"#a16207"},
  "reconciled":   {label:"Reconciled",   color:"#86efac", bg:"#052e16", border:"#166534"},
};

function ShipmentsTab({tickets, setTickets, shipments, setShipments, setVendorReport}){
  const [view, setView]     = useState("list");
  const [editing, setEditing] = useState(null);

  var blankPickup = function(){
    return {
      id:uid(), name:"", vendor:"", location:"",
      createdDate:new Date().toISOString().slice(0,10),
      pickupDate:"", reconcileDate:"",
      status:"scheduled", ticketIds:[]
    };
  };

  function openNew(){ setEditing(blankPickup()); setView("form"); }
  function openEdit(s){ setEditing({...s, ticketIds:[...s.ticketIds]}); setView("form"); }

  function save(s, writeBack){
    setShipments(function(prev){
      var i = prev.findIndex(function(x){ return x.id===s.id; });
      if(i===-1) return [...prev,s];
      var n=[...prev]; n[i]=s; return n;
    });
    if(writeBack) writeBack(setTickets);
    setVendorReport(null);
    setView("list");
  }

  function del(id){
    if(!confirm("Delete this vendor pickup? Ticket assignments will be cleared.")) return;
    var s = shipments.find(function(x){ return x.id===id; });
    if(s){
      setTickets(function(prev){ return prev.map(function(t){
        if(s.ticketIds.includes(t.id) && t.vendorPickupNo===s.name){
          return {...t, vendorPickupNo:""};
        }
        return t;
      }); });
    }
    setShipments(function(prev){ return prev.filter(function(x){ return x.id!==id; }); });
    setVendorReport(null);
  }

  function advanceStatus(s){
    var next = s.status==="scheduled"?"picked-up":s.status==="picked-up"?"reconciled":null;
    if(!next) return;
    var updated = {...s, status:next};
    if(next==="reconciled") updated.reconcileDate = new Date().toISOString().slice(0,10);
    setShipments(function(prev){ return prev.map(function(x){ return x.id===s.id?updated:x; }); });
  }

  if(view==="form") return <VendorPickupForm pickup={editing} tickets={tickets} onSave={save} onCancel={function(){ setView("list"); }}/>;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:18,color:"#f1f5f9"}}>Vendor Pickups</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Track vendor pickup events and the tickets included in each.</div>
        </div>
        <button onClick={openNew} style={{background:"linear-gradient(135deg,#1d4ed8,#0284c7)",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>+ New Vendor Pickup</button>
      </div>

      {shipments.length===0 ? (
        <div style={{textAlign:"center",padding:"60px 20px",border:"1px dashed #334155",borderRadius:12,color:"#475569"}}>
          <div style={{fontSize:40,marginBottom:12}}>🚛</div>
          <div style={{fontSize:14,marginBottom:16}}>No vendor pickups yet.</div>
          <button onClick={openNew} style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,padding:"10px 22px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>+ Create First Vendor Pickup</button>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {shipments.slice().sort(function(a,b){ return (b.createdDate||"").localeCompare(a.createdDate||""); }).map(function(s){
            var sm = STATUS_META[s.status||"scheduled"]||STATUS_META["scheduled"];
            var dec = decodePickupNo(s.name);
            var ticketCount = s.ticketIds.length;
            return (
              <div key={s.id} className="card-hover" style={{background:"#1e293b",borderRadius:12,border:"1px solid "+sm.border,padding:"16px 20px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Geist Mono',monospace",fontWeight:700,fontSize:15,color:"#f1f5f9",letterSpacing:1}}>{s.name||"(no number)"}</span>
                    <span className="pill" style={{background:sm.bg,color:sm.color,border:"1px solid "+sm.border}}>{sm.label}</span>
                    <span className="pill" style={{background:"#1e293b",color:"#93c5fd",border:"1px solid #1e40af"}}>{ticketCount} ticket{ticketCount!==1?"s":""}</span>
                  </div>
                  <div style={{fontSize:11,color:"#64748b",display:"flex",gap:14,flexWrap:"wrap"}}>
                    {dec.vendor && <span>🏢 {dec.vendor}</span>}
                    {s.location && <span>📍 {s.location}</span>}
                    {s.pickupDate && <span>🚛 Picked up {fmtDate(s.pickupDate)}</span>}
                    {s.reconcileDate && <span>✓ Reconciled {fmtDate(s.reconcileDate)}</span>}
                    {!s.pickupDate && s.createdDate && <span>📅 Created {fmtDate(s.createdDate)}</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {s.status!=="reconciled" && (
                    <button onClick={function(){ advanceStatus(s); }} style={{background:"#0f172a",color:sm.color,border:"1px solid "+sm.border,borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500}}>
                      {s.status==="scheduled"?"Mark Picked Up ▸":"Mark Reconciled ▸"}
                    </button>
                  )}
                  <button onClick={function(){ openEdit(s); }} style={{background:"#0f172a",color:"#93c5fd",border:"1px solid #1e3a5f",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Edit</button>
                  <button onClick={function(){ del(s.id); }} style={{background:"#0f172a",color:"#ef4444",border:"1px solid #450a0a",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function VendorPickupForm({pickup, tickets, onSave, onCancel}){
  var isNew = !pickup.name;
  const [form, setForm] = useState(function(){
    var f = {...pickup, ticketIds:[...pickup.ticketIds]};
    // Auto-select tickets matching this pickup number
    if(f.name && /^[0-9]{2}-[0-9]{8}-[0-9]{2}$/.test(f.name)){
      tickets.filter(function(t){ return (t.vendorPickupNo||"")===f.name && !f.ticketIds.includes(t.id); })
        .forEach(function(t){ f.ticketIds.push(t.id); });
    }
    return f;
  });
  const [ticketSearch, setTicketSearch] = useState("");
  function setF(k,v){ setForm(function(f){ return {...f,[k]:v}; }); }

  function handleNameChange(fmt){
    setForm(function(f){
      var nf = {...f, name:fmt};
      var dec = decodePickupNo(fmt);
      if(dec.vendor) nf.vendor = dec.vendor;
      if(/^[0-9]{2}-[0-9]{8}-[0-9]{2}$/.test(fmt)){
        tickets.filter(function(t){ return (t.vendorPickupNo||"")===fmt && !nf.ticketIds.includes(t.id); })
          .forEach(function(t){ nf.ticketIds.push(t.id); });
      }
      return nf;
    });
  }

  function toggle(id){
    setForm(function(f){
      var ids = f.ticketIds.includes(id)
        ? f.ticketIds.filter(function(x){ return x!==id; })
        : [...f.ticketIds, id];
      return {...f, ticketIds:ids};
    });
  }

  function handleSave(){
    if(!form.name.trim()){ alert("Please enter a vendor pickup number."); return; }
    var valid = /^[0-9]{2}-[0-9]{8}-[0-9]{2}$/.test(form.name.trim());
    if(!valid){ alert("Vendor pickup number must be in the format NN-NNNNNNNN-NN\n\nExample: 01-11032026-01"); return; }
    onSave(form, function(setTickets){
      setTickets(function(prev){ return prev.map(function(t){
        if(form.ticketIds.includes(t.id) && !t.vendorPickupNo){
          return {...t, vendorPickupNo: form.name};
        }
        return t;
      }); });
    });
  }

  // Ticket tiers: matching VP# (pre-checked), then unassigned (unchecked), hide others
  var allShipmentTicketIds = new Set(
    tickets.filter(function(t){ return t.vendorPickupNo && t.vendorPickupNo!==form.name; })
      .map(function(t){ return t.id; })
  );

  function sortDesc(arr){ return arr.slice().sort(function(a,b){ return String(b.ticketNo).localeCompare(String(a.ticketNo),undefined,{numeric:true}); }); }
  var tier1 = sortDesc(tickets.filter(function(t){ return (t.vendorPickupNo||"")===form.name && form.name; }));
  var tier2 = sortDesc(tickets.filter(function(t){ return !t.vendorPickupNo && !allShipmentTicketIds.has(t.id) && !(form.name && (t.vendorPickupNo||"")===form.name); }));

  function applySearch(list){
    var q = ticketSearch.trim().toLowerCase();
    if(!q) return list;
    return list.filter(function(t){
      return (t.ticketNo||"").toLowerCase().includes(q)
        || (t.site||"").toLowerCase().includes(q)
        || (t.requestor||"").toLowerCase().includes(q);
    });
  }

  var filteredTier1 = applySearch(tier1);
  var filteredTier2 = applySearch(tier2);
  var dec = decodePickupNo(form.name);

  function TicketRow(t, autoMatched){
    var sel = form.ticketIds.includes(t.id);
    var ps = pickupStatus(t);
    var statusPill = ps==="verified"
      ? <span className="pill" style={{background:"#052e16",color:"#86efac",border:"1px solid #166534"}}>✓ Verified</span>
      : ps==="awaiting-approval"
      ? <span className="pill" style={{background:"#3b1f02",color:"#fb923c",border:"1px solid #c2410c"}}>⏳ Awaiting Approval</span>
      : <span className="pill" style={{background:"#1e293b",color:"#64748b",border:"1px solid #334155"}}>Scan Pending</span>;
    return (
      <div key={t.id} onClick={function(){ toggle(t.id); }} style={{background:sel?"#0f2e4a":"#1e293b",border:"2px solid "+(sel?"#3b82f6":"#334155"),borderRadius:10,padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.15s"}}>
        <div style={{width:20,height:20,borderRadius:4,flexShrink:0,background:sel?"#3b82f6":"#0f172a",border:"2px solid "+(sel?"#3b82f6":"#475569"),display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12}}>{sel?"✓":""}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{color:"#f1f5f9",fontWeight:500}}>#{t.ticketNo}</span>
            {statusPill}
            <span className="pill" style={{background:"#1e3a5f",color:"#93c5fd",border:"1px solid #1e40af"}}>{(t.expectedAssets||[]).length} expected</span>
            {autoMatched && <span style={{fontSize:11,color:"#86efac"}}>✓ Auto-matched</span>}
          </div>
          <div style={{fontSize:11,color:"#64748b",marginTop:3,display:"flex",gap:12,flexWrap:"wrap"}}>
            {t.date && <span>📅 {fmtDate(t.date)}</span>}
            {t.site && <span>📍 {t.site}</span>}
            {t.requestor && <span>✉ {t.requestor}</span>}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <button onClick={onCancel} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,fontFamily:"inherit",marginBottom:16,padding:0}}>← Back to Vendor Pickups</button>

  if(selectedId && selected){

      shipments={shipments}
      setShipments={setShipments}

      setTab={setTab}
      onBack={function(){ setSelectedId(null); }}

  return (
    <div>

      {shipments.length===0 ? (
        <div style={{textAlign:"center",padding:"60px 20px",border:"1px dashed #334155",borderRadius:12,color:"#475569"}}>
