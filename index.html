function ReconcilePickup({pickup, tickets, shipments, setShipments, setVendorReport, setTab, onBack, readOnly, discrepancies, onTrackExtra}){
  const fileRef = useRef();
  const [vendorData, setVendorData]     = useState(null);
  const [vendorFileName, setVendorFileName] = useState(pickup.auditFileName||"");
  const [poNumber, setPoNumber]         = useState((pickup.codd&&pickup.codd.certPO)||pickup.auditPo||"");
  const [report, setReport]             = useState(pickup.reconcileReport||null);
  const [waivedSerials, setWaivedSerials]   = useState(function(){
    return new Set((pickup.reconcileReport&&pickup.reconcileReport.waivedSerials)||[]);
  });
  const [expandedTickets, setExpandedTickets] = useState({});

  // -- CoDD panel (custody BUILD 2). The certificate PDF is NEVER stored:
  // we capture metadata + the exact filename (via a picker that reads
  // nothing) and an optional fileUrl pointer for the future SharePoint /
  // records home. Attaching writes pickup.codd through the setShipments
  // prop (= the saveShipments wrapper), which emits the codd-attached
  // custody event via detectShipmentCustody - no separate emission here.
  const coddFileRef = useRef();
  const [coddEditing, setCoddEditing]   = useState(false);
  const [coddPO, setCoddPO]             = useState("");
  const [coddDate, setCoddDate]         = useState("");
  const [coddCertNo, setCoddCertNo]     = useState("");
  const [coddSignedBy, setCoddSignedBy] = useState("");
  const [coddUrl, setCoddUrl]           = useState("");
  const [coddFileName, setCoddFileName] = useState("");
  const coddInputStyle = {width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"9px 12px",fontSize:13,fontFamily:"inherit",boxSizing:"border-box"};
  // Compare POs on the alphanumeric core: strips a leading "PO"/"P.O."
  // prefix, punctuation and spaces, so "P.O. 2737" == "PO#2737" == "2737".
  function normPO(p){ return String(p||"").toUpperCase().replace(/^P\.?O\.?\s*#?\s*/,"").replace(/[^A-Z0-9]/g,""); }
  function openCoddEditor(){
    var cd = pickup.codd||{};
    setCoddPO(cd.certPO||""); setCoddDate(cd.destructionDate||"");
    setCoddCertNo(cd.certNo||""); setCoddSignedBy(cd.signedBy||"");
    setCoddUrl(cd.fileUrl||""); setCoddFileName(cd.fileName||"");
    setCoddEditing(true);
  }
  function pickCoddFile(e){
    var f = e.target.files[0]; if(!f) return;
    e.target.value = "";
    setCoddFileName(f.name); // filename only - the file is never read
  }
  function attachCodd(){
    var po = (coddPO||"").trim();
    var dd = (coddDate||"").trim();
    if(!po){ alert("Enter the PO number printed on the certificate - it is the join key to this pickup."); return; }
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dd)){ alert("Enter the certificate's Date of destruction."); return; }
    var shipRef = pickup.vendorPO || pickup.auditPo || "";
    var mismatch = !!shipRef && normPO(shipRef)!==normPO(po);
    if(mismatch && !confirm("Certificate PO \""+po+"\" does not match this pickup's vendor reference \""+shipRef+"\".\n\nAttach anyway? The mismatch will be recorded in the custody log.")) return;
    var codd = {
      certPO: po, destructionDate: dd,
      certNo: (coddCertNo||"").trim(), signedBy: (coddSignedBy||"").trim(),
      fileName: coddFileName||"", fileUrl: (coddUrl||"").trim(),
      attachedAt: new Date().toISOString(),
      note: mismatch ? ("PO mismatch vs pickup reference "+shipRef) : ""
    };
    var updated = {...pickup, codd:codd};
    if(!shipRef) updated.vendorPO = po; // backfill an empty vendor reference from the cert
    setShipments(function(prev){ return prev.map(function(x){ return x.id===pickup.id ? updated : x; }); });
    if(!vendorFileName) setPoNumber(po); // pre-seed the audit PO from the cert until a file sets it
    setCoddEditing(false);
  }

  function exportIndividualPDFs(){
    var jspdf = window.jspdf || window.jsPDF;
    if(!jspdf){ alert("PDF library not loaded."); return; }
    if(!report) return;

    var waivedSet = waivedSerials;
    var matched          = report.matched           || [];
    var tagMismatch      = report.tagMismatch       || [];
    var missingFromVendor= report.missingFromVendor || [];
    var extraFromVendor  = report.extraFromVendor   || [];
    var placeholders     = report.placeholders      || [];

    var STATUS_COLORS = {
      matched:     [220,252,231], tagMismatch: [254,249,195],
      missing:     [254,226,226], waived:      [241,245,249],
      extra:       [219,234,254], placeholder: [237,233,254],
    };
    var STATUS_LABELS = {
      matched:"Matched", tagMismatch:"Tag Mismatch", missing:"Missing from Vendor",
      waived:"Waived", extra:"Extra from Vendor", placeholder:"Placeholder",
    };

    function buildTicketPDF(t){
      var doc = new jspdf.jsPDF({orientation:"landscape", unit:"pt", format:"letter"});
      var pageW = doc.internal.pageSize.getWidth();
      var margin = 36;

      doc.setFillColor(15,23,42); doc.rect(0,0,pageW,64,"F");
      doc.setFont("helvetica","bold"); doc.setFontSize(15); doc.setTextColor(241,245,249);
      doc.text("IT Asset Disposal Reconciliation Report", margin, 24);
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
      doc.text("Ticket #: "+t.ticketNo+"   |   Requestor: "+(t.requestor||"—")+"   |   Site: "+(t.site||"—")+"   |   Vendor Pickup: "+pickup.name+"   |   "+report.generatedAt, margin, 42);
      doc.text("Report Date: "+new Date().toLocaleDateString()+"   |   PO #: "+(report.poNumber||"—"), margin, 56);

      var lx = margin; var ly = 78;
      [{label:"Matched",r:220,g:252,b:231},{label:"Tag Mismatch",r:254,g:249,b:195},{label:"Missing from Vendor",r:254,g:226,b:226},{label:"Extra from Vendor",r:219,g:234,b:254},{label:"Placeholder",r:237,g:233,b:254}].forEach(function(li){
        doc.setFillColor(li.r,li.g,li.b); doc.roundedRect(lx,ly,10,10,2,2,"F");
        doc.setTextColor(71,85,105); doc.setFontSize(8);
        doc.text(li.label, lx+13, ly+8);
        lx += doc.getTextWidth(li.label)+26;
      });

      var ticketMatched     = matched.filter(function(x){ return x.ticketNo===t.ticketNo; });
      var ticketTagMismatch = tagMismatch.filter(function(x){ return x.ticketNo===t.ticketNo; });
      var ticketMissing     = missingFromVendor.filter(function(x){ return x.ticketNo===t.ticketNo && !waivedSet.has(x.serial); });
      var ticketWaived      = missingFromVendor.filter(function(x){ return x.ticketNo===t.ticketNo && waivedSet.has(x.serial); });

      var bodyRows = []; var rowStyles = {}; var idx = 0;
      function addRows(items, statusKey){
        items.forEach(function(item){
          var c = STATUS_COLORS[statusKey];
          var isExtra   = statusKey==="extra"||statusKey==="placeholder";
          var isMissing = statusKey==="missing"||statusKey==="waived";
          bodyRows.push([
            STATUS_LABELS[statusKey],
            isExtra   ? "—" : (item.serial||""),
            isMissing ? "—" : (item.vendorSerial||item.serial||""),
            item.manufacturer||item.vendorMfgr||item.mfgr||"",
            item.machineType||item.vendorDesc||item.desc||"",
            (item.ouInventory||"").trim()||"",
            item.vendorTag ? item.vendorTag.replace(/NO ASSET TAG\s*/i,"").trim() : (item.tag ? item.tag.replace(/NO ASSET TAG\s*/i,"").trim() : ""),
          ]);
          rowStyles[idx++] = {fillColor:c};
        });
      }

      addRows(ticketMatched,    "matched");
      addRows(ticketTagMismatch,"tagMismatch");
      addRows(ticketMissing,    "missing");
      addRows(ticketWaived,     "waived");
      addRows(placeholders,     "placeholder");
      addRows(extraFromVendor,  "extra");

      var summaryY = 95;
      var counts = [
        {label:"Matched",       count:ticketMatched.length,     color:[22,101,52]},
        {label:"Tag Mismatch",  count:ticketTagMismatch.length, color:[113,63,18]},
        {label:"Missing",       count:ticketMissing.length,     color:[127,29,29]},
        {label:"Waived",        count:ticketWaived.length,      color:[109,40,217]},
        {label:"Extra (shared)",count:extraFromVendor.length,   color:[30,64,175]},
        {label:"Placeholders",  count:placeholders.length,      color:[76,29,149]},
      ].filter(function(x){ return x.count>0; });

      var sw=90; var sx=margin;
      counts.forEach(function(c){
        doc.setFillColor(245,247,250); doc.roundedRect(sx,summaryY,sw,32,4,4,"F");
        doc.setFont("helvetica","bold"); doc.setFontSize(16); doc.setTextColor(c.color[0],c.color[1],c.color[2]);
        doc.text(String(c.count), sx+sw/2, summaryY+16, {align:"center"});
        doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(100,116,139);
        doc.text(c.label, sx+sw/2, summaryY+27, {align:"center"});
        sx += sw+8;
      });

      doc.autoTable({
        startY:summaryY+44, margin:{left:margin,right:margin},
        head:[[
          {content:"Status",styles:{cellWidth:76}},
          {content:"Our Serial",styles:{cellWidth:96,textColor:[147,197,253]}},
          {content:"Vendor Serial",styles:{cellWidth:96,textColor:[167,139,250]}},
          {content:"Manufacturer",styles:{cellWidth:72}},
          {content:"Machine Type",styles:{cellWidth:88}},
          {content:"Our Asset Tag",styles:{cellWidth:70}},
          {content:"Vendor Asset Tag",styles:{cellWidth:70}},
        ]],
        body:bodyRows, theme:"grid",
        headStyles:{fillColor:[30,41,59],textColor:[241,245,249],fontSize:8,fontStyle:"bold",cellPadding:5},
        bodyStyles:{fontSize:8,cellPadding:5,textColor:[15,23,42]},
        styles:{overflow:"linebreak"},
        didParseCell:function(data){ if(data.section==="body"&&rowStyles[data.row.index]) data.cell.styles.fillColor=rowStyles[data.row.index].fillColor; },
      });

      var footY = doc.lastAutoTable.finalY+20;
      doc.setFontSize(7); doc.setTextColor(148,163,184);
      doc.text("Generated by AssetTrack  |  Vendor Pickup: "+pickup.name+"  |  "+report.generatedAt, margin, footY);
      doc.save("Reconciliation-"+t.ticketNo+".pdf");
    }

    var pickupTickets = pickup.ticketIds.map(function(tid){ return tickets.find(function(t){ return t.id===tid; }); }).filter(Boolean);
    pickupTickets.forEach(function(t, i){
      setTimeout(function(){ buildTicketPDF(t); }, i*800);
    });
  }

  function toggleWaive(serial){
    setWaivedSerials(function(prev){
      var next = new Set(prev);
      if(next.has(serial)) next.delete(serial); else next.add(serial);
      return next;
    });
  }

  // All assets from all tickets in this pickup.
  // Use ticket.assets (post-scan ground truth) when available; fall back to expectedAssets for unscanned tickets.
  // Pickup-scan waived serials are excluded.
  const ourAssets = useMemo(function(){
    var seen = new Set();
    var pool = [];
    pickup.ticketIds.forEach(function(tid){
      var t = tickets.find(function(x){ return x.id===tid; });
      if(!t) return;
      var waived = new Set((t.pickupResult && t.pickupResult.waived)||[]);
      var sourceList = (t.pickupScanned && (t.assets||[]).length > 0)
        ? t.assets          // scanned — use verified/corrected list
        : t.expectedAssets; // not yet scanned — use expected list
      (sourceList||[]).forEach(function(a){
        if(!a.serial) return;
        if(waived.has(a.serial)) return; // exclude waived items
        if(seen.has(a.serial)) return;
        seen.add(a.serial);
        // Carry over metadata — assets may have fewer fields than expectedAssets
        var meta = (t.expectedAssets||[]).find(function(e){ return e.serial===a.serial; }) || {};
        pool.push({
          serial:       a.serial,
          manufacturer: a.manufacturer || meta.manufacturer || "",
          machineType:  a.machineType  || meta.machineType  || "",
          ouInventory:  a.ouInventory  || meta.ouInventory  || "",
          addedAt:      a.addedAt      || meta.addedAt      || "",
          source:       a.source       || "expected",
          ticketNo:     t.ticketNo,
          ticketId:     t.id,
          site:         t.site||"",
        });
      });
    });
    return pool;
  }, [pickup, tickets]);

  function handleFile(e){
    var file = e.target.files[0]; if(!file) return;
    e.target.value="";
    // Extract PO and pickup number from filename
    var fnPo = (file.name.match(/P_O__(\d+)/i)||[])[1] || "";
    var fnVp = (file.name.match(/(\d{2}-\d{8}-\d{2})/)||[])[1] || "";
    setVendorFileName(file.name);
    // Filename PO wins when present; otherwise keep the CoDD-seeded / typed
    // PO instead of clobbering it with "".
    setPoNumber(fnPo || (pickup.codd&&pickup.codd.certPO) || poNumber || "");
    setReport(null);

    var reader = new FileReader();
    reader.onload = function(evt){
      try {
        var wb = XLSX.read(evt.target.result, {type:"binary"});
        // Use first sheet with most rows
        var sheetName = wb.SheetNames[0];
        for(var si=1; si<wb.SheetNames.length; si++){
          var ws2 = wb.Sheets[wb.SheetNames[si]];
          var r2 = XLSX.utils.sheet_to_json(ws2,{defval:""});
          if(r2.length > (XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:""}).length)) sheetName = wb.SheetNames[si];
        }
        var ws = wb.Sheets[sheetName];
        var rows = XLSX.utils.sheet_to_json(ws, {defval:""});
        var sampleRow = rows[0] || {};
        var headers = Object.keys(sampleRow);
        // Detect columns by NAME only (no positional fallback). A miss is surfaced
        // in the preview and hard-blocks the run, rather than silently guessing.
        var serialKey = findCol(sampleRow, "Serial Number") || findCol(sampleRow, "Serial") || findCol(sampleRow, SERIAL_COL) || "";
        var tagKey    = findCol(sampleRow, "Asset Tag") || findCol(sampleRow, "Asset") || "";
        setVendorData({rows:rows, po:fnPo, vpNo:fnVp, fileName:file.name, serialKey:serialKey, tagKey:tagKey, headers:headers});
      } catch(err){ alert("Failed to read vendor file: "+err.message); }
    };
    reader.readAsBinaryString(file);
  }

  function runReconciliation(){
    if(!vendorData) return;
    try {
    var rows = vendorData.rows;
    var po   = vendorData.po || poNumber;

    // Find columns — vendor audit uses "Serial Number" and "Asset Tag"
    // Columns were detected by name at upload (handleFile) and shown for confirmation.
    // No positional fallback: if the serial column wasn't found, the Run button never
    // renders; we guard here too in case this path is reached another way.
    var serialKey = vendorData.serialKey || "";
    var tagKey    = vendorData.tagKey || "";
    if(!serialKey){ alert("No serial-number column detected in the vendor audit. Reconciliation blocked - check the file's header row."); return; }

    // Build vendor lookup maps
    var vendorBySerial = {};
    var placeholders = [];
    rows.forEach(function(r){
      var s   = String(r[serialKey]||"").trim().toUpperCase();
      var tag = String(r[tagKey]||"").trim();
      if(!s) return;
      // Placeholder pattern: PO#-digits
      var isPlaceholder = /^\d{3,6}-\d+$/.test(s);
      if(isPlaceholder){
        placeholders.push({serial:s, tag:tag, desc:String(r["Description"]||r["Item Number"]||"").trim(), mfgr:String(r["Mfgr"]||"").trim()});
      } else {
        vendorBySerial[s] = {tag:tag, desc:String(r["Description"]||"").trim(), mfgr:String(r["Mfgr"]||"").trim(), formFactor:String(r["Form Factor"]||"").trim()};
      }
    });

    // Numeric-aware equality: if both values are purely numeric, compare as numbers
    // so leading zeros stripped by Excel ("00832" vs "832") still match
    function flexMatch(a, b){
      if(!a || !b) return false;
      var au = a.toUpperCase(), bu = b.toUpperCase();
      if(au === bu) return true;
      // Both purely numeric? Compare as integers
      if(/^\d+$/.test(au) && /^\d+$/.test(bu)) return parseInt(au,10) === parseInt(bu,10);
      return false;
    }

    // Build a serial lookup that also indexes by numeric value for pure-digit serials
    // (so an Excel-stripped leading zero, "00832" vs "832", still matches). But distinct
    // serials can collapse to the same numeric key; the old code did norm->serial last-wins,
    // which silently dropped a vendor row (one false MISSING + one false EXTRA, no signal).
    // Now: index norm -> [all serials], use the numeric path ONLY when it's unambiguous,
    // and collect collisions so the run can flag them instead of guessing.
    var vendorByNormList = {}; // normalized numeric key -> [original serial keys]
    var serialCollisions = []; // numeric keys claimed by 2+ distinct vendor serials
    Object.keys(vendorBySerial).forEach(function(s){
      if(!/^\d+$/.test(s)) return; // only pure-digit serials normalize
      var norm = String(parseInt(s,10));
      (vendorByNormList[norm] = vendorByNormList[norm] || []).push(s);
    });
    Object.keys(vendorByNormList).forEach(function(norm){
      if(vendorByNormList[norm].length > 1) serialCollisions.push({norm:norm, serials:vendorByNormList[norm].slice()});
    });

    function findVendorRow(serial){
      var su = serial.toUpperCase();
      // 1. Exact match always wins and is never ambiguous.
      if(vendorBySerial[su]) return {key:su, row:vendorBySerial[su]};
      // 2. Numeric-flex match only when exactly one vendor serial owns this numeric
      //    value. If two collide we refuse to guess and fall through (exact-only).
      if(/^\d+$/.test(su)){
        var hits = vendorByNormList[String(parseInt(su,10))] || [];
        if(hits.length === 1) return {key:hits[0], row:vendorBySerial[hits[0]]};
      }
      return null;
    }

    var matchedSerialKeys = new Set();
    var matched=[], tagMismatch=[], missingFromVendor=[], extraFromVendor=[];

    ourAssets.forEach(function(a){
      var found = findVendorRow(a.serial);
      if(found){
        matchedSerialKeys.add(found.key);
        var vRow = found.row;
        var ourTag  = (a.ouInventory||"").trim();
        var vendTag = (vRow.tag||"").replace(/NO ASSET TAG\s*/i,"").trim();
        // Tag mismatch: both sides have a real tag and they don't match (numeric-aware)
        if(!isBlankTag(ourTag) && !isBlankTag(vendTag) && !flexMatch(ourTag, vendTag)){
          tagMismatch.push({...a, vendorSerial:found.key, vendorTag:vendTag, vendorDesc:vRow.desc, vendorMfgr:vRow.mfgr});
        } else {
          matched.push({...a, vendorSerial:found.key, vendorTag:vendTag, vendorDesc:vRow.desc, vendorMfgr:vRow.mfgr});
        }
      } else {
        missingFromVendor.push(a);
      }
    });

    Object.keys(vendorBySerial).forEach(function(s){
      if(!matchedSerialKeys.has(s)){
        var vRow = vendorBySerial[s];
        extraFromVendor.push({serial:s, vendorTag:vRow.tag, vendorDesc:vRow.desc, vendorMfgr:vRow.mfgr, ticketNo:"—"});
      }
    });

    // ── Cross-ticket detection ────────────────────────────────────
    // 1. Check vendor audit serials against tickets NOT in this pickup
    var ourPickupTicketIds = new Set(pickup.ticketIds);
    var crossTicketMatches = [];
    tickets.forEach(function(t){
      if(ourPickupTicketIds.has(t.id)) return; // skip tickets already in this pickup
      (t.expectedAssets||[]).forEach(function(a){
        var found = findVendorRow(a.serial);
        if(found){
          crossTicketMatches.push({
            serial:        a.serial,
            vendorSerial:  found.key,
            manufacturer:  a.manufacturer||"",
            machineType:   a.machineType||"",
            ouInventory:   a.ouInventory||"",
            ticketNo:      t.ticketNo,
            ticketId:      t.id,
            site:          t.site||"",
            vendorTag:     (vendorBySerial[found.key]||{}).tag||"",
            vendorDesc:    (vendorBySerial[found.key]||{}).desc||"",
            sourcePickup:  pickup.name,
          });
        }
      });
    });

    // 2. Check this pickup's ticket serials against stored vendor serial lists from other pickups
    var ourSerialSet = new Set(ourAssets.map(function(a){ return a.serial.toUpperCase(); }));
    var duplicateAuditMatches = [];
    shipments.forEach(function(s){
      if(s.id === pickup.id) return; // skip self
      var storedSerials = (s.reconcileReport && s.reconcileReport.vendorSerials) || [];
      storedSerials.forEach(function(vs){
        var vsNorm = /^\d+$/.test(vs) ? String(parseInt(vs,10)) : vs;
        // Check against our serials
        ourAssets.forEach(function(a){
          var au = a.serial.toUpperCase();
          var auNorm = /^\d+$/.test(au) ? String(parseInt(au,10)) : au;
          if(au === vs || auNorm === vsNorm){
            duplicateAuditMatches.push({
              serial:       a.serial,
              vendorSerial: vs,
              manufacturer: a.manufacturer||"",
              machineType:  a.machineType||"",
              ouInventory:  a.ouInventory||"",
              ticketNo:     a.ticketNo||"",
              site:         a.site||"",
              otherPickup:  s.name,
              otherAudit:   (s.reconcileReport && s.reconcileReport.fileName)||s.auditFileName||"",
            });
          }
        });
      });
    });

    var result = {
      matched, tagMismatch, missingFromVendor, extraFromVendor, placeholders,
      crossTicketMatches, duplicateAuditMatches,
      serialCollisions,
      vendorSerials: Object.keys(vendorBySerial), // stored for future cross-audit checks
      pickupNo:  pickup.name,
      poNumber:  po,
      fileName:  vendorData.fileName,
      generatedAt: new Date().toLocaleString(),
      ourTotal:  ourAssets.length,
      vendorTotal: Object.keys(vendorBySerial).length,
    };

    result.waivedSerials = Array.from(waivedSerials);
    setReport(result);
    // Save audit info + report back to the pickup record
    setShipments(function(prev){ return prev.map(function(x){
      if(x.id!==pickup.id) return x;
      return {...x, auditFileName:vendorData.fileName, auditPo:po, reconcileReport:result, status:"reconciled", reconcileDate:localDateStr()};
    }); });
    setVendorReport(result);
    } catch(err){ alert("Reconciliation error: " + err.message + "\n\nStack: " + (err.stack||"").split("\n").slice(0,3).join("\n")); }
  }

  var RSEC = {
    matched:          {color:"#86efac", bg:"#052e16", border:"#166534", label:"✅ Matched"},
    tagMismatch:      {color:"#fde047", bg:"#422006", border:"#a16207", label:"⚠ Tag Mismatch"},
    missingFromVendor:{color:"#fca5a5", bg:"#450a0a", border:"#7f1d1d", label:"❌ Missing from Vendor"},
    extraFromVendor:  {color:"#93c5fd", bg:"#1e3a5f", border:"#1e40af", label:"➕ Extra from Vendor"},
    placeholders:     {color:"#c4b5fd", bg:"#2e1065", border:"#6d28d9", label:"🔢 Placeholders"},
  };

  return (
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,fontFamily:"inherit",marginBottom:16,padding:0}}>← Back to Reconcile</button>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4,flexWrap:"wrap"}}>
        <div style={{fontFamily:"'Geist Mono',monospace",fontWeight:700,fontSize:18,color:"#f1f5f9",letterSpacing:1}}>{pickup.name}</div>
        {pickup.vendor && <span style={{fontSize:12,color:"#64748b"}}>🏢 {pickup.vendor}</span>}
        {pickup.location && <span style={{fontSize:12,color:"#64748b"}}>📍 {pickup.location}</span>}
      </div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>{ourAssets.length} expected asset{ourAssets.length!==1?"s":""} across {pickup.ticketIds.length} ticket{pickup.ticketIds.length!==1?"s":""}</div>

      {/* CoDD - step 1, above the audit upload: the cert and the audit ship
          together, and the cert's PO is entered here first so it seeds the
          audit PO below (cert-audit PO agreement becomes the default). */}
      <div style={{background:"#1e293b",borderRadius:12,border:"1px solid "+(pickup.codd?"#4c1d95":"#334155"),padding:"20px 24px",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{fontFamily:"'Geist',sans-serif",fontWeight:600,fontSize:14,color:"#e2e8f0"}}>📜 Certificate of Data Destruction</div>
          {!readOnly && !coddEditing && (
            <button onClick={openCoddEditor} style={{background:"#0f172a",color:"#a78bfa",border:"1px solid #4c1d95",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500}}>{pickup.codd?"Replace CoDD":"Attach CoDD"}</button>
          )}
        </div>
        {pickup.codd && !coddEditing && (
          <div style={{marginTop:10,fontSize:12,color:"#94a3b8",display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
            <span>{"PO "}<strong style={{color:"#f1f5f9",fontFamily:"'Geist Mono',monospace"}}>{pickup.codd.certPO}</strong></span>
            <span>{"Destroyed "}<strong style={{color:"#f1f5f9"}}>{fmtDate(pickup.codd.destructionDate)}</strong></span>
            {pickup.codd.certNo && <span>{"Cert # "}<strong style={{color:"#f1f5f9",fontFamily:"'Geist Mono',monospace"}}>{pickup.codd.certNo}</strong></span>}
            {pickup.codd.signedBy && <span>{"Signed by "}<strong style={{color:"#f1f5f9"}}>{pickup.codd.signedBy}</strong></span>}
            {pickup.codd.fileName && <span style={{color:"#64748b"}}>📎 {pickup.codd.fileName}</span>}
            {pickup.codd.fileUrl && <a href={pickup.codd.fileUrl} target="_blank" rel="noreferrer" style={{color:"#93c5fd"}}>{"Open file \u2197"}</a>}
            {pickup.codd.note && <span style={{color:"#fbbf24"}}>{"\u26A0 "+pickup.codd.note}</span>}
          </div>
        )}
        {!pickup.codd && !coddEditing && (
          <div style={{marginTop:10,padding:"8px 12px",background:"#42200622",border:"1px solid #a16207",borderRadius:8,fontSize:12,color:"#fde68a"}}>
            {"\u26A0 No CoDD attached to this pickup."}{readOnly ? "" : " Attach the certificate first - it ships together with the audit file."}
          </div>
        )}
        {coddEditing && !readOnly && (
          <div style={{marginTop:12}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10}}>
              <div>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>PO # on certificate *</label>
                <input value={coddPO} onChange={function(e){ setCoddPO(e.target.value); }} placeholder="e.g. 2737" style={coddInputStyle}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Date of destruction *</label>
                <input type="date" value={coddDate} onChange={function(e){ setCoddDate(e.target.value); }} style={coddInputStyle}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Cert # (optional)</label>
                <input value={coddCertNo} onChange={function(e){ setCoddCertNo(e.target.value); }} placeholder="if printed on the cert" style={coddInputStyle}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Signed by (optional)</label>
                <input value={coddSignedBy} onChange={function(e){ setCoddSignedBy(e.target.value); }} placeholder="name, title" style={coddInputStyle}/>
              </div>
              <div>
                <label style={{display:"block",fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>File link (optional)</label>
                <input value={coddUrl} onChange={function(e){ setCoddUrl(e.target.value); }} placeholder="SharePoint / records URL (future)" style={coddInputStyle}/>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginTop:12,flexWrap:"wrap"}}>
              <input ref={coddFileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={pickCoddFile}/>
              <button onClick={function(){ coddFileRef.current&&coddFileRef.current.click(); }} style={{background:"#0f172a",color:"#93c5fd",border:"1px solid #1e3a5f",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{coddFileName ? "📎 "+coddFileName : "📎 Pick the CoDD PDF (records the filename only)"}</button>
              <div style={{flex:1}}/>
              <button onClick={function(){ setCoddEditing(false); }} style={{background:"none",color:"#64748b",border:"1px solid #334155",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
              <button onClick={attachCodd} style={{background:"linear-gradient(135deg,#6d28d9,#1d4ed8)",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500}}>{pickup.codd ? "Replace CoDD \u2192" : "Attach CoDD \u2192"}</button>
            </div>
          </div>
        )}
      </div>

      {/* Upload */}
      <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"20px 24px",marginBottom:16}}>
        <div style={{fontFamily:"'Geist',sans-serif",fontWeight:600,fontSize:14,color:"#e2e8f0",marginBottom:12}}>Vendor Audit File</div>
        <div className="upload-zone" onClick={readOnly ? undefined : function(){ fileRef.current&&fileRef.current.click(); }}
          style={{border:"2px dashed "+(vendorFileName?"#3b82f6":"#334155"),borderRadius:10,padding:"24px 20px",textAlign:"center",cursor:readOnly?"default":"pointer",background:vendorFileName?"#0f2e4a22":"transparent",marginBottom:vendorData?12:0,opacity:readOnly?0.6:1}}>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={readOnly ? undefined : handleFile} disabled={readOnly}/>
          <div style={{fontSize:28,marginBottom:6}}>{vendorFileName?"📊":"📁"}</div>
          <div style={{color:vendorFileName?"#93c5fd":"#94a3b8",fontSize:13}}>{vendorFileName||(readOnly?"No audit file uploaded":"Click to upload vendor audit .xlsx")}</div>
          {vendorFileName && !readOnly && <div style={{color:"#64748b",fontSize:11,marginTop:3}}>Click to replace</div>}
        </div>
        {vendorData && (
          <div style={{marginTop:10}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
              <div style={{fontSize:12,color:"#64748b"}}>
                {poNumber && <span style={{marginRight:14}}>PO #<strong style={{color:"#f1f5f9"}}>{poNumber}</strong></span>}
                <span><strong style={{color:"#93c5fd"}}>{vendorData.rows.length}</strong> rows loaded</span>
                <span style={{margin:"0 8px",color:"#334155"}}>·</span>
                <span><strong style={{color:"#86efac"}}>{ourAssets.length}</strong> our assets</span>
              </div>
              {!readOnly && vendorData.serialKey && <button onClick={runReconciliation} style={{background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>
                Run Reconciliation →
              </button>}
            </div>
            {pickup.codd && pickup.codd.certPO && normPO(vendorData.po||poNumber)!==normPO(pickup.codd.certPO) && (
              <div style={{marginTop:10,padding:"8px 12px",background:"#42200622",border:"1px solid #a16207",borderRadius:8,fontSize:12,color:"#fde68a"}}>
                {"\u26A0 Audit PO (\""+((vendorData.po||poNumber)||"none")+"\") differs from the CoDD PO (\""+pickup.codd.certPO+"\") - the certificate may not cover this audit."}
              </div>
            )}
            {vendorData.serialKey ? (
              <div style={{marginTop:10,padding:"8px 12px",background:"#06281f",border:"1px solid #15803d",borderRadius:8,fontSize:12,color:"#bbf7d0"}}>
                <strong style={{color:"#86efac"}}>Detected columns</strong>{" \u2014 confirm before running:"}
                <div style={{marginTop:4,fontFamily:"'Geist Mono',monospace",color:"#d1fae5"}}>
                  {"Serial \u2192 "}<strong>{vendorData.serialKey}</strong>
                  {"      |      Asset Tag \u2192 "}<strong>{vendorData.tagKey || "(none \u2014 tag-mismatch checks skipped)"}</strong>
                </div>
              </div>
            ) : (
              <div style={{marginTop:10,padding:"8px 12px",background:"#7f1d1d22",border:"1px solid #fca5a5",borderRadius:8,fontSize:12,color:"#fecaca"}}>
                <strong style={{color:"#fca5a5"}}>{"\u26A0 No serial-number column found \u2014 reconciliation blocked."}</strong>{" The audit's header row has no column matching Serial Number / Serial. Check the file. Columns seen:"}
                <div style={{marginTop:4,fontFamily:"'Geist Mono',monospace",color:"#fda4af"}}>
                  {(vendorData.headers||[]).join("  \u00B7  ") || "(no columns read)"}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Results */}
      {report && (
        <div>
          {!pickup.codd && (
            <div style={{background:"#42200622",border:"1px solid #a16207",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:12,color:"#fde68a"}}>
              <strong style={{color:"#fbbf24"}}>{"\u26A0 No CoDD attached."}</strong>{" This pickup has no Certificate of Data Destruction on file. Reconciliation is not blocked, but the compliance chain is incomplete until the certificate is attached above."}
            </div>
          )}
          {report.serialCollisions && report.serialCollisions.length > 0 && (
            <div style={{background:"#7f1d1d22",border:"1px solid #fca5a5",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:12,color:"#fecaca"}}>
              <strong style={{color:"#fca5a5"}}>{"\u26A0 Ambiguous serials in vendor file ("+report.serialCollisions.length+")."}</strong>{" Two or more vendor serials share the same numeric value (e.g. a stripped leading zero), so a numeric match can't be trusted for them. Any of these were matched by EXACT serial only \u2014 verify by hand:"}
              <div style={{marginTop:6,fontFamily:"'Geist Mono',monospace",color:"#fda4af"}}>
                {report.serialCollisions.map(function(c){ return c.serials.join("  \u00B7  "); }).join("     |     ")}
              </div>
            </div>
          )}
          <div style={{fontSize:11,color:"#475569",marginBottom:16}}>Generated {report.generatedAt} · {report.vendorTotal} vendor serials · {report.ourTotal} our assets</div>

          {/* ── Export + actions ── */}
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
            <button onClick={exportIndividualPDFs}
              style={{background:"linear-gradient(135deg,#6d28d9,#1d4ed8)",color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}>
              📄 Export Individual Reports
            </button>
          </div>

          {/* ── Overall stacked bar ── */}
          {(function(){
            var m  = report.matched.length;
            var tm = report.tagMismatch.length;
            var mi = report.missingFromVendor.filter(function(x){ return !waivedSerials.has(x.serial); }).length;
            var ex = report.extraFromVendor.length;
            var wv = waivedSerials.size;
            var total = m + tm + mi + ex + wv || 1;
            var pct = function(n){ return (n/total*100).toFixed(1)+"%"; };
            return (
              <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"18px 22px",marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                  <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:14,color:"#e2e8f0"}}>Overall Reconciliation</div>
                  <div style={{display:"flex",gap:16,fontSize:11,flexWrap:"wrap"}}>
                    {[[m,"Matched","#86efac"],[tm,"Tag Mismatch","#fde047"],[mi,"Missing","#fca5a5"],[ex,"Extra","#93c5fd"],[wv,"Waived","#c4b5fd"]].filter(function(x){ return x[0]>0; }).map(function(x){
                      return <span key={x[1]} style={{color:x[2]}}><strong>{x[0]}</strong> {x[1]}</span>;
                    })}
                  </div>
                </div>
                <div style={{height:28,borderRadius:8,overflow:"hidden",display:"flex",background:"#0f172a"}}>
                  {m>0  && <div style={{width:pct(m), background:"#166534",transition:"width 0.5s"}} title={"Matched: "+m}/>}
                  {tm>0 && <div style={{width:pct(tm),background:"#a16207",transition:"width 0.5s"}} title={"Tag Mismatch: "+tm}/>}
                  {mi>0 && <div style={{width:pct(mi),background:"#7f1d1d",transition:"width 0.5s"}} title={"Missing: "+mi}/>}
                  {ex>0 && <div style={{width:pct(ex),background:"#1e3a5f",transition:"width 0.5s"}} title={"Extra: "+ex}/>}
                  {wv>0 && <div style={{width:pct(wv),background:"#2e1065",transition:"width 0.5s"}} title={"Waived: "+wv}/>}
                </div>
                <div style={{display:"flex",gap:2,marginTop:6}}>
                  {[[m,"#166534"],[tm,"#a16207"],[mi,"#7f1d1d"],[ex,"#1e3a5f"],[wv,"#2e1065"]].filter(function(x){ return x[0]>0; }).map(function(x,i){
                    return <div key={i} style={{width:pct(x[0]),textAlign:"center",color:x[1],fontSize:10,overflow:"hidden"}}>{x[0]>0&&parseFloat(pct(x[0]))>4?x[0]:""}</div>;
                  })}
                </div>
              </div>
            );
          })()}

          {/* ── Per-ticket breakdown ── */}
          <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:15,color:"#e2e8f0",marginBottom:12}}>Per-Ticket Breakdown</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {pickup.ticketIds.map(function(tid){
              var t = tickets.find(function(x){ return x.id===tid; });
              if(!t) return null;
              var tNo = t.ticketNo;
              var tm_items  = report.matched.filter(function(x){ return x.ticketNo===tNo; }).slice().sort(function(a,b){ return (a.serial||'').localeCompare(b.serial||''); });
              var ttm_items = report.tagMismatch.filter(function(x){ return x.ticketNo===tNo; }).slice().sort(function(a,b){ return (a.serial||'').localeCompare(b.serial||''); });
              var tmi_items = report.missingFromVendor.filter(function(x){ return x.ticketNo===tNo && !waivedSerials.has(x.serial); }).slice().sort(function(a,b){ return (a.serial||'').localeCompare(b.serial||''); });
              var twv_items = report.missingFromVendor.filter(function(x){ return x.ticketNo===tNo && waivedSerials.has(x.serial); }).slice().sort(function(a,b){ return (a.serial||'').localeCompare(b.serial||''); });
              var total = tm_items.length + ttm_items.length + tmi_items.length + twv_items.length || 1;
              var pct = function(n){ return (n/total*100).toFixed(1)+"%"; };
              var allOk = ttm_items.length===0 && tmi_items.length===0;
              var isOpen = expandedTickets[tid];
              return (
                <div key={tid} style={{background:"#1e293b",borderRadius:12,border:"1px solid "+(allOk?"#166534":"#334155"),overflow:"hidden"}}>
                  {/* Card header */}
                  <div style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:180}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:14,color:"#f1f5f9"}}>#{tNo}</span>
                        {allOk && <span className="pill" style={{background:"#052e16",color:"#86efac",border:"1px solid #166534"}}>✓ Clean</span>}
                        {ttm_items.length>0 && <span className="pill" style={{background:"#422006",color:"#fde047",border:"1px solid #a16207"}}>⚠ {ttm_items.length} tag mismatch</span>}
                        {tmi_items.length>0 && <span className="pill" style={{background:"#450a0a",color:"#fca5a5",border:"1px solid #7f1d1d"}}>❌ {tmi_items.length} missing</span>}
                        {twv_items.length>0 && <span className="pill" style={{background:"#1a0a2e",color:"#c4b5fd",border:"1px solid #6d28d9"}}>⊘ {twv_items.length} waived</span>}
                      </div>
                      <div style={{fontSize:11,color:"#64748b",display:"flex",gap:12,flexWrap:"wrap"}}>
                        {t.site && <span>📍 {t.site}</span>}
                        {t.requestor && <span>✉ {t.requestor}</span>}
                        <span>{total} items</span>
                      </div>
                    </div>
                    {/* Mini bar */}
                    <div style={{width:160,flexShrink:0}}>
                      <div style={{height:14,borderRadius:4,overflow:"hidden",display:"flex",background:"#0f172a",marginBottom:3}}>
                        {tm_items.length>0  && <div style={{width:pct(tm_items.length), background:"#166534"}} title={"Matched: "+tm_items.length}/>}
                        {ttm_items.length>0 && <div style={{width:pct(ttm_items.length),background:"#a16207"}} title={"Tag Mismatch: "+ttm_items.length}/>}
                        {tmi_items.length>0 && <div style={{width:pct(tmi_items.length),background:"#7f1d1d"}} title={"Missing: "+tmi_items.length}/>}
                        {twv_items.length>0 && <div style={{width:pct(twv_items.length),background:"#2e1065"}} title={"Waived: "+twv_items.length}/>}
                      </div>
                      <div style={{fontSize:10,color:"#475569",textAlign:"right"}}>{tm_items.length}/{total} matched</div>
                    </div>
                    <button onClick={function(){ setExpandedTickets(function(prev){ var n={...prev}; n[tid]=!n[tid]; return n; }); }}
                      style={{background:"#0f172a",border:"1px solid #334155",borderRadius:7,color:"#64748b",cursor:"pointer",fontSize:12,padding:"6px 14px",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                      {isOpen?"▲ Collapse":"▼ Expand"}
                    </button>
                  </div>

                  {/* Expanded detail */}
                  {isOpen && (
                    <div style={{borderTop:"1px solid #334155",background:"#0f172a"}}>
                      {[
                        {items:tm_items,  label:"✅ Matched",      color:"#86efac",bg:"#052e16"},
                        {items:ttm_items, label:"⚠ Tag Mismatch",  color:"#fde047",bg:"#422006"},
                        {items:tmi_items, label:"❌ Missing",       color:"#fca5a5",bg:"#450a0a"},
                        {items:twv_items, label:"⊘ Waived",        color:"#c4b5fd",bg:"#2e1065"},
                      ].filter(function(g){ return g.items.length>0; }).map(function(g){
                        return (
                          <div key={g.label} style={{padding:"10px 18px",borderBottom:"1px solid #1e293b"}}>
                            <div style={{fontSize:11,fontWeight:600,color:g.color,marginBottom:6,textTransform:"uppercase",letterSpacing:0.7}}>{g.label} ({g.items.length})</div>
                            <div style={{display:"flex",flexDirection:"column",gap:4}}>
                              {g.items.map(function(item,ii){
                                var isWaiveable = g.label.indexOf("Missing")!==-1;
                                var isWaived    = g.label.indexOf("Waived")!==-1;
                                return (
                                  <div key={ii} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 8px",borderRadius:6,background:g.bg+"33",flexWrap:"wrap"}}>
                                    <span style={{fontFamily:"'Geist Mono',monospace",fontSize:12,color:"#93c5fd",flex:"0 0 auto"}}>{item.serial}</span>
                                    {item.vendorSerial && item.vendorSerial!==item.serial && <span style={{fontFamily:"'Geist Mono',monospace",fontSize:11,color:"#a78bfa"}}>→ {item.vendorSerial}</span>}
                                    <span style={{fontSize:11,color:"#64748b"}}>{item.manufacturer||item.vendorMfgr||""}</span>
                                    <span style={{fontSize:11,color:"#64748b"}}>{item.machineType||""}</span>
                                    {item.ouInventory && <span style={{fontSize:11,color:"#7dd3fc"}}>🏷 {item.ouInventory}</span>}
                                    {item.vendorTag && item.vendorTag.replace(/NO ASSET TAG\s*/i,"").trim() && <span style={{fontSize:11,color:"#a78bfa"}}>vendor: {item.vendorTag.replace(/NO ASSET TAG\s*/i,"").trim()}</span>}
                                    {!readOnly && isWaiveable && <button onClick={function(){ toggleWaive(item.serial); }} style={{marginLeft:"auto",background:"none",border:"1px solid #6d28d9",borderRadius:5,color:"#a78bfa",cursor:"pointer",fontSize:10,padding:"2px 8px",fontFamily:"inherit"}}>⊘ Waive</button>}
                                    {!readOnly && isWaived    && <button onClick={function(){ toggleWaive(item.serial); }} style={{marginLeft:"auto",background:"none",border:"1px solid #334155",borderRadius:5,color:"#475569",cursor:"pointer",fontSize:10,padding:"2px 8px",fontFamily:"inherit"}}>Unwaive</button>}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* ── Shared items (extras + placeholders + cross-ticket) ── */}
          {(report.extraFromVendor.length>0||report.placeholders.length>0) && (
            <div style={{marginBottom:20}}>
              <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:15,color:"#e2e8f0",marginBottom:12}}>Shared Items</div>

              {report.placeholders.length>0 && (
                <ResultSection title={"🔢 Placeholders ("+report.placeholders.length+")"} color="#c4b5fd" defaultOpen={true}>
                  <div style={{fontSize:12,color:"#94a3b8",marginBottom:8}}>Vendor-assigned placeholder serials (PO#-###) for misc items with no true serial number.</div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{borderBottom:"1px solid #1e293b"}}>
                      <th style={{textAlign:"left",padding:"6px 10px",color:"#475569",fontWeight:500}}>Serial</th>
                      <th style={{textAlign:"left",padding:"6px 10px",color:"#475569",fontWeight:500}}>Description</th>
                      <th style={{textAlign:"left",padding:"6px 10px",color:"#475569",fontWeight:500}}>Manufacturer</th>
                      <th style={{textAlign:"left",padding:"6px 10px",color:"#475569",fontWeight:500}}>Asset Tag</th>
                    </tr></thead>
                    <tbody>
                      {report.placeholders.slice().sort(function(a,b){ return (a.serial||'').localeCompare(b.serial||''); }).map(function(item,i){
                        return <tr key={i} style={{borderBottom:"1px solid #1e293b"}}>
                          <td style={{padding:"6px 10px",fontFamily:"'Geist Mono',monospace",color:"#c4b5fd",fontSize:12}}>{item.serial}</td>
                          <td style={{padding:"6px 10px",color:"#94a3b8",fontSize:11}}>{item.desc||"—"}</td>
                          <td style={{padding:"6px 10px",color:"#94a3b8",fontSize:11}}>{item.mfgr||"—"}</td>
                          <td style={{padding:"6px 10px",color:"#a78bfa",fontSize:11}}>{item.tag&&item.tag.replace(/NO ASSET TAG\s*/i,"").trim()||"—"}</td>
                        </tr>;
                      })}
                    </tbody>
                  </table>
                </ResultSection>
              )}

              {report.extraFromVendor.length>0 && (
                <ResultSection title={"➕ Extra from Vendor ("+report.extraFromVendor.length+")"} color="#93c5fd" defaultOpen={true}>
                  <div style={{fontSize:12,color:"#94a3b8",marginBottom:8}}>Vendor has these serials but they don't match any ticket in this pickup.</div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{borderBottom:"1px solid #1e293b"}}>
                      <th style={{textAlign:"left",padding:"6px 10px",color:"#475569",fontWeight:500}}>Vendor Serial</th>
                      <th style={{textAlign:"left",padding:"6px 10px",color:"#475569",fontWeight:500}}>Manufacturer</th>
                      <th style={{textAlign:"left",padding:"6px 10px",color:"#475569",fontWeight:500}}>Description</th>
                      <th style={{textAlign:"left",padding:"6px 10px",color:"#475569",fontWeight:500}}>Asset Tag</th>
                      <th style={{textAlign:"left",padding:"6px 10px",color:"#475569",fontWeight:500}}>Track</th>
                    </tr></thead>
                    <tbody>
                      {report.extraFromVendor.slice().sort(function(a,b){ return (a.serial||'').localeCompare(b.serial||''); }).map(function(item,i){
                        return <tr key={i} style={{borderBottom:"1px solid #1e293b"}}>
                          <td style={{padding:"6px 10px",fontFamily:"'Geist Mono',monospace",color:"#93c5fd",fontSize:12}}>{item.serial}</td>
                          <td style={{padding:"6px 10px",color:"#94a3b8",fontSize:11}}>{item.vendorMfgr||"—"}</td>
                          <td style={{padding:"6px 10px",color:"#94a3b8",fontSize:11}}>{item.vendorDesc||"—"}</td>
                          <td style={{padding:"6px 10px",color:"#a78bfa",fontSize:11}}>{item.vendorTag&&item.vendorTag.replace(/NO ASSET TAG\s*/i,"").trim()||"—"}</td>
                          <td style={{padding:"6px 10px"}}>
                            {(function(){
                              var tracked = (discrepancies||[]).some(function(d){ return d.type==="extra" && d.serial===item.serial && d.pickupName===report.pickupNo; });
                              if(tracked) return <span style={{fontSize:11,color:"#86efac"}}>Tracked ✓</span>;
                              if(readOnly || !onTrackExtra) return null;
                              return <button onClick={function(){ onTrackExtra(report, item); }} className="resolve-btn" style={{background:"#3b0764",color:"#d8b4fe",border:"1px solid #6b21a8",borderRadius:6,padding:"3px 10px",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>Track</button>;
                            })()}
                          </td>
                        </tr>;
                      })}
                    </tbody>
                  </table>
                </ResultSection>
              )}
            </div>
          )}

          {/* ── Cross-ticket matches ── */}
          {(report.crossTicketMatches||[]).length>0 && (
            <div style={{background:"#1a0a2e",border:"2px solid #7c3aed",borderRadius:10,padding:"16px 20px",marginBottom:12}}>
              <div style={{color:"#c4b5fd",fontWeight:600,fontSize:14,marginBottom:4}}>⚠ {report.crossTicketMatches.length} item{report.crossTicketMatches.length!==1?"s":""} found in other tickets</div>
              <div style={{color:"#94a3b8",fontSize:12,marginBottom:12}}>These vendor audit serials match assets on tickets outside this vendor pickup.</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:"1px solid #4c1d95"}}>
                  <th style={{textAlign:"left",padding:"6px 10px",color:"#a78bfa",fontWeight:500}}>Our Serial</th>
                  <th style={{textAlign:"left",padding:"6px 10px",color:"#a78bfa",fontWeight:500}}>Vendor Serial</th>
                  <th style={{textAlign:"left",padding:"6px 10px",color:"#a78bfa",fontWeight:500}}>Other Ticket #</th>
                  <th style={{textAlign:"left",padding:"6px 10px",color:"#a78bfa",fontWeight:500}}>Site</th>
                  <th style={{textAlign:"left",padding:"6px 10px",color:"#a78bfa",fontWeight:500}}>Manufacturer</th>
                </tr></thead>
                <tbody>
                  {(report.crossTicketMatches||[]).map(function(item,i){
                    return <tr key={i} style={{borderBottom:"1px solid #2e1065"}}>
                      <td style={{padding:"6px 10px",fontFamily:"'Geist Mono',monospace",color:"#93c5fd",fontSize:12}}>{item.serial}</td>
                      <td style={{padding:"6px 10px",fontFamily:"'Geist Mono',monospace",color:"#a78bfa",fontSize:12}}>{item.vendorSerial}</td>
                      <td style={{padding:"6px 10px",color:"#f1f5f9",fontWeight:500}}>{item.ticketNo}</td>
                      <td style={{padding:"6px 10px",color:"#64748b",fontSize:11}}>{item.site||"—"}</td>
                      <td style={{padding:"6px 10px",color:"#94a3b8",fontSize:11}}>{item.manufacturer||"—"}</td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* ── Duplicate audit matches ── */}
          {(report.duplicateAuditMatches||[]).length>0 && (
            <div style={{background:"#1a0700",border:"2px solid #dc2626",borderRadius:10,padding:"16px 20px",marginBottom:12}}>
              <div style={{color:"#fca5a5",fontWeight:600,fontSize:14,marginBottom:4}}>🚨 {report.duplicateAuditMatches.length} serial{report.duplicateAuditMatches.length!==1?"s":""} found in multiple vendor audits</div>
              <div style={{color:"#94a3b8",fontSize:12,marginBottom:12}}>These serials also appeared in a previous vendor audit — possible duplicate pickup.</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:"1px solid #7f1d1d"}}>
                  <th style={{textAlign:"left",padding:"6px 10px",color:"#fca5a5",fontWeight:500}}>Serial</th>
                  <th style={{textAlign:"left",padding:"6px 10px",color:"#fca5a5",fontWeight:500}}>Our Ticket #</th>
                  <th style={{textAlign:"left",padding:"6px 10px",color:"#fca5a5",fontWeight:500}}>Also in Pickup</th>
                  <th style={{textAlign:"left",padding:"6px 10px",color:"#fca5a5",fontWeight:500}}>Previous Audit</th>
                </tr></thead>
                <tbody>
                  {(report.duplicateAuditMatches||[]).map(function(item,i){
                    return <tr key={i} style={{borderBottom:"1px solid #450a0a"}}>
                      <td style={{padding:"6px 10px",fontFamily:"'Geist Mono',monospace",color:"#fca5a5",fontSize:12}}>{item.serial}</td>
                      <td style={{padding:"6px 10px",color:"#f1f5f9",fontWeight:500}}>{item.ticketNo||"—"}</td>
                      <td style={{padding:"6px 10px",color:"#fde047",fontFamily:"'Geist Mono',monospace",fontSize:12}}>{item.otherPickup}</td>
                      <td style={{padding:"6px 10px",color:"#64748b",fontSize:11}}>{item.otherAudit||"—"}</td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
          )}


        </div>
      )}

    </div>
  );
}


// ══════════════════════════════════════════════════════════════════
// TAB 5 — REPORT
// ══════════════════════════════════════════════════════════════════
function ReportTab({report, tickets, shipments, setTab}){
  var today = new Date();
  var allDates = tickets.map(function(t){ return t.date; }).filter(Boolean).sort();
  var defaultFrom = allDates.length ? allDates[0] : new Date(today.getFullYear(), today.getMonth()-5, 1).toISOString().slice(0,10);
  var defaultTo   = allDates.length ? allDates[allDates.length-1] : today.toISOString().slice(0,10);
  const [dateField, setDateField] = useState("date");       // "date" | "scannedAt"
  const [fromDate,  setFromDate]  = useState(defaultFrom);
  const [toDate,    setToDate]    = useState(defaultTo);

  // ── Filtered tickets by date range ───────────────────────────────
  var filteredTickets = useMemo(function(){
    return tickets.filter(function(t){
      var raw = dateField==="date" ? t.date : (t.approvalSentAt ? t.approvalSentAt.split(",")[0] : t.date);
      if(!raw) return false;
      var d = raw.slice(0,10);
      return d >= fromDate && d <= toDate;
    });
  }, [tickets, dateField, fromDate, toDate]);

  // ── Core metrics ─────────────────────────────────────────────────
  var metrics = useMemo(function(){
    var total = filteredTickets.length;
    var byStatus = {pending:0, awaiting:0, verified:0};
    var totalSerials = 0;
    var totalExpected = 0;
    var directPickup = 0;

    filteredTickets.forEach(function(t){
      var ps = pickupStatus(t);
      if(ps==="pending")            byStatus.pending++;
      else if(ps==="awaiting-approval") byStatus.awaiting++;
      else                          byStatus.verified++;

      var assetList = (t.pickupScanned && (t.assets||[]).length>0) ? t.assets : (t.expectedAssets||[]);
      totalExpected += assetList.length;
      totalSerials   += assetList.length;

      if(t.directVendorPickup) directPickup++;
    });

    // Reconciliation metrics across all reconciled shipments in range
    var reconMetrics = {matched:0,tagMismatch:0,missing:0,extra:0,waived:0,placeholders:0};
    shipments.forEach(function(s){
      if(!s.reconcileReport) return;
      var r = s.reconcileReport;
      reconMetrics.matched    += (r.matched||[]).length;
      reconMetrics.tagMismatch+= (r.tagMismatch||[]).length;
      reconMetrics.missing    += (r.missingFromVendor||[]).filter(function(x){ return !(r.waivedSerials||[]).includes(x.serial); }).length;
      reconMetrics.extra      += (r.extraFromVendor||[]).length;
      reconMetrics.waived     += (r.waivedSerials||[]).length;
      reconMetrics.placeholders+=(r.placeholders||[]).length;
    });

    return {total, byStatus, totalSerials, totalExpected, directPickup, reconMetrics};
  }, [filteredTickets, shipments]);

  // ── SVG helpers ──────────────────────────────────────────────────
  function DonutChart({segments, size, thickness}){
    size = size||120; thickness = thickness||28;
    var r = (size-thickness)/2;
    var cx = size/2, cy = size/2;
    var circumference = 2*Math.PI*r;
    var total = segments.reduce(function(s,x){ return s+x.value; },0)||1;
    var offset = 0;
    return (
      <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
        {segments.map(function(seg,i){
          var dash = (seg.value/total)*circumference;
          var gap  = circumference - dash;
          var el = <circle key={i} cx={cx} cy={cy} r={r}
            fill="none" stroke={seg.color} strokeWidth={thickness}
            strokeDasharray={dash+" "+gap}
            strokeDashoffset={-offset}
            style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%"}}
          />;
          offset += dash;
          return el;
        })}
        <circle cx={cx} cy={cy} r={r-thickness/2-2} fill="#0f172a"/>
      </svg>
    );
  }

  function HBar({value, total, color, height}){
    height = height||14;
    var pct = total>0 ? Math.min(100,value/total*100) : 0;
    return (
      <div style={{height:height,borderRadius:4,background:"#1e293b",overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:color,transition:"width 0.6s",borderRadius:4}}/>
      </div>
    );
  }

  function MetricCard({label, value, sub, color, children}){
    return (
      <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"18px 20px"}}>
        <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>{label}</div>
        <div style={{fontFamily:"'Geist',sans-serif",fontSize:32,fontWeight:800,color:color||"#f1f5f9",lineHeight:1,marginBottom:sub?4:0}}>{value}</div>
        {sub && <div style={{fontSize:11,color:"#64748b"}}>{sub}</div>}
        {children}
      </div>
    );
  }

  var m = metrics;
  var statusTotal = m.byStatus.pending + m.byStatus.awaiting + m.byStatus.verified || 1;
  var rt = m.reconMetrics;
  var reconTotal = rt.matched + rt.tagMismatch + rt.missing + rt.extra || 1;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"'Geist',sans-serif",fontWeight:700,fontSize:18,color:"#f1f5f9"}}>Metrics Dashboard</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Aggregate statistics across all tickets and reconciliations.</div>
        </div>
        {/* Date range controls */}
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <select value={dateField} onChange={function(e){ setDateField(e.target.value); }}
            style={{background:"#1e293b",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"7px 10px",fontSize:12,fontFamily:"inherit"}}>
            <option value="date">By Submitted Date</option>
            <option value="scannedAt">By Scanned Date</option>
          </select>
          <input type="date" value={fromDate} onChange={function(e){ setFromDate(e.target.value); }}
            style={{background:"#1e293b",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"7px 10px",fontSize:12,fontFamily:"inherit"}}/>
          <span style={{color:"#475569",fontSize:12}}>to</span>
          <input type="date" value={toDate} onChange={function(e){ setToDate(e.target.value); }}
            style={{background:"#1e293b",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",padding:"7px 10px",fontSize:12,fontFamily:"inherit"}}/>
        </div>
      </div>

      {/* ── Row 1: Top-line counts ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12,marginBottom:20}}>
        <MetricCard label="Tickets in Range" value={m.total} color="#93c5fd" sub={m.total===tickets.length?"(all tickets)":"of "+tickets.length+" total"}/>
        <MetricCard label="Serialized Assets" value={m.totalSerials} color="#86efac"/>

        <MetricCard label="Reconciled Pickups" value={shipments.filter(function(s){ return s.reconcileReport; }).length} color="#7dd3fc" sub={"of "+shipments.length+" total"}/>
      </div>

      {/* ── Row 2: Ticket status donut + recon outcome bar ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>

        {/* Ticket status */}
        <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"18px 22px"}}>
          <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:14}}>Ticket Status Breakdown</div>
          <div style={{display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
            <DonutChart size={110} thickness={24} segments={[
              {value:m.byStatus.verified, color:"#166534"},
              {value:m.byStatus.awaiting, color:"#a16207"},
              {value:m.byStatus.pending,  color:"#334155"},
            ]}/>
            <div style={{flex:1,minWidth:120}}>
              {[
                {label:"Verified / Complete", count:m.byStatus.verified, color:"#86efac"},
                {label:"Awaiting Approval",   count:m.byStatus.awaiting, color:"#fde047"},
                {label:"Scan Pending",        count:m.byStatus.pending,  color:"#475569"},
              ].map(function(row){
                return (
                  <div key={row.label} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:11,color:row.color}}>{row.label}</span>
                      <span style={{fontSize:12,color:"#f1f5f9",fontWeight:600}}>{row.count}</span>
                    </div>
                    <HBar value={row.count} total={statusTotal} color={row.color} height={8}/>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* Reconciliation outcomes */}
        <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"18px 22px"}}>
          <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:14}}>Reconciliation Outcomes (All Time)</div>
          {reconTotal===1 && rt.matched===0 ? (
            <div style={{color:"#475569",fontSize:12,paddingTop:20,textAlign:"center"}}>No reconciliations completed yet.</div>
          ) : (
            <div>
              {/* Stacked bar */}
              <div style={{height:24,borderRadius:6,overflow:"hidden",display:"flex",background:"#0f172a",marginBottom:12}}>
                {rt.matched>0     && <div style={{width:(rt.matched/reconTotal*100)+"%",    background:"#166534"}} title={"Matched: "+rt.matched}/>}
                {rt.tagMismatch>0 && <div style={{width:(rt.tagMismatch/reconTotal*100)+"%",background:"#a16207"}} title={"Tag Mismatch: "+rt.tagMismatch}/>}
                {rt.missing>0     && <div style={{width:(rt.missing/reconTotal*100)+"%",    background:"#7f1d1d"}} title={"Missing: "+rt.missing}/>}
                {rt.extra>0       && <div style={{width:(rt.extra/reconTotal*100)+"%",      background:"#1e3a5f"}} title={"Extra: "+rt.extra}/>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {[
                  {label:"Matched",      count:rt.matched,     color:"#86efac"},
                  {label:"Tag Mismatch", count:rt.tagMismatch, color:"#fde047"},
                  {label:"Missing",      count:rt.missing,     color:"#fca5a5"},
                  {label:"Extra",        count:rt.extra,       color:"#93c5fd"},
                  {label:"Waived",       count:rt.waived,      color:"#c4b5fd"},
                  {label:"Placeholders", count:rt.placeholders,color:"#a78bfa"},
